# Script execution tests for plan-prepare.js (plan.js).
# These tests run plan.js directly against fixture directories (no LLM).
# Covers: OpenSpec authoritative output (issue #164).

- description: "plan-prepare: openspec present emits authoritative field with path and specsCount"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/plan.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-openspec-baseline"
  assert:
    - type: icontains
      value: '"authoritative"'
    - type: icontains
      value: '"path": "openspec/config.yaml"'
    - type: icontains
      value: '"specsCount": 2'

- description: "plan-prepare: no openspec omits authoritative field"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/plan.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-config"
  assert:
    - type: icontains
      value: '"present": false'
    - type: not-icontains
      value: '"authoritative"'

# --- Flag-coherence guardrails (#219) ---

- description: "plan-prepare: flag-coherence guardrails appear in plan output with correct severities (#219)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/plan.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-flag-coherence-guardrails"
  assert:
    - type: icontains
      value: '"id": "flag-coherence-cross-skill"'
    - type: icontains
      value: '"id": "no-opposite-logical-vectors"'
    - type: icontains
      value: '"id": "flag-resolution-single-source"'
    # Severities preserved from config (warning for resolution-single-source)
    - type: icontains
      value: '"severity": "warning"'
    - type: icontains
      value: '"severity": "error"'

- description: "execute-guardrails: flag-coherence-cross-skill and no-opposite-logical-vectors appear in execute config (#219)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/test-execute-guardrails.js"
    script_args: "--project-root {{project_root}}"
    project_root: "file://fixtures-fs/project-flag-coherence-guardrails"
  assert:
    - type: icontains
      value: '"id":"flag-coherence-cross-skill"'
    - type: icontains
      value: '"id":"no-opposite-logical-vectors"'
    # Both error severity per plan
    - type: icontains
      value: '"severity":"error"'
    # flag-resolution-single-source is plan-only, NOT execute
    - type: not-icontains
      value: '"id":"flag-resolution-single-source"'

# --- planIntegrity marker writes (R20, issue #285) ---

- description: "plan-prepare: --output-file writes plan state file with skillInvoked and all four markers via --mark (#285)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/test-plan-integrity-markers.js"
    script_args: "--project-root {{project_root}}"
    project_root: "file://fixtures-fs/project-plan-integrity"
  assert:
    - type: icontains
      value: '"stateFileCreated": true'
    - type: icontains
      value: '"skillInvoked": true'
    - type: icontains
      value: '"planFile": true'
    - type: icontains
      value: '"guardrailsEvaluated": true'
    - type: icontains
      value: '"critiqueRan": true'
    - type: icontains
      value: '"planFilePathSet": true'
    - type: icontains
      value: '"allPresent": true'

- description: "plan-prepare: --mark with unknown name exits non-zero and lists valid names (#285)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/test-plan-mark-validation.js"
    script_args: "--project-root {{project_root}}"
    project_root: "file://fixtures-fs/project-plan-integrity"
  assert:
    - type: icontains
      value: '"exitCode": 1'
    - type: icontains
      value: '"stderrContainsValidNames": true'
    - type: icontains
      value: '"stderrMentionsPath": true'
    - type: icontains
      value: '"stderrMentionsOutputFile": true'

# --- plan-explore.js exec tests (R24, P8–P12, issue #408) ---

- description: "plan-explore: clean repo + plain prompt yields manifestPath non-null, webResearchSignal false, error null"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/plan-explore.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-plan-explore-clean"
    script_stdin: "Add a helper function"
  assert:
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.manifestPath !== null && data.manifestPath !== undefined;
    - type: icontains
      value: '"webResearchSignal": false'
    - type: icontains
      value: '"error": null'

- description: "plan-explore: repo with staged diffs yields manifestPath non-null, scopeHintCount >= 1"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/plan-explore.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-plan-explore-with-diffs"
    script_stdin: "Improve the auth module"
  assert:
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.manifestPath !== null && data.scopeHintCount >= 1;
    - type: icontains
      value: '"error": null'

- description: "plan-explore: --from-openspec with backtick paths in proposal.md yields scopeHintCount reflecting parsed paths"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/plan-explore.js"
    script_args: "--from-openspec test-change"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-plan-explore-openspec"
    script_stdin: "Implement the token validation endpoint"
  assert:
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.scopeHintCount >= 1;
    - type: icontains
      value: '"error": null'

- description: "plan-explore: prompt containing 'best practice' sets webResearchSignal true"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/plan-explore.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-plan-explore-clean"
    script_stdin: "What is the best practice for JWT validation in Node.js?"
  assert:
    - type: icontains
      value: '"webResearchSignal": true'
    - type: icontains
      value: '"error": null'

- description: "plan-explore: plain rename prompt (no keywords) sets webResearchSignal false"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/plan-explore.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-plan-explore-clean"
    script_stdin: "Rename the greet function to hello in src/index.js"
  assert:
    - type: icontains
      value: '"webResearchSignal": false'
    - type: icontains
      value: '"error": null'

- description: "plan-explore: non-git directory produces valid output with graceful git fallback (exit code 0)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/plan-explore.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-plan-explore-no-git"
    script_stdin: "Add a feature"
  assert:
    # Script must always exit 0 and produce a parseable JSON output (R28 contract)
    - type: icontains
      value: '"webResearchSignal"'
    - type: icontains
      value: '"scopeHintCount"'

# --- plan.js explorePack integration (Task 5 / P8–P12, issue #408) ---

- description: "plan-prepare: clean invocation emits explorePack with all five P8-P12 keys"
  vars:
    script_path: "repo://tests/promptfoo/scripts/test-plan-explore-pack.js"
    script_args: "--project-root {{project_root}} --mode clean"
    project_root: "file://fixtures-fs/project-plan-explore-clean"
  assert:
    - type: icontains
      value: '"explorerPackPresent": true'
    - type: icontains
      value: '"allKeysPresent": true'
    - type: icontains
      value: '"planExitCode": 0'
    - type: icontains
      value: '"webResearchSignalPresent": true'
    - type: icontains
      value: '"scopeHintCountPresent": true'

- description: "plan-prepare: forced plan-explore failure yields explorePack.error non-null and plan exits 0 (R28 fallback)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/test-plan-explore-pack.js"
    script_args: "--project-root {{project_root}} --mode error"
    project_root: "file://fixtures-fs/project-plan-explore-clean"
  assert:
    - type: icontains
      value: '"planExitCode": 0'
    - type: icontains
      value: '"explorerPackPresent": true'
    - type: icontains
      value: '"allKeysPresent": true'
    - type: icontains
      value: '"manifestPathNull": true'
    - type: not-icontains
      value: '"explorerPackError": null'
