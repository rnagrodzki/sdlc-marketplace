# Script execution tests for openspec-enrich.js (issues #162, #217).
# Tests managed-block append, update, unchanged, remove, missing-file, and
# duplicate-context-key skip behavior.

- description: "openspec-enrich: appends managed block to plain config"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/util/openspec-enrich.js"
    script_args: "--project-root {{project_root}}"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-openspec-config-plain"
  assert:
    - type: icontains
      value: '"action": "append"'
    - type: icontains
      value: '"changed": true'
    - type: icontains
      value: '"ok": true'

- description: "openspec-enrich: unchanged on already-enriched v2 config"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/util/openspec-enrich.js"
    script_args: "--project-root {{project_root}}"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-openspec-config-enriched-v2"
  assert:
    - type: icontains
      value: '"action": "unchanged"'
    - type: icontains
      value: '"changed": false'

- description: "openspec-enrich: updates v0 block to current version"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/util/openspec-enrich.js"
    script_args: "--project-root {{project_root}}"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-openspec-config-enriched-v0"
  assert:
    - type: icontains
      value: '"action": "update"'
    - type: icontains
      value: '"changed": true'

- description: "openspec-enrich: updates v1 block (now legacy comment-only) to v2"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/util/openspec-enrich.js"
    script_args: "--project-root {{project_root}}"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-openspec-config-enriched-v1"
  assert:
    - type: icontains
      value: '"action": "update"'
    - type: icontains
      value: '"changed": true'

- description: "openspec-enrich: skips append when existing context: key present"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/util/openspec-enrich.js"
    script_args: "--project-root {{project_root}}"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-openspec-config-with-context-key"
  assert:
    - type: icontains
      value: '"action": "skipped-existing-context"'
    - type: icontains
      value: '"changed": false'
    - type: icontains
      value: '"ok": true'
    - type: icontains
      value: "Top-level context: key already present"

- description: "openspec-enrich: --remove removes block from enriched config"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/util/openspec-enrich.js"
    script_args: "--remove --project-root {{project_root}}"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-openspec-config-enriched-v1"
  assert:
    - type: icontains
      value: '"action": "removed"'

- description: "openspec-enrich: missing config returns error"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/util/openspec-enrich.js"
    script_args: "--project-root {{project_root}}"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: icontains
      value: '"action": "missing"'
    - type: icontains
      value: '"ok": false'
    - type: icontains
      value: "not found"
