# Script execution tests for session-start.js stale compact-recovery sweep (issue #334).
#
# Surfaces under test:
#   - hooks/session-start.js: 24h stale sweep of .compact-recovery-*.json files
#
# Fixtures:
#   project-compact-recovery-stale          — one .compact-recovery-main.json with mtime 25h ago
#   project-compact-recovery-current-branch — one .compact-recovery-main.json with fresh savedAt
#   project-commit-config                   — clean dir (no compact-recovery files); idempotency check

# ---------------------------------------------------------------------------
# Case 1: stale compact-recovery file (>24h) is swept on session-start
# ---------------------------------------------------------------------------

- description: "session-start: stale compact-recovery file older than 24h is deleted by sweep (issue #334)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-session-start-state.js"
    script_args: "--project-root {{project_root}}"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-compact-recovery-stale"
  assert:
    # Hook exits 0
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.exitCode === 0;
    # The stale .compact-recovery-main.json is gone after session-start
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return Array.isArray(data.hiddenFiles) &&
               !data.hiddenFiles.includes('.compact-recovery-main.json');

# ---------------------------------------------------------------------------
# Case 2: fresh compact-recovery file (<1h) is consumed, not swept
# ---------------------------------------------------------------------------

- description: "session-start: fresh compact-recovery file within 1h is consumed and emits recovery output (issue #334)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-session-start-state.js"
    script_args: "--project-root {{project_root}}"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-compact-recovery-current-branch"
  assert:
    # Hook exits 0
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.exitCode === 0;
    # Fresh file is consumed (deleted) by the per-branch path
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return Array.isArray(data.hiddenFiles) &&
               !data.hiddenFiles.includes('.compact-recovery-main.json');
    # Recovery output is emitted to stdout
    - type: icontains
      value: 'Pipeline state recovered after compaction'

# ---------------------------------------------------------------------------
# Case 3: idempotency — stale sweep on an already-clean dir is a no-op
# ---------------------------------------------------------------------------

- description: "session-start: stale sweep is a no-op when no compact-recovery files exist (issue #334)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-session-start-state.js"
    script_args: "--project-root {{project_root}}"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-config"
  assert:
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.exitCode === 0;
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return Array.isArray(data.hiddenFiles);
