# Script execution tests for the state-file GC, branch migration, and
# terminal cleanup-pipeline subcommands introduced for issue #223.
#
# Surfaces under test:
#   - lib/state.js::gcStateFiles, migrateBranchSlug
#   - state/ship.js: gc, migrate, cleanup-pipeline subcommands
#   - state/execute.js: gc subcommand
#   - skill/ship.js: --gc shortcut + reserved 'cleanup' step rejection
#
# Fixtures:
#   project-ship-state-stale    — one stale ship-* file (mtime 2024) + one fresh ship-main-*
#   project-ship-state-rename   — single ship-main-* file ready for migrate
#   project-execute-state-stale — one stale execute-* file with deleted branch
#   project-plan-state-orphan   — one stale plan-* file (deleted branch) + one stale execute-* file

# ---------------------------------------------------------------------------
# state/ship.js gc --dry-run: lists candidates without deleting
# ---------------------------------------------------------------------------

- description: "state/ship.js gc --dry-run lists stale ship-* file with reason 'stale+branch-gone'"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/ship.js"
    script_args: "gc --dry-run --ttl-days 7"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-state-stale"
  assert:
    - type: contains
      value: '"dryRun": true'
    - type: contains
      value: 'ship-deletedbranch-20240101T000000Z.json'
    - type: contains
      value: 'stale+branch-gone'
    # Fresh file is kept by ttl
    - type: contains
      value: 'ttl-fresh'

# ---------------------------------------------------------------------------
# state/ship.js migrate: renames file and updates data.branch
# ---------------------------------------------------------------------------

- description: "state/ship.js migrate --from main --to fix/220-foo returns migrated:true and renames file"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/ship.js"
    script_args: "migrate --from main --to fix/220-foo"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-state-rename"
  assert:
    - type: contains
      value: '"migrated": true'
    - type: contains
      value: 'ship-main-20260505T120000Z.json'
    - type: contains
      value: 'ship-fix-220-foo-20260505T120000Z.json'

- description: "state/ship.js migrate against missing slug returns migrated:false and exits 1"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/ship.js"
    script_args: "migrate --from doesnotexist --to other"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-state-rename"
  assert:
    - type: contains
      value: '"migrated": false'
    - type: contains
      value: 'no-state-file'

# R37 idempotency (issue #366): second migrate call is a no-op when state file already renamed
# Simulates post-migration state (no ship-main-* file present) — confirms R37 does not
# double-migrate on retry after execute-plan-sdlc returns control via Agent dispatch.
- description: "state/ship.js migrate is idempotent: no-op when state file already migrated (issue #366, R37)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/ship.js"
    script_args: "migrate --from main --to fix/366-agent-dispatch"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-execute-state-stale"
  assert:
    - type: contains
      value: '"migrated": false'
    - type: contains
      value: 'no-state-file'

# ---------------------------------------------------------------------------
# state/execute.js gc: prunes execute-* files using same TTL semantics
# ---------------------------------------------------------------------------

- description: "state/execute.js gc deletes stale execute-* file whose branch is gone"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/execute.js"
    script_args: "gc --ttl-days 7"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-execute-state-stale"
  assert:
    - type: contains
      value: 'execute-deletedbranch-20240101T000000Z.json'
    - type: contains
      value: 'stale+branch-gone'
    # Issue #334: output shape now includes a 'plan' bucket alongside 'execute'
    # Verify nested-shape contract: top-level keys ttlDays, execute, plan;
    # each bucket has deleted[] and kept[] arrays.
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return typeof data.ttlDays === 'number' &&
               data.execute && Array.isArray(data.execute.deleted) && Array.isArray(data.execute.kept) &&
               data.plan && Array.isArray(data.plan.deleted) && Array.isArray(data.plan.kept);

# state/execute.js gc --dry-run: nested-shape contract for dry-run output (issue #334)
- description: "state/execute.js gc --dry-run emits nested {execute,plan} buckets with wouldDelete/wouldKeep arrays (issue #334)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/execute.js"
    script_args: "gc --dry-run --ttl-days 7"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-plan-state-orphan"
  assert:
    - type: contains
      value: '"dryRun": true'
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.dryRun === true &&
               typeof data.ttlDays === 'number' &&
               data.execute && Array.isArray(data.execute.wouldDelete) && Array.isArray(data.execute.wouldKeep) &&
               data.plan && Array.isArray(data.plan.wouldDelete) && Array.isArray(data.plan.wouldKeep) &&
               data.ship === undefined;

# ---------------------------------------------------------------------------
# state/execute.js gc: plan-prefix files in orphan fixture are swept (issue #334)
# ---------------------------------------------------------------------------

- description: "state/execute.js gc reports stale plan-* file for deleted branch as stale+branch-gone (issue #334)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/execute.js"
    script_args: "gc --ttl-days 7"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-plan-state-orphan"
  assert:
    - type: contains
      value: 'plan-deletedbranch-20240101T000000Z.json'
    - type: contains
      value: 'stale+branch-gone'
    - type: contains
      value: '"plan"'

# ---------------------------------------------------------------------------
# state/ship.js gc: plan bucket appears in output JSON (issue #334)
# ---------------------------------------------------------------------------

- description: "state/ship.js gc output includes plan bucket alongside ship and execute (issue #334)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/ship.js"
    script_args: "gc --ttl-days 7"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-plan-state-orphan"
  assert:
    - type: contains
      value: '"plan"'
    - type: contains
      value: '"ship"'
    - type: contains
      value: '"execute"'
    - type: contains
      value: 'plan-deletedbranch-20240101T000000Z.json'
    - type: contains
      value: 'stale+branch-gone'
    # Issue #334: verify nested-shape contract for non-dry-run output —
    # all three buckets (ship, execute, plan) with deleted[]/kept[] arrays.
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return typeof data.ttlDays === 'number' &&
               data.ship && Array.isArray(data.ship.deleted) && Array.isArray(data.ship.kept) &&
               data.execute && Array.isArray(data.execute.deleted) && Array.isArray(data.execute.kept) &&
               data.plan && Array.isArray(data.plan.deleted) && Array.isArray(data.plan.kept);

# ---------------------------------------------------------------------------
# state/ship.js cleanup-pipeline --force: skips contract validation, runs GC
# ---------------------------------------------------------------------------

- description: "state/ship.js cleanup-pipeline --force preserves current run, sweeps stale orphans"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/ship.js"
    script_args: "cleanup-pipeline --force --ttl-days 7"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-state-stale"
  assert:
    - type: contains
      value: '"force": true'
    - type: contains
      value: '"preservedReason": "force"'
    - type: contains
      value: 'ship-deletedbranch-20240101T000000Z.json'

# ---------------------------------------------------------------------------
# skill/ship.js --gc: short-circuits pipeline, emits action:"gc"
# ---------------------------------------------------------------------------

- description: "skill/ship.js --gc returns action:gc with report and skips pipeline composition"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--output-file --gc --ttl-days 7"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-state-stale"
  assert:
    # The provider auto-reads the temp file, so output is the JSON content.
    # Asserting action:"gc" confirms the --gc path ran (errors surface as exit != 0).
    - type: contains
      value: '"action": "gc"'

# ---------------------------------------------------------------------------
# skill/ship.js --steps cleanup: reserved-step validation error
# ---------------------------------------------------------------------------

- description: "skill/ship.js rejects --steps cleanup as a reserved terminal step"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --steps cleanup"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-state-rename"
  assert:
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return Array.isArray(data.errors) && data.errors.some(e => e.includes('"cleanup"') && e.includes('reserved'));

# ---------------------------------------------------------------------------
# hooks/context-stats.js: usage path produces transcript-usage source
# ---------------------------------------------------------------------------

- description: "context-stats hook with usage record emits tokenSource:transcript-usage and tokensApprox:60000"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-context-stats.js"
    script_args: "{{project_root}}"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-context-advisory-real-transcript"
  assert:
    - type: contains
      value: '"tokenSource": "transcript-usage"'
    - type: contains
      value: '"tokensApprox": 60000'
    - type: contains
      value: '"percent": 30'

- description: "context-stats hook with empty transcript falls back to heuristic-bytes"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-context-stats.js"
    script_args: "{{project_root}}"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-context-advisory-empty-transcript"
  assert:
    - type: contains
      value: '"tokenSource": "heuristic-bytes"'
    - type: contains
      value: '"tokensApprox": 0'

# ---------------------------------------------------------------------------
# state/ship.js init: orphan prune (issue #255, R-ship-init-prune)
# ---------------------------------------------------------------------------

- description: "state/ship.js init prunes pre-existing same-branch ship-* file (issue #255)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/ship.js"
    script_args: "init --branch main --flags {}"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-state-orphan"
  assert:
    # cmdInit emits JSON {filePath, prunedOrphans} to stdout
    - type: contains
      value: '"prunedOrphans"'
    - type: contains
      value: 'ship-main-20240101T000000Z.json'
    # The other branch's state file MUST NOT appear in prunedOrphans
    - type: not-contains
      value: 'ship-otherbranch-20240101T000000Z.json'

- description: "state/ship.js init with no pre-existing same-branch state file produces empty prunedOrphans (issue #255)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/ship.js"
    script_args: "init --branch main --flags {}"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-execute-state-stale"
  assert:
    - type: contains
      value: '"prunedOrphans":[]'

# ---------------------------------------------------------------------------
# Fixes #392 / R35 — state/execute.js wave-committed subcommand
# ---------------------------------------------------------------------------

- description: "state/execute.js wave-committed sets committedSha on a completed wave (#392)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/execute.js"
    script_args: "wave-committed --branch feat/commit-waves-state --wave 1 --sha abc1234567890abc1234567890abc1234567890a"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-execute-commit-waves"
  assert:
    # Success path emits nothing on stdout/stderr — any "Error:" line means failure.
    - type: not-icontains
      value: "Error:"

- description: "state/execute.js read returns committedSha when persisted in state file (#392)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/execute.js"
    script_args: "read"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-execute-commit-waves-already-committed"
  assert:
    - type: icontains
      value: '"committedSha": "abc1234567890abc1234567890abc1234567890a"'

- description: "state/execute.js wave-committed is idempotent on identical sha — re-running is a no-op (#392)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/execute.js"
    script_args: "wave-committed --branch feat/commit-waves-already --wave 1 --sha abc1234567890abc1234567890abc1234567890a"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-execute-commit-waves-already-committed"
  assert:
    # No-op success — neither "Error:" nor any output
    - type: not-icontains
      value: "Error:"

- description: "state/execute.js wave-committed errors on conflicting sha (#392)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/execute.js"
    script_args: "wave-committed --branch feat/commit-waves-already --wave 1 --sha deadbeefdeadbeefdeadbeefdeadbeefdeadbeef"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-execute-commit-waves-already-committed"
  assert:
    - type: icontains
      value: "already has committedSha"
    - type: icontains
      value: "refusing to overwrite"

- description: "state/execute.js wave-committed errors when wave not completed (#392)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/execute.js"
    script_args: "wave-committed --branch feat/commit-waves-state --wave 2 --sha abc1234567890abc1234567890abc1234567890a"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-execute-commit-waves"
  assert:
    - type: icontains
      value: 'expected "completed"'
