# Script execution tests for harden-prepare.js.
# These tests run harden-prepare.js directly against fixture directories (no LLM).

- description: "harden-prepare: emits pluginRepoUrl constant in manifest (issue #288)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/harden-prepare.js"
    script_args: '--failure-text "test failure" --skill plan-sdlc'
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-no-config"
  assert:
    - type: icontains
      value: '"pluginRepoUrl": "https://github.com/rnagrodzki/sdlc-marketplace"'

- description: "harden-prepare: pluginRepoUrl is the constant string regardless of CLI flags"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/harden-prepare.js"
    script_args: '--failure-text "another failure" --skill execute-plan-sdlc --step "Step 5" --operation "wave-dispatch"'
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-no-config"
  assert:
    - type: javascript
      value: |
        const m = JSON.parse(output);
        return m.pluginRepoUrl === 'https://github.com/rnagrodzki/sdlc-marketplace'

# R16 pre-flight validation case (issue #416)

- description: "corrupt-existing-dimension-halts-prepare: broken review-dimension frontmatter → exit 1 with structured errors (R16)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/harden-prepare.js"
    script_args: '--failure-text "test failure" --skill plan-sdlc'
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/harden-corrupt-dimension"
    script_capture_stderr: true
  assert:
    # output must contain the errors key (JSON portion) — proves structured error response
    - type: icontains
      value: '"errors"'
      description: "output must include JSON with errors[] key"
    # stderr must contain the pre-flight failure message (proves exit-1 path fired)
    - type: icontains
      value: "pre-flight validation failed"
      description: "stderr must emit pre-flight validation failed (proves exit-1 code path)"
    # output must reference the broken dimension file
    - type: icontains
      value: "broken.md"
      description: "errors must mention the corrupt dimension file"

# R19 --from-issue mcp-failure label → plugin-defect classification (issue #422)

- description: "harden-prepare R19: --from-issue with mcp-failure label pre-sets classification_hint=plugin-defect in manifest"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/harden-prepare.js"
    script_args: '--from-issue 422 --skill jira-sdlc'
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/harden-from-issue-mcp-failure"
    script_stub_bin: "bin"
  assert:
    # Manifest must include classification_hint=plugin-defect because the stub gh
    # returned an issue with the mcp-failure label (R19 acceptance).
    - type: javascript
      value: |
        const m = JSON.parse(output);
        return m.classification_hint === 'plugin-defect';
      description: "classification_hint must be pre-set to plugin-defect when issue has mcp-failure label"
    # Failure text must be populated from the stub-returned issue body.
    - type: icontains
      value: "MCP auth failure"
      description: "failureText must be populated from the gh-returned issue body"

- description: "harden-prepare R19: --from-issue rejects non-integer issue number (security — shell-injection guard)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/harden-prepare.js"
    script_args: '--from-issue not-a-number --skill jira-sdlc'
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/harden-from-issue-mcp-failure"
    script_capture_stderr: true
  assert:
    - type: icontains
      value: "invalid issue number"
      description: "must reject non-numeric issue number before reaching execSync"
    - type: not-icontains
      value: "gh issue view failed"
      description: "must short-circuit before invoking gh — the value-validation guard fires first"

# #438: guardrail description limit raised 512 → 1024.
# 704-char description (would have failed under the old 512 limit) MUST now pass pre-flight;
# 1043-char description MUST still be rejected — proves the new boundary holds.

- description: "harden-prepare #438: 704-char guardrail description passes pre-flight (limit raised to 1024)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/harden-prepare.js"
    script_args: "--failure-text \"test failure\" --skill plan-sdlc"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/harden-long-guardrail-desc"
    script_capture_stderr: true
  assert:
    # manifest assembled → pre-flight passed (clean fixtures emit pluginRepoUrl)
    - type: icontains
      value: "pluginRepoUrl"
      description: "manifest must be assembled (pre-flight passed) for a 704-char guardrail description"
    # no length-rejection error emitted
    - type: not-icontains
      value: "exceeds"
      description: "no 'exceeds N characters' rejection for an in-range (513–1024) description"

- description: "harden-prepare #438: 1043-char guardrail description still rejected (exceeds 1024)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/harden-prepare.js"
    script_args: "--failure-text \"test failure\" --skill plan-sdlc"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/harden-overlong-guardrail-desc"
    script_capture_stderr: true
  assert:
    - type: icontains
      value: "exceeds 1024 characters"
      description: "a >1024-char description must be rejected with the new limit in the message"
    - type: icontains
      value: "pre-flight validation failed"
      description: "stderr must emit pre-flight validation failed (proves exit-1 code path)"

# #474 — linked-worktree content-root rooting

- description: "harden-prepare #474: reviewDimensions paths rooted in active linked worktree"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/harden-prepare.js"
    script_args: '--failure-text "test failure" --skill plan-sdlc'
    script_cwd: "{{project_root}}/linked-wt"
    project_root: "file://fixtures-fs/harden-worktree-content-root"
  assert:
    - type: javascript
      value: |
        const m = JSON.parse(output);
        const paths = (m.surfaces.reviewDimensions || []).map(d => d.path);
        return paths.length > 0 && paths.every(p => p.includes('/linked-wt/'));
      description: "all reviewDimension paths must be under the linked-wt directory"
    - type: javascript
      value: |
        const m = JSON.parse(output);
        const names = (m.surfaces.reviewDimensions || []).map(d => d.name);
        return names.includes('branch-only') && !names.includes('main-only');
      description: "branch-only dimension present and main-only absent when running from linked-wt"

- description: "harden-prepare #474: repository.contentRoot equals active linked worktree"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/harden-prepare.js"
    script_args: '--failure-text "test failure" --skill plan-sdlc'
    script_cwd: "{{project_root}}/linked-wt"
    project_root: "file://fixtures-fs/harden-worktree-content-root"
  assert:
    - type: javascript
      value: |
        const m = JSON.parse(output);
        return typeof m.repository.contentRoot === 'string' && m.repository.contentRoot.includes('/linked-wt');
      description: "repository.contentRoot must contain linked-wt path"

- description: "harden-prepare #474: repository.root stays main-rooted; planGuardrails from main config"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/harden-prepare.js"
    script_args: '--failure-text "test failure" --skill plan-sdlc'
    script_cwd: "{{project_root}}/linked-wt"
    project_root: "file://fixtures-fs/harden-worktree-content-root"
  assert:
    - type: javascript
      value: |
        const m = JSON.parse(output);
        return !m.repository.root.includes('linked-wt');
      description: "repository.root must NOT contain linked-wt (stays main worktree)"
    - type: javascript
      value: |
        const m = JSON.parse(output);
        const ids = (m.surfaces.planGuardrails || []).map(g => g.id);
        return ids.includes('main-config-guardrail');
      description: "planGuardrails must include main-config-guardrail loaded from main config"
