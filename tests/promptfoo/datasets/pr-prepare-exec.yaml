  assert:
    - type: icontains
      value: 'Deprecation: .claude/pr-template.md'
    - type: icontains
      value: '.sdlc/pr-template.md'

- description: "pr.js: with both templates present, .sdlc/ wins (no warning)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-pr-template-both"
  assert:
