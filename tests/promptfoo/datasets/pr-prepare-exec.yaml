      value: '"prConfig": null'

# fetchBaseRef non-fatal when origin is unreachable (issue #239).
# pr.js calls lib/git.js::fetchBaseRef before getDiffStat/getDiffContent. The
# fetch itself fails (host is RFC 2606 .invalid), but the script must still
# produce its prepare output without throwing.
- description: "pr-prepare: fetchBaseRef non-fatal when origin unreachable (issue #239)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/git-lib-unreachable-origin"
  assert:
    # pr.js failing to throw produces some structured output (errors array or PR fields).
    # We do not assert on a specific success field because the no-gh path will populate
    # warnings/errors — the contract is "did not crash with an unhandled exception".
    - type: not-contains
      value: 'Error: spawnSync'
    - type: not-contains
      value: 'fatal: unable to access'

# Link verification gate (issue #198) — pr.js --validate-body
# Reads PR body from --file (or stdin) and validates URLs via lib/links.js.
# Uses SDLC_LINKS_OFFLINE=1 so generic URLs are skipped; identity checks still run.

- description: "pr.js --validate-body: clean body with matching repo owner passes"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_args: "--validate-body --file {{project_root}}/body-clean.md --json"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-pr-link-validate"
    script_env: '{"SDLC_LINKS_OFFLINE":"1"}'
  assert:
    - type: contains
      value: '"ok":true'

- description: "pr.js --validate-body: wrong-owner github URL (PR #192 case) aborts with github-context-mismatch"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_args: "--validate-body --file {{project_root}}/body-wrong-owner.md --json"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-pr-link-validate"
    script_env: '{"SDLC_LINKS_OFFLINE":"1"}'
  assert:
    - type: contains
      value: '"ok":false'
    - type: contains
      value: 'github-context-mismatch'
    - type: contains
      value: '"observed":"rafalnagr/sdlc-marketplace"'
    - type: contains
      value: '"expected":"rnagrodzki/sdlc-marketplace"'

- description: "pr.js --validate-body: generic 404 URL aborts with url-not-found"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_args: "--validate-body --file {{project_root}}/body-generic-404.md --json"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-pr-link-validate"
  assert:
    - type: contains
      value: '"ok":false'
    - type: contains
      value: 'url-not-found'

- description: "pr.js: --output-file writes to os.tmpdir() (issue #209 regression test)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_args: "--output-file"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-pr-no-config"
  assert:
    - type: regex
      value: '^/(tmp|var|private)/.+pr-context-[0-9a-f]+\.json\s*$'
    - type: not-icontains
      value: '"remoteState":'

- description: "pr.js: without --output-file, output is still a tmpdir path (stdout-JSON fallback removed)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-pr-no-config"
  assert:
    - type: regex
      value: '^/(tmp|var|private)/.+pr-context-[0-9a-f]+\.json\s*$'
    - type: not-icontains
      value: '"remoteState":'
