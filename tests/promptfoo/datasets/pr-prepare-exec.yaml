- description: "pr.js: template at .claude/pr-template.md (legacy only) emits one-time deprecation warning"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-pr-template-claude-legacy"
