      value: 'Deprecation: .claude/pr-template.md'

# --- config.pr.defaultBranch cascade (#339) ---

- description: "pr.js #339: config.pr.defaultBranch set to non-existent branch produces clear error naming config path"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-pr-default-branch"
  assert:
    - type: icontains
      value: 'config.pr.defaultBranch'
    - type: icontains
      value: 'develop'
    - type: icontains
      value: '.sdlc/config.json'

- description: "pr.js #339: --base CLI flag takes precedence over config.pr.defaultBranch (error-path reflection — fixture has no remote, so the cascade is observed via baseBranchOverride echoed in the error payload rather than a successful base resolution)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_args: "--base main"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-pr-default-branch"
  assert:
    - type: icontains
      value: '"baseBranchOverride": "main"'

- description: "pr.js #339: no config.pr.defaultBranch field falls back to git auto-detection (existing behavior preserved)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-pr-no-config"
  assert:
    - type: icontains
      value: '"prConfig": null'

- description: "pr.js: rejects pr.defaultBranch containing shell metacharacters before any shell interpolation reaches git rev-parse"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-pr-invalid-default-branch"
  assert:
    - type: icontains
      value: 'is not a valid branch name'
    - type: icontains
      value: 'config.pr.defaultBranch'

# ---------------------------------------------------------------------------
# Issue #380: active-account access probe (replaces origin-owner string match)
# All four cases use SDLC_PROBE_REPO_ACCESS to stub the gh api call — no real
# network call reaches GitHub in any test.
# ---------------------------------------------------------------------------

- description: "pr-prepare: active-account-access — accessible probe passes (env=accessible)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-pr-origin-stubbed"
    script_env: '{"SDLC_PROBE_REPO_ACCESS":"accessible"}'
  assert:
    - type: icontains
      value: '"repoAccessProbed": true'
    - type: icontains
      value: '"repoAccessible": true'
    - type: not-icontains
      value: 'Cannot access'

- description: "pr-prepare: active-account-access — not-found halts (env=not-found)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-pr-origin-stubbed"
    script_env: '{"SDLC_PROBE_REPO_ACCESS":"not-found"}'
  assert:
    - type: icontains
      value: '"repoAccessible": false'
    - type: icontains
      value: '"repoAccessStatus": 404'
    - type: icontains
      value: 'Cannot access'

- description: "pr-prepare: active-account-access — forbidden halts (env=forbidden)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-pr-origin-stubbed"
    script_env: '{"SDLC_PROBE_REPO_ACCESS":"forbidden"}'
  assert:
    - type: icontains
      value: '"repoAccessible": false'
    - type: icontains
      value: '"repoAccessStatus": 403'
    - type: icontains
      value: 'Cannot access'

- description: "pr-prepare: active-account-access — explicit expectedAccount skips probe entirely"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-pr-expected-account-explicit"
  assert:
    - type: icontains
      value: '"repoAccessProbed": false'

- description: "pr-prepare: active-account-access — no origin remote skips probe (env unset)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/pr.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-pr-no-config"
  assert:
    - type: icontains
      value: '"repoAccessProbed": false'

