# Script execution tests for plugins/sdlc-utilities/scripts/lib/git.js — issue #239.
# Validates the new fetchBaseRef helper (best-effort, non-fatal) and the
# buildBranchContribDiffCmd helper (three-dot semantics for branch-contribution scopes).
# These run real Node.js scripts against fixture directories (no LLM).
# Uses tests/promptfoo/scripts/git-lib-test.js so script_path resolves to a real file.

- description: "git-lib: fetchBaseRef export is present"
  vars:
    script_path: "repo://tests/promptfoo/scripts/git-lib-test.js"
    script_args: "--op exports"
    project_root: "file://fixtures-fs/project-openspec-baseline"
  assert:
    - type: contains
      value: '"hasFetchBaseRef": true'

- description: "git-lib: fetchBaseRef does NOT throw when no origin remote is configured"
  vars:
    script_path: "repo://tests/promptfoo/scripts/git-lib-test.js"
    script_args: "--op fetchBaseRef --project-root {{project_root}} --base main"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-openspec-baseline"
  assert:
    - type: contains
      value: '"ok": true'
    - type: contains
      value: '"threw": false'
    - type: not-contains
      value: '"threw": true'

- description: "git-lib: fetchBaseRef does NOT throw when origin is configured but unreachable"
  vars:
    script_path: "repo://tests/promptfoo/scripts/git-lib-test.js"
    script_args: "--op fetchBaseRef --project-root {{project_root}} --base main"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/git-lib-unreachable-origin"
  assert:
    - type: contains
      value: '"ok": true'
    - type: contains
      value: '"threw": false'

- description: "git-lib: buildBranchContribDiffCmd 'committed' scope uses three-dot form (issue #239)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/git-lib-test.js"
    script_args: "--op buildDiffCmd --scope committed --base main"
    project_root: "file://fixtures-fs/project-openspec-baseline"
  assert:
    - type: contains
      value: 'git diff --name-only main...HEAD'

- description: "git-lib: buildBranchContribDiffCmd 'stat' scope uses three-dot form"
  vars:
    script_path: "repo://tests/promptfoo/scripts/git-lib-test.js"
    script_args: "--op buildDiffCmd --scope stat --base main"
    project_root: "file://fixtures-fs/project-openspec-baseline"
  assert:
    - type: contains
      value: 'git diff --stat main...HEAD'

- description: "git-lib: buildBranchContribDiffCmd 'content' scope uses three-dot form"
  vars:
    script_path: "repo://tests/promptfoo/scripts/git-lib-test.js"
    script_args: "--op buildDiffCmd --scope content --base main"
    project_root: "file://fixtures-fs/project-openspec-baseline"
  assert:
    - type: contains
      value: 'git diff main...HEAD'

- description: "git-lib: getChangedFiles 'all' scope excludes base-only files in reverse-merge fixture (issue #364)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/git-lib-test.js"
    script_args: "--op getChangedFilesScope --project-root {{project_root}} --base main --scope all"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/git-lib-reverse-merge"
  assert:
    - type: contains
      value: '"feature.js"'
    - type: not-contains
      value: '"base-only.js"'

- description: "git-lib: getChangedFiles 'all' scope matches 'committed' scope output (issue #364)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/git-lib-test.js"
    script_args: "--op getChangedFilesScope --project-root {{project_root}} --base main --scope committed"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/git-lib-reverse-merge"
  assert:
    - type: contains
      value: '"feature.js"'
    - type: not-contains
      value: '"base-only.js"'

- description: "git-lib: getChangedFiles 'worktree' scope still works against reverse-merge fixture (regression guard)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/git-lib-test.js"
    script_args: "--op getChangedFilesScope --project-root {{project_root}} --base main --scope worktree"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/git-lib-reverse-merge"
  assert:
    - type: contains
      value: '"feature.js"'

- description: "git-lib: getAllSemverTags includes pre-release tags; getTagList excludes them"
  vars:
    script_path: "repo://tests/promptfoo/scripts/git-lib-test.js"
    script_args: "--op tagListVariants"
    project_root: "file://fixtures-fs/project-openspec-baseline"
  assert:
    - type: contains
      value: 'RESULT: PASS'
