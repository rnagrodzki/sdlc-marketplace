# Hook-runner tests for skill/jira.js and hooks/pre-tool-jira-write-guard.js — stdin-piped scenarios.
# Extracted from jira-sdlc-exec.yaml: tests that require script_stdin (hook-runner interface).

- description: "jira-prepare: --save writes to home-cache layout (saved: true, path contains site host)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/jira.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/jira-save-roundtrip"
    script_home: "{{project_root}}"
    script_args: "--project SAVETEST --save"
    script_stdin: |
      {"version":1,"cloudId":"test-cloud","siteUrl":"https://mycompany.atlassian.net","project":{"key":"SAVETEST","name":"Save Test","id":"10001"},"currentUser":{"accountId":"u1","displayName":"Test User","email":"test@example.com"},"issueTypes":{"Task":{"id":"10001","subtask":false,"hierarchyLevel":0}},"fieldSchemas":{"Task":{"summary":{"required":true,"type":"string"}}},"workflows":{"Task":{"unsampled":true}},"linkTypes":[],"userMappings":{}}
  assert:
    - type: icontains
      value: '\"saved\": true'
    - type: icontains
      value: 'mycompany_atlassian_net'
    - type: icontains
      value: 'SAVETEST.json'

# ------------------------------------------------------------
# R21.1 / R21.2 hook tests for pre-tool-jira-write-guard.js
# (Fixes #435 — trailing-whitespace hash equality + always-on
#  deny-path diagnostic dump + length-hint deny reason).
#
# Tests rely on the deny-path emitting `hook-hash=<12hex>…`. Two
# payloads that differ only in trailing whitespace MUST produce
# the same `hook-hash` — that's the proof of R21.1 in production.
# Hashes are precomputed from `payloadHash()` and pinned below.
# ------------------------------------------------------------

- description: "hash-equality-trailing-newline (R21.1): commentBody='body text' yields hook-hash=37040f69f6c2…"
  vars:
    script_path: "repo://plugins/sdlc-utilities/hooks/pre-tool-jira-write-guard.js"
    project_root: "file://fixtures-fs/jira-hook-trim-eq-a"
    script_env: '{"TMPDIR":"{{project_root}}"}'
    script_stdin: '{"tool_name":"mcp__atlassian__addCommentToJiraIssue","tool_input":{"cloudId":"x","issueIdOrKey":"TEST-1","commentBody":"body text"}}'
  assert:
    - type: icontains
      value: 'permissionDecision'
    - type: icontains
      value: 'deny'
    - type: icontains
      value: 'hook-hash=37040f69f6c2'

- description: "hash-equality-trailing-newline (R21.1): commentBody='body text\\n' yields same hook-hash=37040f69f6c2… (trim-end normalization)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/hooks/pre-tool-jira-write-guard.js"
    project_root: "file://fixtures-fs/jira-hook-trim-eq-b"
    script_env: '{"TMPDIR":"{{project_root}}"}'
    script_stdin: "{\"tool_name\":\"mcp__atlassian__addCommentToJiraIssue\",\"tool_input\":{\"cloudId\":\"x\",\"issueIdOrKey\":\"TEST-1\",\"commentBody\":\"body text\\n\"}}"
  assert:
    - type: icontains
      value: 'permissionDecision'
    - type: icontains
      value: 'deny'
    - type: icontains
      value: 'hook-hash=37040f69f6c2'

- description: "hash-inequality-substantive-change-still-blocks: 'wrong body' must NOT hash to the same value as 'expected body' (regression guard for R21.1 trim scope)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/hooks/pre-tool-jira-write-guard.js"
    project_root: "file://fixtures-fs/jira-hook-trim-neq"
    script_env: '{"TMPDIR":"{{project_root}}"}'
    script_stdin: '{"tool_name":"mcp__atlassian__addCommentToJiraIssue","tool_input":{"cloudId":"x","issueIdOrKey":"TEST-1","commentBody":"wrong body"}}'
  assert:
    - type: icontains
      value: 'permissionDecision'
    - type: icontains
      value: 'deny'
    - type: icontains
      value: 'hook-hash=b56892af10e0'
    - type: not-icontains
      value: 'hook-hash=3f148f32e1c7'

- description: "deny-writes-diagnostic-dump (R21.2): deny reason contains dump=<path>"
  vars:
    script_path: "repo://plugins/sdlc-utilities/hooks/pre-tool-jira-write-guard.js"
    project_root: "file://fixtures-fs/jira-hook-dump"
    script_env: '{"TMPDIR":"{{project_root}}"}'
    script_stdin: '{"tool_name":"mcp__atlassian__addCommentToJiraIssue","tool_input":{"cloudId":"x","issueIdOrKey":"TEST-2","commentBody":"diagnostic dump test body"}}'
  assert:
    - type: icontains
      value: 'permissionDecision'
    - type: icontains
      value: 'deny'
    - type: icontains
      value: 'dump='
    - type: icontains
      value: 'jira-sdlc-debug'
    - type: icontains
      value: '.json'

- description: "deny-reason-includes-length-hints (R21.2): commentBody-len=<n> present"
  vars:
    script_path: "repo://plugins/sdlc-utilities/hooks/pre-tool-jira-write-guard.js"
    project_root: "file://fixtures-fs/jira-hook-lenhints"
    script_env: '{"TMPDIR":"{{project_root}}"}'
    script_stdin: '{"tool_name":"mcp__atlassian__addCommentToJiraIssue","tool_input":{"cloudId":"x","issueIdOrKey":"TEST-3","commentBody":"twenty-five-char body!!!!"}}'
  assert:
    - type: icontains
      value: 'permissionDecision'
    - type: icontains
      value: 'deny'
    - type: icontains
      value: 'commentBody-len=25'
    - type: icontains
      value: 'dump='
