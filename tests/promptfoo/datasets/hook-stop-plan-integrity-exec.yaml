# Script execution tests for stop-plan-integrity.js Stop hook (#285).
# Uses the hook via run-stop-plan-integrity.js wrapper (constructs transcript_path
# dynamically from the fixture's project-root at test runtime).
# All tests assert exitCode 0 — the hook is advisory-only (R21).

# --- Case 1: Silent when state file absent AND transcript has no plan-mode marker ---

- description: "stop-plan-integrity: silent when no state file and transcript has no plan-mode marker"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-stop-plan-integrity.js"
    script_args: "--project-root {{project_root}} --transcript-file transcript.jsonl"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/plan-integrity-no-state-no-planmode"
  assert:
    - type: icontains
      value: '"exitCode": 0'
    - type: not-icontains
      value: '[plan-integrity]'

# --- Case 2: Warns "plan-sdlc was not invoked" when state file absent and transcript shows plan mode ---

- description: "stop-plan-integrity: warns 'plan-sdlc was not invoked' when no state file but transcript shows plan mode"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-stop-plan-integrity.js"
    script_args: "--project-root {{project_root}} --transcript-file transcript.jsonl"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/plan-integrity-no-state-planmode"
  assert:
    - type: icontains
      value: '"exitCode": 0'
    - type: icontains
      value: 'plan-sdlc was not invoked'
    - type: icontains
      value: '[plan-integrity]'

# --- Case 3: Warns and names missing checkpoints when state file is partial ---

- description: "stop-plan-integrity: warns and names missing checkpoints when state file has only skillInvoked"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-stop-plan-integrity.js"
    script_args: "--project-root {{project_root}}"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/plan-integrity-partial"
  assert:
    - type: icontains
      value: '"exitCode": 0'
    - type: icontains
      value: 'Missing checkpoints'
    - type: icontains
      value: 'planFile'
    - type: icontains
      value: 'guardrailsEvaluated'
    - type: icontains
      value: 'critiqueRan'
    - type: icontains
      value: '[plan-integrity]'

# --- Case 4: Warns about empty plan file when all four markers set but planFilePath is 0-byte ---

- description: "stop-plan-integrity: warns about empty plan file when planFilePath is 0-byte"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-stop-plan-integrity.js"
    script_args: "--project-root {{project_root}} --fix-planfile-path"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/plan-integrity-empty-planfile"
  assert:
    - type: icontains
      value: '"exitCode": 0'
    - type: icontains
      value: 'Missing checkpoints'
    - type: icontains
      value: 'planFile'
    - type: icontains
      value: '[plan-integrity]'

# --- Case 5: Silent when all four markers present and planFilePath exists with non-empty content ---

- description: "stop-plan-integrity: silent when all markers complete and plan file is non-empty"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-stop-plan-integrity.js"
    script_args: "--project-root {{project_root}} --fix-planfile-path"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/plan-integrity-complete"
  assert:
    - type: icontains
      value: '"exitCode": 0'
    - type: not-icontains
      value: '[plan-integrity]'

# --- Case 6: Silent when transcript file path is missing/unreadable and no state file ---

- description: "stop-plan-integrity: silent when transcript file is missing and no state file"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-stop-plan-integrity.js"
    script_args: "--project-root {{project_root}} --transcript-file nonexistent-transcript.jsonl"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/plan-integrity-no-state-no-planmode"
  assert:
    - type: icontains
      value: '"exitCode": 0'
    - type: not-icontains
      value: '[plan-integrity]'
