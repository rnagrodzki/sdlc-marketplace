      value: >
        The pr-sdlc step in the pipeline table shows args that do NOT include --draft,
        because the config has draft: false and no --draft CLI flag was passed. The
        args come from the ship-prepare.js output (the invocation field), not from the
        SKILL.md example which shows "--auto --draft". The response correctly reflects
        that draft is false — the PR will not be created as a draft.

