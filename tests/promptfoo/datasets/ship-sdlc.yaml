- description: "ship-sdlc: pr step invocation uses computed args from ship-prepare.js, not SKILL.md example args"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-config-present.md"
    user_request: >
      Run /ship-sdlc --auto --dry-run. The project has .sdlc/local.json with
