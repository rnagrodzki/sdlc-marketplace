# Fixture appropriateness:
#   ship-pipeline-ready    -- CORRECT: feature branch with plan executed and changes committed, no ship config
#   ship-review-critical   -- CORRECT: review completed with CHANGES REQUESTED verdict and 1 critical finding
#   ship-config-present    -- CORRECT: project with .sdlc/ship-config.json (preset B, skip version, bump patch)

- description: "ship-sdlc: dry-run shows pipeline table without executing any steps"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      Run /ship-sdlc --dry-run. The project context is provided above. Load config,
      parse flags, detect context, run auto-skip logic, build the pipeline plan, and
      display the dry-run pipeline table. Do not invoke any sub-skills.
  assert:
    # Must announce dry run
    - type: icontains
      value: "dry run"
    # Must show pipeline table header or step numbering
    - type: icontains
      value: "execute-plan-sdlc"
    # Must show pr-sdlc in the pipeline table
    - type: icontains
      value: "pr-sdlc"
    # Must show commit-sdlc in the pipeline table
    - type: icontains
      value: "commit-sdlc"
    # Behavioral: shows table and stops — does not invoke sub-skills
    - type: llm-rubric
      value: >
        The response displays a pipeline table showing all steps (execute-plan-sdlc,
        commit-sdlc, review-sdlc, received-review-sdlc, version-sdlc, pr-sdlc) with
        their status (will run, conditional, or skipped) and args. It does NOT proceed
        to actually invoke any sub-skills — no "Invoking:" progress lines appear.
        The word "dry run" appears in the output. Config loading, flag resolution,
        context detection, and auto-skip decisions are printed before the table.

- description: "ship-sdlc: --auto mode proceeds without asking 'Run this pipeline?'"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      Run /ship-sdlc --auto --steps execute,commit,review,archive-openspec,pr. Show
      the pipeline plan and demonstrate that --auto mode skips the interactive
      approval prompt. Stop after displaying the pipeline table (do not actually
      invoke sub-skills — treat this as context setup only, not full execution).
  assert:
    # Must forward --auto in the pipeline plan for commit-sdlc
    - type: icontains
      value: "--auto"
    # Must show version step is skipped
    - type: icontains
      value: "skipped"
    # Behavioral: no interactive "Run this pipeline?" prompt in auto mode
    - type: llm-rubric
      value: >
        The response shows the pipeline table and proceeds without presenting an
        interactive "Run this pipeline?" question to the user. The --auto flag is
        shown as forwarded to commit-sdlc and pr-sdlc (the sub-skills that support it).
        The version step is shown as skipped because it is not in the resolved
        steps[] (CLI --steps excluded it). The response does NOT ask the user to
        choose yes/edit/cancel before running.

- description: "ship-sdlc: CLI --preset is hard-rejected with migration pointer (#190)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-config-present.md"
    user_request: >
      Run /ship-sdlc --preset minimal --dry-run. The CLI flag --preset is no longer
      accepted (#190). Show the error message and stop without running the pipeline.
  assert:
    # Must surface the rejection
    - type: icontains
      value: "--preset is no longer accepted"
    # Must point at --steps as the replacement
    - type: icontains
      value: "--steps"
    # Behavioral: hard-rejection, no pipeline execution
    - type: llm-rubric
      value: >
        The response surfaces the parseArgs error: --preset is no longer accepted by
        ship-sdlc. The error suggests --steps <csv> as the replacement for step
        composition (and --quality for the model-tier flag forwarded to
        execute-plan-sdlc). The pipeline does NOT run. The response does NOT silently
        fall back to a default preset — it stops at the validation gate.

- description: "ship-sdlc: CLI --steps fully overrides config steps[] (#190)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-config-present.md"
    user_request: >
      Run /ship-sdlc --steps execute,commit,pr --dry-run. The CLI --steps fully
      replaces the resolved step list. Show the flag resolution and dry-run pipeline table.
  assert:
    # Must show flag resolution section
    - type: icontains
      value: "Flag resolution"
    # Must show steps were resolved from CLI
    - type: icontains
      value: "steps"
    # Must show that the version step is skipped (not in --steps)
    - type: icontains
      value: "skipped"
    # Behavioral: CLI --steps overrides config steps[] entirely
    - type: llm-rubric
      value: >
        The response shows the Flag resolution section with steps[] resolved from
        CLI (source: cli) to [execute, commit, pr]. The version, review, and
        archive-openspec steps are shown as skipped because they are not in the
        resolved steps[]. The output clearly indicates that CLI --steps fully
        replaced the config-level steps[].

- description: "ship-sdlc: critical review finding pauses pipeline and invokes received-review-sdlc"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-review-critical.md"
    user_request: >
      Run /ship-sdlc. The review step has completed with verdict CHANGES REQUESTED
      (1 critical finding: SQL injection in auth handler, 2 medium findings). The
      pipeline is at Step 4. Show the verdict decision and what happens next.
  assert:
    # Must show the pipeline is pausing
    - type: icontains
      value: "PAUSING PIPELINE"
    # Must reference received-review-sdlc
    - type: icontains
      value: "received-review-sdlc"
    # Must acknowledge the critical finding
    - type: icontains
      value: "critical"
    # Behavioral: correct verdict parsing and pipeline pause behavior
    - type: llm-rubric
      value: >
        The response parses the review verdict as CHANGES REQUESTED with 1 critical
        finding. It announces that the pipeline is pausing (PAUSING PIPELINE or
        equivalent language) because critical or high issues were found. It states
        it is invoking received-review-sdlc for interactive fix approval. The SQL
        injection finding is mentioned. The response does NOT silently continue to
        version-sdlc or pr-sdlc — it stops for human approval.

- description: "ship-sdlc: medium/low review findings continue pipeline without invoking received-review-sdlc"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      Run /ship-sdlc. The review step has just completed. The review verdict was
      APPROVED WITH NOTES with 3 medium findings and 1 low finding — no critical or
      high findings. Show the verdict decision and whether the pipeline continues or pauses.
  assert:
    # Must show pipeline is continuing
    - type: regex
      value: "(CONTINUING|Deferred|continuing)"
    # Must mention the deferred findings
    - type: regex
      value: "(medium|deferred|below threshold)"
    # Behavioral: no received-review-sdlc invocation for medium/low only
    - type: llm-rubric
      value: >
        The response shows the review verdict is APPROVED WITH NOTES with only medium
        and low findings — no critical or high findings. It announces the pipeline is
        CONTINUING (not pausing). The medium and low findings are collected as deferred
        to the final summary report. The response does NOT invoke received-review-sdlc.
        It proceeds toward the next pipeline step (version-sdlc or pr-sdlc).

- description: "ship-sdlc: --steps narrows pipeline to listed steps only (#190)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      Run /ship-sdlc --steps commit,pr --dry-run. Show the pipeline table
      reflecting that only commit-sdlc and pr-sdlc will run; all other steps
      (execute, review, version, archive-openspec) are skipped.
  assert:
    # All non-listed steps must appear as skipped
    - type: icontains
      value: "execute-plan-sdlc"
    - type: icontains
      value: "review-sdlc"
    - type: icontains
      value: "version-sdlc"
    # PR step should show as will run
    - type: icontains
      value: "pr-sdlc"
    # Behavioral: correct steps[] applied to pipeline table
    - type: llm-rubric
      value: >
        The response displays a dry-run pipeline table where commit-sdlc and pr-sdlc
        show "will run" status. execute-plan-sdlc, review-sdlc, version-sdlc, and
        archive-openspec all show "skipped" status. received-review-sdlc shows
        "conditional" (or skipped because review is skipped). The table accurately
        reflects the CLI --steps override. The response stops after displaying the
        table (dry-run).

- description: "ship-sdlc: dry-run shows config loading, flag resolution, context detection, and auto-skip reasoning"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      Run /ship-sdlc --dry-run. Show the full Step 1 output: config loading result,
      flag resolution, context detection, and auto-skip decisions with reasoning.
      Then show the dry-run pipeline table.
  assert:
    # Must print context detection section
    - type: icontains
      value: "Context detection"
    # Must print auto-skip decisions
    - type: icontains
      value: "Auto-skip"
    # Behavioral: full transparency output before the pipeline table
    - type: llm-rubric
      value: >
        The response prints every Step 1 section in order: (1) config loading result
        (no config found, using built-in defaults), (2) flag resolution table showing
        source of each resolved value, (3) context detection with individual check
        results (plan in context, uncommitted changes, current branch, gh CLI status),
        (4) auto-skip decisions listing each step with WILL RUN or SKIPPED and a
        one-line reason. All four sections appear before the pipeline table. No
        section is omitted.

- description: "ship-sdlc: plan mode active → invokes --plan-mode-blocked, saves state, announces stateFile + resolved flags (#400)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      Plan mode is active. Run /ship-sdlc --bump patch. The system context indicates plan mode
      is currently enabled.
  assert:
    - type: icontains
      value: "plan mode"
    - type: icontains
      value: "ship-sdlc"
    - type: regex
      value: "(ship-[a-z0-9\\-]+-\\d{8}T\\d{6}Z\\.json|stateFile|state file)"
    - type: llm-rubric
      value: >
        The response detects plan mode is active and invokes ship.js with --plan-mode-blocked.
        It announces a state file path (matching the ship-<slug>-<ts>.json pattern or using
        the word "stateFile" / "state file"). It reports the resolved flags (bump=patch or
        equivalent). It tells the user to exit plan mode and re-invoke /ship-sdlc without
        re-specifying flags (implicit resume will pick up the saved state). It does NOT
        proceed to Step 1 config loading or any pipeline activity. It does NOT say the
        pipeline "cannot run" without also explaining that state was saved for resume.

