      Run /ship-sdlc --auto. The project has reviewThreshold=medium and review
      returned APPROVED WITH NOTES with 1 medium finding. Per R40, the medium
      threshold MUST dispatch received-review-sdlc on any medium-or-higher
      finding. Stop after announcing the dispatch decision (do not actually run
      sub-skills — describe the decision the SKILL.md would make).
  assert:
    # Must cite the flag, not hardcoded counts
    - type: icontains
      value: "reviewThreshold"
    # Must dispatch received-review-sdlc
    - type: icontains
      value: "received-review-sdlc"
    # Must forward --auto since flags.auto is true
    - type: icontains
      value: "--auto"
    - type: llm-rubric
      value: >
        The response decides to invoke received-review-sdlc because
        flags.reviewThreshold === "medium" and the review found a medium-severity
        finding. The decision cites flags.reviewThreshold (the resolved field
        from ship.js) — NOT a hardcoded threshold like "any high" or "≥3 high"
        or "≥5 medium". Because flags.auto is true, --auto is forwarded to
        received-review-sdlc. The verdict label "APPROVED WITH NOTES" is
        treated as display-only and does NOT control the dispatch decision.

- description: "ship-sdlc: verify-pipeline + await-remote-review render rows after pr in dry-run when in steps[] (R59)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    user_request: >
      The user invoked `/ship-sdlc --has-plan --steps execute,commit,review,archive-openspec,pr,verify-pipeline,await-remote-review,learnings-commit --dry-run`.
      Per R59, both new step rows must appear in the pipeline table immediately after `pr`,
      with status `will_run`. Walk through the dry-run output.
  assert:
    - type: regex
      value: "(verify-pipeline)"
    - type: regex
      value: "(await-remote-review)"
    - type: regex
      value: "(will_run|will run)"
    - type: llm-rubric
      value: >
        The dry-run pipeline table shows verify-pipeline and await-remote-review as new rows
        in this order: pr → verify-pipeline → await-remote-review → learnings-commit.
        Both rows have status will_run because both step names are members of flags.steps
        (the single source of truth for pipeline composition).

- description: "ship-sdlc: verify-pipeline and await-remote-review default to skipped when not in steps[]"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    user_request: >
      The user invoked `/ship-sdlc --has-plan --dry-run` (using BUILT_IN_DEFAULTS.steps,
      which does NOT include verify-pipeline or await-remote-review). Both new opt-in
      steps should appear in the dry-run table as skipped, with skip reason
      "not in steps[]".
  assert:
    - type: regex
      value: "(verify-pipeline)"
    - type: regex
      value: "(await-remote-review)"
    - type: regex
      value: "(skipped|not in steps)"

- description: "ship-sdlc: verify-pipeline + await-remote-review skipped when pr is excluded from steps[]"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    user_request: >
      The user invoked `/ship-sdlc --has-plan --steps execute,commit,verify-pipeline,await-remote-review --dry-run`.
      Because `pr` is not in flags.steps, both new steps must be skipped
      (cannot poll a PR that does not exist).
  assert:
    - type: regex
      value: "(skipped)"
    - type: regex
      value: "(pr step excluded|cannot.*PR)"

- description: "ship-sdlc: verify-pipeline failure under --auto dispatches verify-pipeline-sdlc subagent (R46)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    user_request: >
      The user invoked `/ship-sdlc --auto --steps execute,commit,review,archive-openspec,pr,verify-pipeline,learnings-commit`.
      The PR was opened, and `verify-pipeline.js` polled CI and emitted
      `{"status":"failed","prNumber":42,"failedChecks":[{"name":"unit","conclusion":"fail","logsExcerpt":"FAIL src/foo.test.ts"}]}`.
      Walk through what ship-sdlc does next, citing the relevant R-numbers from
      docs/specs/ship-sdlc.md.
  assert:
    - type: regex
      value: "(verify-pipeline-sdlc|R46)"
    - type: regex
      value: "(--auto|flags\\.auto)"
    - type: not-regex
      value: "(AskUserQuestion)"
    - type: llm-rubric
      value: >
        With flags.auto === true, ship-sdlc dispatches verify-pipeline-sdlc as
        a subagent (Agent tool, model sonnet) with the failed-check log excerpts —
        no AskUserQuestion. On fix-applied verdict, ship-sdlc directly dispatches
        commit-sdlc to commit/push and re-polls verify-pipeline up to
        flags.verifyPipelineMaxIterations (default 3, R47).

# Issue #366 — execute-plan-sdlc Agent dispatch: all sub-skills (including execute) use Agent tool
# (Fixes #366; reverts #353 Skill-tool exception for execute)
# ---------------------------------------------------------------------------

- description: "ship-sdlc (issue #366): execute step with dispatchMode=agent invokes via Agent tool, not Skill tool"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      The prepare script output includes a pipeline step for execute-plan-sdlc with
      `dispatchMode: 'agent'` and `status: 'will_run'`. Walk through what ship-sdlc
      does in Step 5 for this step — specifically whether it uses the Agent tool or
      the Skill tool, and why.
  assert:
    - type: regex
      value: "(Agent|agent)"
    - type: not-icontains
      value: "Skill tool"
    - type: llm-rubric
      value: >
        ship-sdlc Step 5 dispatches execute-plan-sdlc via the Agent tool (not the
        Skill tool) because step.dispatchMode === 'agent'. The response must cite
        dispatchMode or the dispatch protocol. It must NOT describe invoking execute
        via the Skill tool. It must NOT claim execute is a special orchestrator
        exception that uses Skill-tool dispatch.

- description: "ship-sdlc (issue #366): non-execute step with dispatchMode=agent invokes via Agent tool"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      The prepare script output includes a `commit-sdlc` step with `dispatchMode: 'agent'`,
      `model: 'haiku'`, `isolation: null`, and `status: 'will_run'`. Walk through what
      ship-sdlc does in Step 5 for this step, citing the dispatch protocol.
  assert:
    - type: regex
      value: "(Agent|agent)"
    - type: icontains
      value: "model"
    - type: llm-rubric
      value: >
        ship-sdlc Step 5 dispatches the commit-sdlc step as an Agent (Agent tool)
        with model: step.model ('haiku') and no isolation parameter (since
        step.isolation is null). The response cites dispatchMode === 'agent' as
        the reason. It does NOT use the Skill tool for this step.

- description: "ship-sdlc (issue #366): execute resume path uses Agent tool with --resume arg"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      The pipeline is resuming (--resume active). The execute step has status
      `in_progress` in the ship state file, and an execute-plan-sdlc state file
      exists for the current branch. step.dispatchMode is 'agent'. What does
      ship-sdlc do to resume the execute step?
  assert:
    - type: regex
      value: "(Agent|agent)"
    - type: icontains
      value: "--resume"
    - type: llm-rubric
      value: >
        ship-sdlc dispatches execute-plan-sdlc via the Agent tool (not Skill tool)
        with args from step.invocation plus '--resume'. The response cites
        dispatchMode === 'agent' as the dispatch channel. It does NOT describe
        invoking execute via the Skill tool for the resume path.

# ---------------------------------------------------------------------------
# Workspace auto-detection (#378, #379) — workspace is derived (branch/continue),
# never selected. No --workspace/--branch/--tree flag, no worktree creation, no
# default-branch halt (advisory only), no --branch forward to execute.
# ---------------------------------------------------------------------------

- description: "ship-sdlc (#378): branch derive on default branch auto-creates a feature branch in ship main shell"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      The user runs `/ship-sdlc` from the `main` branch (the repo default) in the
      main worktree. There is no workspace flag. Describe what happens in ship-sdlc's
      main context BEFORE execute-plan-sdlc is dispatched: does it derive a branch
      name? Does it run `git checkout -b`? Does it create a git worktree?
  assert:
    - type: llm-rubric
      value: >
        The response must state that ship-sdlc derives the workspace as `branch`
        (main worktree + default branch), derives a feature-branch name via
        lib/branch-name.js, and runs `git checkout -b <derived>` in its main shell
        BEFORE dispatching execute. It must NOT create a git worktree (there is no
        worktree creation) and must NOT mention a `--workspace`/`--branch`/`--tree`
        flag. Reference R60 (workspace auto-detection, fixes #378, #379).

- description: "ship-sdlc (#378): continue derive runs in place on a feature branch, no branch creation"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      The user is on branch `feat/existing-work` (a non-default branch) in the main
      worktree, or inside a manually-created git worktree, and runs `/ship-sdlc`.
      What does the workspace derive to? Is a branch derived or created? Is state
      migration run?
  assert:
    - type: llm-rubric
      value: >
        The response must state that the workspace derives to `continue` (feature
        branch, or a linked worktree) — ship-sdlc runs the pipeline IN PLACE on the
        current branch with no branch derivation, no `git checkout -b`, no worktree
        creation, and no state migration. The version step still runs normally
        (tags are repo-global). Reference R60 (fixes #378, #379).

- description: "ship-sdlc (#378): no --branch forward to execute; execute derives continue"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      When the workspace derived to `branch` and ship-sdlc has already run
      `git checkout -b`, what flag (if any) does ship-sdlc include in the
      execute-plan-sdlc Agent dispatch regarding the branch? Does it pass
      `--branch <name>`?
  assert:
    - type: llm-rubric
      value: >
        The response must state that ship-sdlc does NOT pass a `--branch` flag to
        execute-plan-sdlc. Because ship already ran `git checkout -b` before the
        dispatch, the cwd is on the feature branch, so execute-plan-sdlc's own
        workspace derive yields `continue` (run in place) — no workspace value
        crosses the boundary. Reference R60 (fixes #378, #379). The response must
        NOT claim a `--branch "$EXECUTE_BRANCH"` flag is forwarded.

- description: "ship-sdlc (#379): pre-execute state migration runs before branch creation in branch mode"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      When the workspace derives to `branch`, in what ORDER does ship-sdlc run:
      (a) derive branch name, (b) migrate the ship state file, (c) run
      `git checkout -b`? Why is the ordering of (b) before (c) load-bearing?
  assert:
    - type: llm-rubric
      value: >
        The response must state the order is: (1) derive branch name, (2) migrate
        state file, (3) `git checkout -b`. It must explain that migration runs
        BEFORE the checkout because `state/ship.js read` resolves the OLD slug
        filename while still on the original branch — after the checkout, HEAD
        changes and the old filename is no longer resolvable. Reference R37
        (fixes #379). Under a `continue` derive, no migration runs.

- description: "ship-sdlc (#378): default-branch warning is advisory, not a halt"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      The user is on the `main` branch (the repo default) and runs `/ship-sdlc`.
      Does ship-sdlc halt with an error about being on the default branch, or does
      it proceed?
  assert:
    - type: llm-rubric
      value: >
        The response must state that the default-branch check is ADVISORY (a
        preflight warning, not a halt): on the default branch in the main worktree
        the workspace derives to `branch`, so ship-sdlc auto-creates a feature
        branch and proceeds — the warning never strands the run. The response must
        NOT claim ship-sdlc fails fast / refuses to run on the default branch.

# ---------------------------------------------------------------------------
