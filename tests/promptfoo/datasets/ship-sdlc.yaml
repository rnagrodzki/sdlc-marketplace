# ---------------------------------------------------------------------------
# R-post-version-ancestry (#349) — post-version tag ancestry HARD GATE
# ---------------------------------------------------------------------------

- description: "ship-sdlc: aborts pipeline when version tag is not ancestor of feature branch (#349)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-ancestry-abort.md"
    user_request: >
      After the version step runs and produces tag v1.2.3, ship-sdlc runs the post-version
      ancestry check via verify-tag-ancestry.js and it returns exit code 1 (tag is not an
      ancestor of feat/my-feature). Describe exactly what ship-sdlc does: does it abort,
      what error message does it emit, and what remediation does it tell the user?
  assert:
    - type: icontains
      value: "v1.2.3"
    - type: icontains
      value: "feat/my-feature"
    - type: icontains
      value: "git push origin :refs/tags/"
    - type: llm-rubric
      value: >
        The response states that ship-sdlc aborts the pipeline (exits non-zero / halts)
        when verify-tag-ancestry.js returns a non-zero exit code, and emits an error
        message containing both the tag name (v1.2.3) and the branch name (feat/my-feature).
        It also provides the remediation command to delete the tag
        (git push origin :refs/tags/v1.2.3 and git tag -d v1.2.3) and instructs the user
        to re-run the version step on the correct branch. The response does NOT proceed
        to the PR step after the failure.

- description: "ship-sdlc: plan-mode-blocked announces resolved flags for resume (#400)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      Plan mode is active. Run /ship-sdlc --bump minor --steps execute,commit,review,pr.
      The system context indicates plan mode is currently enabled. Show what the skill
      announces about saved flags and how the user should proceed.
  assert:
    - type: icontains
      value: "plan mode"
    - type: icontains
      value: "minor"
    - type: llm-rubric
      value: >
        The response announces the resolved flags to the user: bump=minor and
        steps=execute,commit,review,pr (or equivalent phrasing). It shows a state file
        path (or confirms state was saved). It instructs the user to exit plan mode and
        re-invoke /ship-sdlc (no flags needed) — the saved state enables implicit resume.
        It does not require the user to re-specify --bump minor or --steps on the next run.

- description: "ship-sdlc: main-thread TodoWrite markers appear at every step transition (#427)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      Run /ship-sdlc --auto --steps execute,commit,review,pr --dry-run. The project context
      is provided above. Walk through the pipeline up to and including the dry-run table.
      For each step that WILL run, emit a [task-tray] stdout marker showing the
      transition (init, step <name>, ..., final). Demonstrate that the main thread
      issues TodoWrite calls and prints the marker alongside each call. Do not invoke
      any sub-skills.
  assert:
    # Initial setup marker is emitted before the pipeline table
    - type: icontains
      value: "[task-tray] init:"
    # Per-step transition markers appear for each will_run step
    - type: regex
      value: "\\[task-tray\\] step execute:"
    - type: regex
      value: "\\[task-tray\\] step commit:"
    - type: regex
      value: "\\[task-tray\\] step review:"
    - type: regex
      value: "\\[task-tray\\] step pr:"
    # Counts format is well-formed: pending=N, in_progress=N, completed=N
    - type: regex
      value: "pending=\\d+, in_progress=\\d+, completed=\\d+"
    # Behavioral: TodoWrite is called from main thread, not just text
    - type: llm-rubric
      value: >
        The response demonstrates that the MAIN thread (not a dispatched sub-agent)
        calls the TodoWrite tool at the start of the pipeline (init) and before each
        step transition. Each TodoWrite call is paired with a [task-tray] stdout
        marker. The response does NOT claim that sub-agent TodoWrite calls bubble up
        to the parent — it instead documents that main-thread calls are the source
        of task-tray visibility.

# ---------------------------------------------------------------------------
# verify-openspec step (#441) — ran-result vs text-fallback
# ---------------------------------------------------------------------------

- description: "ship-sdlc (#441): verify-openspec ran — report result, suppress fallback text"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-verify-openspec-step.md"
    user_request: >
      Using Scenario A from the context (verify-openspec is will_run with --change add-auth),
      walk through the verify-openspec dispatch section. Show how ship-sdlc dispatches the step,
      handles a "satisfied" verdict, and what appears in the REPORT section for OpenSpec.
      Do not dispatch any sub-skills — describe the behavior based on SKILL.md prose.
  assert:
    - type: icontains
      value: "verify-openspec"
    - type: icontains
      value: "satisfied"
    - type: not-icontains
      value: "→ Run openspec validate --strict"
    - type: llm-rubric
      value: >
        The response describes running verify-openspec inline via openspec validate --strict
        with --change add-auth. It shows the satisfied verdict path: logging
        "openspec validate --strict: passed" and proceeding to archive-openspec. In the REPORT
        section, it prints the verify result (e.g., "openspec validate --strict: passed") and
        does NOT emit the "→ Run openspec validate --strict" fallback text, because the step
        ran. The response correctly cites step.status === 'will_run' from the prepare output
        (not $ARGUMENTS) as the gate condition.

- description: "ship-sdlc (#441): verify-openspec not configured — fallback text appears in REPORT"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-verify-openspec-step.md"
    user_request: >
      Using Scenario B from the context (verify-openspec is skipped with reason "not in steps[]"),
      describe what ship-sdlc emits in the REPORT section for OpenSpec. The pipeline ran to
      completion with archive-openspec executing successfully. Show exactly what OpenSpec-related
      lines appear in REPORT. Do not dispatch any sub-skills.
  assert:
    - type: icontains
      value: "→ Run openspec validate --strict"
    - type: llm-rubric
      value: >
        The response shows that when verify-openspec is not in flags.steps (Scenario B),
        REPORT emits the "→ Run openspec validate --strict <change> to validate implementation
        completeness against the spec" fallback text. It does NOT show a verify result because
        the step did not run. The archive-openspec result (archived successfully) is reported
        separately. This demonstrates the KD6 conditional text behavior: ran-result when the
        step executed, fallback suggestion when it was absent from steps.

- description: "ship-sdlc (R-progressive-disclosure): common-path branch-mode run does not read cold/worktree companion files"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      Ship it. No flags. A plan is in context, changes are committed, and the
      run is on the main worktree on the default branch (so the workspace derives
      to `branch`). Walk through the pipeline steps you would take from Step 1
      through Step 6, naming any companion files you would Read. Do not actually
      dispatch sub-skills.
  assert:
    # Note: bare filenames (entry-modes.md etc.) legitimately appear in SKILL.md as
    # gated pointers, so a not-icontains on the filename would false-fail when the model
    # correctly explains "no --gc, so I skip the entry-modes.md handler." The rubric below
    # checks the ACTION (did the model actually take a companion read?), not string presence.
    - type: llm-rubric
      value: >
        The walkthrough proceeds through the common ship path (execute, commit,
        review, version, pr) WITHOUT actually performing a Read of either of the
        two companions entry-modes.md or reference.md. Those are on-demand
        companions gated on --gc/--init-config/dry-run or a failure/edge case —
        none of which apply to a no-flag run, so neither should be read. Merely
        noting that a companion WOULD be read under a flag that is not present
        (e.g. "no --gc, so the entry-modes.md gc handler is skipped") is correct
        behavior and must PASS. The inline post-version ancestry HARD GATE may be
        mentioned — it is NOT a companion read. There is no workspace-worktree.md
        companion (workspace is auto-detected).

- description: "ship-sdlc (R-progressive-disclosure): --gc reads entry-modes.md gc section"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      Run /ship-sdlc --gc. Describe the handler you would follow, naming any
      companion file you Read. Do not run the pipeline.
  assert:
    - type: icontains
      value: "entry-modes.md"
    # Structural: must reference the gc-specific surface (ship.js --gc), not init-config
    - type: icontains
      value: "ship.js"
    - type: not-icontains
      value: "ship-init.js"
    - type: llm-rubric
      value: >
        The --gc handler is dispatched by Reading ./entry-modes.md (the --gc
        section) and following it. The handler short-circuits — the pipeline does
        NOT run. The response should not walk through execute/commit/review/pr.

- description: "ship-sdlc (R-progressive-disclosure): --init-config reads entry-modes.md init-config section"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/ship-sdlc/SKILL.md"
    project_context: "file://fixtures/ship-pipeline-ready.md"
    user_request: >
      Run /ship-sdlc --init-config. Describe the handler you would follow, naming
      any companion file you Read. Do not run the pipeline.
  assert:
    - type: icontains
      value: "entry-modes.md"
    # Structural: must reference the init-config-specific surface (setup-sdlc redirect), not gc
    - type: icontains
      value: "setup-sdlc"
    - type: llm-rubric
      value: >
        The --init-config handler is dispatched by Reading ./entry-modes.md (the
        --init-config section) and following it (which suggests /setup-sdlc and,
        if the user insists, runs ship-init.js). The handler short-circuits — no
        pipeline execution.

# worktree-mode companion case removed (#378, #379): workspace-worktree.md is
# deleted (workspace auto-detected — no worktree-mode branch to extract).
