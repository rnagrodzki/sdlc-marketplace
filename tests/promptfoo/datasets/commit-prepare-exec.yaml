# ---------------------------------------------------------------------------
# Fixes #398/#399 — default-branch guard + persistent manifest exec tests
# ---------------------------------------------------------------------------

- description: "commit-prepare: --auto on default branch without override → blocking error in errors[] (R14/#398)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_args: "--auto"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-on-default-branch"
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return Array.isArray(o.errors) && o.errors.length > 0 &&
          o.errors.some(e => typeof e === 'string'
            ? e.includes('default branch')
            : (e.id || '').includes('default-branch') || (e.message || '').includes('default branch'));
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return o.onDefaultBranch === true;

- description: "commit-prepare: --auto --force-default-branch on default branch → warning only, no blocking error (R14/#398)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_args: "--auto --force-default-branch"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-on-default-branch"
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return Array.isArray(o.errors) && o.errors.length === 0;
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return Array.isArray(o.warnings) && o.warnings.some(w =>
          (typeof w === 'string' ? w : w.message || '').toLowerCase().includes('default branch'));
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return o.onDefaultBranch === true && o.flags && o.flags.forceDefaultBranch === true;

- description: "commit-prepare: feature branch with --auto → no default-branch warning or error (R14/#398)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_args: "--auto"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-no-wip"
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return o.onDefaultBranch === false;
    - type: javascript
      value: |
        const o = JSON.parse(output);
        const hasDefaultBranchError = Array.isArray(o.errors) &&
          o.errors.some(e => (typeof e === 'string' ? e : e.message || '').includes('default branch'));
        const hasDefaultBranchWarning = Array.isArray(o.warnings) &&
          o.warnings.some(w => (typeof w === 'string' ? w : w.message || '').toLowerCase().includes('default branch'));
        return !hasDefaultBranchError && !hasDefaultBranchWarning;

- description: "commit-prepare: manifest path is .sdlc/execution/commit-<slug>-<ts>.json not tmpdir (R15/#399)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-on-default-branch"
    script_passthrough: true
  assert:
    - type: regex
      value: '\.sdlc/execution/commit-[a-z0-9\-]+-\d{8}T\d{6}Z\.json\s*$'
    - type: not-regex
      value: 'commit-context-'
    - type: not-icontains
      value: '"flags":'

- description: "commit-prepare: prune-on-write removes prior same-branch manifests, preserves other-branch (R15/#399)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-on-default-branch"
    script_env: '{"SDLC_STATE_DIR_OVERRIDE": "{{project_root}}/.sdlc/execution"}'
    script_passthrough: true
  assert:
    - type: javascript
      value: "file://assertions/commit-prune-on-write.js"

- description: "commit-prepare: manifest survives after script exits (cross-shell survival, R15/#399)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-on-default-branch"
    script_passthrough: true
  assert:
    - type: javascript
      value: "file://assertions/commit-cross-shell-survival.js"

- description: "commit-prepare: --force-default-branch on feature branch is no-op, no default-branch signals (R14/#398)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_args: "--force-default-branch"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-no-wip"
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return o.onDefaultBranch === false && Array.isArray(o.errors) && o.errors.length === 0;
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return o.flags && o.flags.forceDefaultBranch === true;
