  assert:
    - type: icontains
      value: '"fileCount": 25'
    - type: icontains
      value: '"diffStat"'

- description: "commit-prepare: small diff is not truncated"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-no-config"
  assert:
    - type: icontains
      value: '"diffTruncated": false'
    - type: icontains
      value: '"truncatedFiles": []'

- description: "commit-prepare: --output-file writes payload to temp file and prints absolute path"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_args: "--output-file"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-no-config"
    script_passthrough: true
  assert:
    # stdout is an absolute path, not the JSON payload
    - type: regex
      value: '^/.+/commit-context-[0-9a-f]+\.json\s*$'
    # The payload should NOT be on stdout when --output-file is set
    - type: not-icontains
      value: '"flags":'

- description: "commit-prepare: without --output-file, output is still a tmpdir path (issue #209 — stdout-JSON fallback removed)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-no-config"
    script_passthrough: true
  assert:
    # The stdout-JSON branch was removed in #209; writeOutput now always writes
    # to os.tmpdir() and prints only the path. The legacy "JSON inline" branch
    # is gone.
    - type: regex
      value: '^/(tmp|var|private)/.+commit-context-[0-9a-f]+\.json\s*$'
    - type: not-icontains
      value: '"flags":'
    # Cwd MUST NOT contain a stray *-context-*.json after the run.
    - type: not-icontains
      value: 'cwd-leak'

- description: "commit-prepare: --output-file path is under os.tmpdir() (issue #209 regression test)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_args: "--output-file"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-no-config"
    script_passthrough: true
  assert:
    # Path must start with /tmp, /var, or /private — never the project root.
    - type: regex
      value: '^/(tmp|var|private)/.+commit-context-[0-9a-f]+\.json\s*$'
    # Sanity: payload absent from stdout
    - type: not-icontains
      value: '"flags":'

# ---------------------------------------------------------------------------
# Fixes #392 / R35 — wip(execute): squash detection
# ---------------------------------------------------------------------------

- description: "commit-prepare: --no-squash-wip flag parses correctly"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_args: "--no-squash-wip"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-no-config"
  assert:
    - type: icontains
      value: '"noSquashWip": true'

- description: "commit-prepare: wipSquash.commits populated when wip(execute) commits exist since fork-point (#392)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-wip-squash-clean"
  assert:
    - type: icontains
      value: '"wipSquash"'
    - type: icontains
      value: '"commits"'
    # Two wip(execute): wave N commits exist on the feature branch
    - type: regex
      value: '"commits":\s*\[\s*"[0-9a-f]{40}",\s*"[0-9a-f]{40}"\s*\]'
    - type: icontains
      value: '"stagedClean": true'

- description: "commit-prepare: wipSquash.stagedClean=false when user staged hand-edits on top (#392)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-wip-squash-with-staged"
  assert:
    - type: icontains
      value: '"wipSquash"'
    # One wip(execute) commit on the branch
    - type: regex
      value: '"commits":\s*\[\s*"[0-9a-f]{40}"\s*\]'
    - type: icontains
      value: '"stagedClean": false'

- description: "commit-prepare: wipSquash.commits empty when only normal commits exist (#392)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-no-wip"
  assert:
    - type: icontains
      value: '"wipSquash"'
    - type: regex
      value: '"commits":\s*\[\s*\]'

# R-expected-branch (issues #347, #348, #349): --expected-branch flag is parsed and validated.

- description: "commit-prepare: no --expected-branch flag emits branchGuard.active=false (R-expected-branch, #347)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-config"
  assert:
    - type: icontains
      value: '"active": false'

- description: "commit-prepare: --expected-branch matching current branch emits branchGuard.ok=true (R-expected-branch, #348)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_args: "--expected-branch main"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-config"
  assert:
    - type: icontains
      value: '"ok": true'
    - type: icontains
      value: '"active": true'

- description: "commit-prepare: --expected-branch mismatching current branch exits non-zero with stderr (R-expected-branch, #348)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_args: "--expected-branch feat/nonexistent-branch"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-config"
    script_capture_stderr: true
  assert:
    - type: icontains
      value: '"ok": false'
    - type: icontains
      value: "feat/nonexistent-branch"

- description: "commit-prepare: branchGuard field present in successful output (R-expected-branch, #349)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-config"
  assert:
    - type: icontains
      value: '"branchGuard":'
