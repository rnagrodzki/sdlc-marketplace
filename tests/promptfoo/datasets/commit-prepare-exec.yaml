# Script execution tests for commit-prepare.js.
# These tests run commit-prepare.js directly against fixture directories (no LLM).
# Ported from tests/unit/commit-prepare.test.js.

- description: "commit-prepare: default flags with no args"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-no-config"
  assert:
    - type: icontains
      value: '"noStash": false'
    - type: icontains
      value: '"amend": false'
    - type: icontains
      value: '"auto": false'

- description: "commit-prepare: --type feat parses correctly"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_args: "--type feat"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-no-config"
  assert:
    - type: icontains
      value: '"type": "feat"'

- description: "commit-prepare: --scope auth parses correctly"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/commit.js"
    script_args: "--scope auth"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-no-config"
  assert:
    - type: icontains
      value: '"scope": "auth"'

- description: "commit-prepare: --no-stash flag"
  vars:
