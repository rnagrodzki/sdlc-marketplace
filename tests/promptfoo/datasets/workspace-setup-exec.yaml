# ---------------------------------------------------------------------------
# T11 AC#5 — existing-worktrees: mismatchesByLayout populated correctly
# Fixture has inside-layout worktree, config set to sibling.
# setup.js should report the inside-layout worktree as a sibling mismatch.
# ---------------------------------------------------------------------------
- description: "workspace-setup (#351 T11): mismatchesByLayout.sibling contains inside-layout worktree"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    project_root: "file://fixtures-fs/workspace-setup-existing-worktrees"
    script_cwd: "{{project_root}}"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        const ws = out.sections && out.sections.find(s => s.id === 'workspace');
        if (!ws || !ws.context) return false;
        const mm = ws.context.mismatchesByLayout;
        return Array.isArray(mm.sibling) && mm.sibling.length > 0 &&
               mm.sibling[0].currentPath.includes('.claude/worktrees') &&
               Array.isArray(ws.context.existingWorktrees) && ws.context.existingWorktrees.length > 0
