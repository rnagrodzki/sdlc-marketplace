# Exec tests for workspace-fields.js validators and workspace-context.js
# existingWorktrees/computeMismatches (issue #351 T11).
#
# Validator cases use tests/promptfoo/scripts/workspace-fields-test.js as the
# driver so validate() functions (stripped from JSON.stringify in setup.js) can
# be exercised directly.
#
# The existing-worktrees case uses setup.js directly to verify that
# mismatchesByLayout is populated when a linked worktree exists under a
# layout that differs from the configured layout.

# ---------------------------------------------------------------------------
# T11 AC#3 — invalid base (path traversal)
# ---------------------------------------------------------------------------
- description: "workspace-fields: base='../etc' rejected with TypeError mentioning '..'"
  vars:
    script_path: "repo://tests/promptfoo/scripts/workspace-fields-test.js"
    script_args: "--case base-traversal"
    project_root: "file://fixtures-fs/project-setup-empty"
    script_cwd: "{{project_root}}"
  assert:
    - type: contains
      value: '"pass":true'

# ---------------------------------------------------------------------------
# T11 AC#3 — invalid base (relative non-~ path)
# ---------------------------------------------------------------------------
- description: "workspace-fields: base='some/relative' rejected (not absolute, not ~)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/workspace-fields-test.js"
    script_args: "--case base-relative"
    project_root: "file://fixtures-fs/project-setup-empty"
    script_cwd: "{{project_root}}"
  assert:
    - type: contains
      value: '"pass":true'

