# Script execution tests for validate-discovery.js.
# These tests run validate-discovery.js directly against real fixture directories (no LLM).
# They validate that the script's 16 checks produce correct output.
#
# Fixture appropriateness:
#   healthy-marketplace  -- CORRECT: all 16 checks should pass
#   broken-marketplace   -- CORRECT: PD2(warning), PD9(error), PD11(error), PD15(error) should fail
#   overall fail because total_errors > 0

- description: "sdlc-plugin-discovery: healthy marketplace passes all 16 checks"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-discovery.js"
    script_args: "--project-root {{project_root}} --json"
    project_root: "file://fixtures-fs/healthy-marketplace"
  assert:
    # Overall must be pass
    - type: icontains
      value: '"overall": "pass"'
    # Zero total errors
    - type: regex
      value: '"total_errors":\s*0'
    # All 16 checks present
    - type: regex
      value: '"total":\s*16'
    # No failed checks
    - type: not-icontains
      value: '"status": "fail"'

- description: "sdlc-plugin-discovery: broken marketplace reports errors"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-discovery.js"
    script_args: "--project-root {{project_root}} --json"
    project_root: "file://fixtures-fs/broken-marketplace"
  assert:
    # Overall must be fail (because errors > 0)
    - type: icontains
      value: '"overall": "fail"'
    # Must have errors
    - type: regex
      value: '"total_errors":\s*[1-9]'
    # Must reference PD9 (missing skill reference) — error severity
    - type: icontains
      value: '"id": "PD9"'
    # Must reference PD11 (missing skill description) — error severity
    - type: icontains
      value: '"id": "PD11"'
    # Must reference PD15 (invalid hooks.json) — error severity
    - type: icontains
      value: '"id": "PD15"'

- description: "sdlc-plugin-discovery: markdown output contains report header and PASS"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-discovery.js"
    script_args: "--project-root {{project_root}} --markdown"
    project_root: "file://fixtures-fs/healthy-marketplace"
  assert:
    # Must have the markdown report header
    - type: icontains
      value: "Plugin Discovery Validation Report"
    # Must show PASS in overall line
    - type: icontains
      value: "PASS"
    # Must have a checks table
    - type: regex
      value: '\| ID \| Check'
