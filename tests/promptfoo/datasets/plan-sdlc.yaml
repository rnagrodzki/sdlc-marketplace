#   plan-orchestrator-dispatch     -- CORRECT: 4+ file scope + non-null manifestPath; exercises R24 orchestrator dispatch path; now includes lanes[]/lensReviewers[] (Fixes #418)
#   plan-web-mode-trigger          -- CORRECT: webResearchSignal: true + brief with web/hybrid dims; exercises R25a web requirement
#   plan-web-mode-suppressed       -- CORRECT: pure-refactor + webResearchSignal: false; exercises R25a web suppression
#   plan-lightweight-skip          -- CORRECT: ≤3-file scope + manifestPath: null; exercises R24 lightweight skip
#   plan-orchestrator-fallback     -- CORRECT: explorePack.error non-null; exercises R28 fallback path
#   plan-g17-create-new-glob-family    -- CORRECT: C2 create proposal for uncovered path prefix (Fixes #417)
#   plan-g17-update-rename-drift       -- CORRECT: U3 update proposal for directory rename trigger staleness (Fixes #417)
#   plan-g17-behavior-mod-no-new-files -- CORRECT: B1 update-behavior proposal for public CLI flag addition (Fixes #417)
#   plan-g17-doc-only-suppressed       -- CORRECT: doc-only diff suppresses all G17 proposals, empty findings (Fixes #417)
