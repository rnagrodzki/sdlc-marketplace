#   plan-contract-docs                 -- CORRECT: docs/openspec plan; settled + unsettled tasks; exercises G18 settlement gate (Fixes #459)

# --- Fan-out parallelization cases (P1/P2/P3 — Fixes #418) ---

- description: "plan-sdlc: P1-fanout — Step 3 dispatches 5 lane Agents in a single message using lanes[] (Fixes #418)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-orchestrator-dispatch.md"
    user_request: >
      Run /plan-sdlc. Step 3 (CRITIQUE) is about to begin. The prepare output includes
      lanes[] with 5 entries (static-structural, content-coverage, file-existence,
      guardrail-compliance, dimension-coverage) each with a promptTemplatePath.
      Describe exactly how Step 3 dispatches its gate evaluations.
  assert:
    - type: llm-rubric
      value: >
        The response accurately describes Step 3 as dispatching ALL FIVE lane Agents
        in a SINGLE message (parallel dispatch). Key facts that must be present:
        (1) all 5 lanes are dispatched simultaneously in one message, not sequentially;
        (2) dispatch parameters (subagent_type, model, prompt) are sourced verbatim from
        lanes[i] entries in the prepare output — no hardcoded values;
        (3) the main agent JOINs on all five lanes before writing the critiqueRan marker;
        (4) the guardrailsEvaluated marker fires only after the guardrail-compliance lane
        (lanes[3]) returns — not before;
        (5) all 17 gate IDs (G1–G17) are covered across the 5 lanes with no gate
        appearing in two lanes (disjoint partitioning).

- description: "plan-sdlc: P2-fanout — Step 5 dispatches 2-3 lens reviewers in a single message per iteration for >=5-task plans (Fixes #418)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-orchestrator-dispatch.md"
    user_request: >
      Run /plan-sdlc. The plan has 7 tasks (>=5) and is written by sonnet.
      Step 5 (CRITIQUE / Plan Review Loop) is about to begin.
      The prepare output includes lensReviewers[] with 3 entries (architecture,
      requirements, risk). Describe how Step 5 dispatches reviewers for this plan.
  assert:
    - type: llm-rubric
      value: >
        The response accurately describes Step 5 for a >=5-task plan as dispatching
        ALL lens reviewers from lensReviewers[] in a SINGLE message per iteration
        (parallel dispatch, not sequential). Key facts:
        (1) all 3 lens reviewers dispatched simultaneously in one message per iteration;
        (2) dispatch parameters sourced verbatim from lensReviewers[i] — no hardcoded values;
        (3) since plan is written by sonnet, all lenses use opus (cross-model strategy);
        (4) merge semantics: Status=Approved iff ALL lenses approved; Issues=union with
        dedup; Recommendations=prefix-dedup;
        (5) iteration counter increments by 1 per complete fan-out, not per reviewer
        dispatch; max 3 iterations preserved.

- description: "plan-sdlc: P3-fallback — inline exploration issues Glob/Grep/Read calls in a SINGLE message (Fixes #418)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-lightweight-skip.md"
    user_request: >
      Run /plan-sdlc. The scope is lightweight (scopeHintCount=2, manifestPath=null).
      The orchestrator is skipped. Describe how the inline codebase exploration
      is performed in terms of tool call dispatch.
  assert:
    - type: llm-rubric
      value: >
        The response describes inline codebase exploration as issuing all Glob, Grep,
        and Read calls in a SINGLE message as parallel tool calls — not sequentially.
        The response should indicate this applies both to the lightweight-scope path
        (orchestrator skipped) and to any error-fallback path. The "SINGLE message"
        requirement should be mentioned explicitly or clearly implied by describing
        them as parallel. The response must not describe sequential tool calls for
        inline exploration.

- description: "plan-sdlc: asks whether to execute after plan is written"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-written.md"
    user_request: >
      Run /plan-sdlc. The plan has been written to ~/.claude/plans/2026-03-19-user-authentication.md
      and passed the plan review loop. Step 7 handoff is now active. Present the next action
      options to the user.
  assert:
    # Must offer execute as a next action
    - type: icontains
      value: "/execute-plan-sdlc"
    # Must offer commit as an option
    - type: icontains
      value: "/commit-sdlc"
    # Must offer done as an option
    - type: icontains
      value: "done"
    # Behavioral: interactive choice to execute or stop
    - type: llm-rubric
      value: >
        The response asks the user whether to execute the plan now, presenting an interactive
        choice rather than a passive suggestion. The menu includes at minimum: execute
        (/execute-plan-sdlc), commit (/commit-sdlc), and done. The response mentions the plan
        file path and waits for the user to select an option before proceeding.

- description: "plan-sdlc: --from-openspec adopts tasks.md as primary skeleton"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-from-openspec.md"
    user_request: >
      Run /plan-sdlc --from-openspec add-resource-indicators. The plan-prepare.js output
      and OpenSpec artifacts are provided in the project context above. The --from-openspec
      flag was passed, fromOpenspec.valid is true, and tasks.md is present with 5 tasks.
      Process Step 0 (context detection, fromOpenspecDirect handling) and Step 1
      (fromOpenspecDirect enrichment). Show how you would begin decomposition in Step 2,
      using tasks.md as the primary skeleton.
  assert:
    # Must use tasks.md as skeleton
    - type: icontains
      value: "tasks.md"
    # Must include SDLC metadata in tasks
    - type: icontains
      value: "Complexity"
    - type: icontains
      value: "Risk"
    # Must NOT show the 3-option gate check prompt
    - type: not-icontains
      value: "Start OpenSpec flow"
    # Behavioral: tasks.md drives decomposition, not structured discovery
    - type: llm-rubric
      value: >
        The response uses the OpenSpec tasks.md checklist as the primary decomposition
        skeleton. It does NOT present a 3-option gate check (Start OpenSpec flow / Continue
        planning directly / Use existing spec). It does NOT ask structured discovery
        questions (scope, integration, success). Instead, it adopts the 5 tasks from
        tasks.md, enriches them with SDLC metadata (Complexity, Risk, Depends on, Verify),
        and expands descriptions to be self-contained for agent dispatch. The delta specs
        are referenced as authoritative requirements.

- description: "plan-sdlc: --from-openspec without tasks.md falls back to standard decomposition"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-from-openspec-no-tasks.md"
    user_request: >
      Run /plan-sdlc --from-openspec add-webhooks. The plan-prepare.js output and OpenSpec
      artifacts are provided in the project context above. The --from-openspec flag was
      passed, fromOpenspec.valid is true, but hasTasks is false (no tasks.md). Process
      Step 0 and show how you would proceed with Steps 1 and 2 without a tasks.md skeleton.
  assert:
    # Must still load OpenSpec artifacts
    - type: icontains
      value: "proposal"
    # Must mention delta specs as requirements
    - type: icontains
      value: "spec"
    # Must decompose from specs (not from tasks.md)
    - type: llm-rubric
      value: >
        The response processes the --from-openspec flag successfully despite tasks.md being
        absent. It falls back to standard decomposition using the delta specs
        (webhook-delivery.md, webhook-registration.md) as authoritative requirements. It
        reads the proposal for scope and uses the ADDED sections from delta specs to derive
        tasks. It does NOT error out or ask the user to create tasks.md first. The gate
        check is still bypassed because --from-openspec was passed.

- description: "plan-sdlc: emits override audit line when contradictory signal present"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-contradictory-signal.md"
    user_request: >
      Run /plan-sdlc. The plan-prepare.js output and session-start context are provided above.
      The prepare output shows openspec.authoritative.path is set to "openspec/config.yaml".
      The session-start system-reminder contains both SDLC's "OpenSpec: INITIALIZED" line and
      a contradictory "openspec: not initialized" line from a co-installed plugin. Process
      Step 0 (context detection) and show how you handle the contradictory signal before
      proceeding to the gate check.
  assert:
    # Must emit the override audit line
    - type: icontains
      value: "Ignoring contradictory"
    - type: icontains
      value: "not initialized"
    # Must reference the authoritative source
    - type: icontains
      value: "openspec/config.yaml"
    # Must NOT suggest initializing OpenSpec (it's already initialized)
    - type: not-icontains
      value: "Initialize OpenSpec"
    # Behavioral: contradictory signal is dismissed, not acted upon
    - type: llm-rubric
      value: >
        The response detects the contradictory "openspec: not initialized" signal in the
        session context and emits exactly one audit line noting that it is being ignored,
        citing openspec/config.yaml as the authoritative source from the plan.js prepare
        output. The response does NOT treat OpenSpec as uninitialized, does NOT suggest
        running openspec init, and does NOT add an "initialize OpenSpec" task to the plan.
        The skill flow continues normally with OpenSpec detected as present.

- description: "plan-sdlc: new-skill plan includes all four companion artifacts (Fixes #185)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-creates-skill.md"
    user_request: >
      Run /plan-sdlc. The user wants a new skill named example-skill (see project context
      above for the full request and active guardrails). Produce the plan. The
      skill-docs-required guardrail requires that any plan creating
      plugins/*/skills/*/SKILL.md must also create docs/specs/<name>.md,
      docs/skills/<name>.md, a README.md skills-table entry, and a
      site/src/data/skills-meta.ts SkillCard entry. Show the resulting plan with all tasks
      and their Files lists.
  assert:
    # Spec companion (docs/specs)
    - type: icontains
      value: "docs/specs/example-skill.md"
    # Reference doc companion (docs/skills)
    - type: icontains
      value: "docs/skills/example-skill.md"
    # README skills-table row
    - type: icontains
      value: "README.md"
    # SkillCard registry entry
    - type: icontains
      value: "site/src/data/skills-meta.ts"
    # The SKILL.md task itself
    - type: icontains
      value: "plugins/sdlc-utilities/skills/example-skill/SKILL.md"
    # Behavioral: all four companion artifacts present and spec-first ordering respected
    - type: llm-rubric
      value: >
        The plan creates plugins/sdlc-utilities/skills/example-skill/SKILL.md AND includes
        tasks (or file entries within tasks) covering all four companion artifacts:
        (1) docs/specs/example-skill.md, (2) docs/skills/example-skill.md,
        (3) a README.md skills-table row update, and (4) a site/src/data/skills-meta.ts
        SkillCard registry entry. The spec task is ordered before the SKILL.md task
        (spec-first). No companion is omitted. The plan does not include a step that runs
        full-suite or wide-subset promptfoo eval automatically (a single targeted test case
        scoped to the changed surface is allowed under the relaxed #228 policy).


# Issue #228 — relaxed no-auto-eval policy: single targeted test allowed.
- description: "plan-sdlc: no-auto-eval — single targeted test as final verification PASSES guardrail (issue #228)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-creates-skill.md"
    user_request: >
      Plan must include exactly one targeted promptfoo eval test case scoped to the new
      example-skill behavior as a FINAL verification step (after implementation). Do not
      include full-suite or wide-subset eval, and no run-fix-rerun retry loops. The
      single targeted test case is permitted by the no-auto-eval guardrail.
  assert:
    - type: icontains
      value: "single targeted test case"
    - type: llm-rubric
      value: >
        The plan includes exactly one targeted promptfoo eval test case scoped to the
        example-skill change as a final verification step. The plan does NOT include a
        step that runs the full-suite promptfoo eval, does NOT include wide-subset eval,
        and does NOT include tight-loop retry logic (run-fix-rerun). The plan's
        Guardrail Compliance table marks `no-auto-eval` as PASS with a rationale citing
        the single-test carve-out from the relaxed #228 policy.


- description: "plan-sdlc: no-auto-eval — tight-loop retry remains a guardrail FAILURE (issue #228)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-creates-skill.md"
    user_request: >
      Suppose a plan includes a "run promptfoo eval, fix, rerun until green" loop on a
      single test case. Walk through Step 4 (Critique) and explain whether this PASSES
      or FAILS the no-auto-eval guardrail under the relaxed #228 policy.
  assert:
    - type: icontains
      value: "FAIL"
    - type: llm-rubric
      value: >
        The response correctly identifies the tight-loop retry pattern as a no-auto-eval
        guardrail FAILURE. The response cites that under the relaxed policy, single targeted
        test cases are allowed only as one-shot verification — tight-loop retries (run-fix-rerun)
        remain forbidden. The response does NOT classify the plan as PASS.


- description: "plan-sdlc: step-0-and-4-run-autonomously (Fixes #388)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-388-autonomous-flow.md"
    user_request: >
      Run /plan-sdlc. The designated plan file at ~/.claude/plans/2026-05-16-data-export-dry-run.md
      already exists with a stale partial draft (see fixture). Walk through how the new R22/R23
      flow handles Step 0 session recovery and Step 4 plan approval. Show what the user sees from
      the FIRST interaction (Step 0) through the LAST interaction (Step 7 handoff). Be explicit
      about which AskUserQuestion calls fire and which do NOT fire under the new defaults.
  assert:
    # MUST NOT show the removed Step 0 session-recovery prompt
    - type: not-icontains
      value: "Found existing plan draft"
    - type: not-icontains
      value: "Resume from critique"
    # MUST NOT show the removed Step 4 approval prompt
    - type: not-icontains
      value: "Requirements-to-task mapping"
    - type: not-icontains
      value: "Approval loop is unbounded"
    # MUST show Step 7 handoff menu items (the SOLE user touchpoint)
    - type: icontains
      value: "ship"
    - type: icontains
      value: "execute"
    - type: icontains
      value: "done"
    - type: llm-rubric
      value: >
        The response demonstrates the new autonomous Step 0 + Step 4 flow (Fixes #388 R22/R23):
        Step 0 silently overwrites the pre-existing draft plan file without prompting; Step 4
        applies critique fixes and proceeds DIRECTLY to Step 5 without showing a
        "Requirements-to-task mapping" or "approve/change/question" prompt. The response
        explicitly notes that the user sees the plan for the first time at the Step 7
        Handoff menu (ship / execute / done). The response preserves the genuine remaining
        user gates (requirements gathering when ambiguous, OpenSpec routing, reviewer-loop
        escalation, Step 4 error-severity guardrail harden offer, Step 7 menu).

- description: "plan-sdlc: link verification (R18, #198) — invokes script gate at Step 6.5 before handoff"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-creates-skill.md"
    user_request: >
      You wrote a plan file that references https://github.com/wrong-owner/sdlc-marketplace/issues/999.
      Walk through Step 6.5 (Link Verification). Show the exact bash command(s) you would run and what
      happens on non-zero exit. Do not skip to Step 7.
  assert:
    - type: icontains
      value: "scripts/lib/links.js"
    - type: icontains
      value: "Step 7"
    - type: llm-rubric
      value: >
        The response describes invoking plugins/sdlc-utilities/scripts/lib/links.js as a hard gate
        before Step 7 (Handoff), passing the plan file via --file, and explicitly states that on
        non-zero exit Step 7 is NOT entered. The gate is script-enforced. The skill does not propose
        retrying, editing URLs without user input, or bypassing.

# --- Dynamic-dimension orchestrator behavioral tests (issue #408, R24–R28) ---

- description: "plan-sdlc: 4+ file scope dispatches sdlc:plan-explore-orchestrator exactly once (#408 orchestrator dispatch)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-orchestrator-dispatch.md"
    user_request: >
      Run /plan-sdlc. The context above shows plan-prepare.js output with explorePack.manifestPath
      non-null and scopeHintCount 8. Process Step 1. Show how you would dispatch the
      plan-explore-orchestrator. Do not skip to Step 2.
  assert:
    - type: icontains
      value: "plan-explore-orchestrator"
    - type: llm-rubric
      value: >
        The response dispatches sdlc:plan-explore-orchestrator exactly once using the Agent tool.
        It passes MANIFEST_FILE equal to the manifestPath from explorePack, PROJECT_ROOT set to
        the working directory, USER_PROMPT set to the verbatim user request, and OPENSPEC_CONTEXT
        set to "none" (no openspec). It installs a cleanup trap for the tempdir before dispatch.
        It does NOT dispatch the orchestrator more than once.

- description: "plan-sdlc: orchestrator SCOPE dimensions are task-shaped kebab-case names, not bare generic axes (#408 SCOPE names)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-orchestrator-dispatch.md"
    user_request: >
      Run /plan-sdlc. The orchestrator returned the discovery brief shown in the context. The brief
      has dimensions: jwt-validation-flow, middleware-integration-pattern, session-model-schema,
      jwt-rfc-compliance. Confirm that the dimension names are task-specific and not generic axes.
      Then proceed to Step 2, citing F-DIM-N IDs in task descriptions.
  assert:
    - type: icontains
      value: "F-jwt-validation-flow"
    - type: not-icontains
      value: "architecture"
    - type: not-icontains
      value: "security"
    - type: llm-rubric
      value: >
        The response confirms that dimension names like "jwt-validation-flow" and
        "middleware-integration-pattern" are task-specific kebab-case names (not bare generic
        axes like "architecture", "tests", or "security"). When writing Step 2 tasks, the
        response cites at least one F-DIM-N finding ID per Standard/Complex task.

- description: "plan-sdlc: webResearchSignal true triggers web/hybrid dimensions; Key Decisions adopt/reject each web finding (#408 web-mode trigger)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-web-mode-trigger.md"
    user_request: >
      Run /plan-sdlc. The context shows webResearchSignal: true and a brief with web dimensions
      jwt-node-best-practices and jwks-uri-rotation. Process Step 2 and include Key Decisions.
      Every web finding in the Best-Practice Synthesis must appear in Key Decisions.
  assert:
    - type: icontains
      value: "F-jwt-node-best-practices"
    - type: icontains
      value: "Key Decisions"
    - type: llm-rubric
      value: >
        The response includes a Key Decisions section that explicitly addresses each web finding
        from the Best-Practice Synthesis by its F-DIM-N ID. Each finding is marked ADOPT,
        REJECT-with-rationale, or NOT-APPLICABLE. No web finding from the synthesis is silently
        omitted. The response does not fabricate F-IDs not present in the brief.

- description: "plan-sdlc: pure-refactor with webResearchSignal false has ZERO web/hybrid dimensions (#408 web suppressed)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-web-mode-suppressed.md"
    user_request: >
      Run /plan-sdlc. The context shows a pure rename task (greet -> hello) with
      webResearchSignal: false. The brief shows 3 code dimensions and 0 web/hybrid.
      Confirm the dimension selection was correct and proceed to Step 2.
  assert:
    - type: not-icontains
      value: "web-only"
    - type: llm-rubric
      value: >
        The response acknowledges that no web or hybrid dimensions were included in the brief
        because the task is a pure internal rename and webResearchSignal is false. It does not
        suggest adding web research. Step 2 tasks are derived from the code findings only.
        No Best-Practice Synthesis section is referenced.

- description: "plan-sdlc: lightweight scope (≤3 files) skips orchestrator; uses inline exploration (#408 lightweight skip)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-lightweight-skip.md"
    user_request: >
      Run /plan-sdlc. The context shows explorePack.manifestPath null and scopeHintCount 2.
      Process Step 1 for the --verbose flag addition task. Show which exploration path is used.
  assert:
    - type: not-icontains
      value: "plan-explore-orchestrator"
    - type: llm-rubric
      value: >
        The response uses inline codebase exploration (Glob, Grep, Read) rather than dispatching
        sdlc:plan-explore-orchestrator. It explicitly notes that the scope is lightweight (≤3
        files or manifestPath null) and therefore the orchestrator is skipped. No discovery brief
        is referenced. No F-DIM-N finding IDs are required in tasks.

- description: "plan-sdlc: orchestrator failure fallback produces plan and logs error to learnings (#408 R28 fallback)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-orchestrator-fallback.md"
    user_request: >
      Run /plan-sdlc. The context shows explorePack.error non-null (spawn ENOENT).
      Process Step 1. Use the R28 fallback path — log the error and continue with inline
      exploration. The plan must still be produced.
  assert:
    - type: icontains
      value: ".sdlc/learnings/log.md"
    - type: llm-rubric
      value: >
        The response invokes the R28 fallback path: it appends a line to .sdlc/learnings/log.md
        containing the error string from explorePack.error. It then uses inline codebase
        exploration (not the orchestrator). The plan is still produced — the error does not block
        plan creation. No F-DIM-N IDs are required in tasks since no brief was produced.

- description: "plan-sdlc: Step 2 tasks cite F-DIM-N finding IDs from the brief (#408 brief traceability)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-orchestrator-dispatch.md"
    user_request: >
      Run /plan-sdlc. The discovery brief has been loaded and contains F-jwt-validation-flow-1,
      F-middleware-integration-pattern-1, F-session-model-schema-1, and F-jwt-rfc-compliance-1.
      Write Step 2 task decomposition. Every Standard/Complex task must cite at least one F-ID.
  assert:
    - type: icontains
      value: "F-"
    - type: llm-rubric
      value: >
        Every Standard and Complex task in the response cites at least one F-DIM-N finding ID
        from the discovery brief (e.g. F-jwt-validation-flow-1, F-middleware-integration-pattern-1).
        The IDs cited are verbatim from the brief — no invented IDs. Trivial tasks may omit
        F-IDs. Tasks explicitly marked "out-of-scope addition" with rationale are also acceptable
        without an F-ID (R27).

- description: "plan-sdlc: Step 2 emits openspec-task blocks when --from-openspec is active (R29, #414)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-from-openspec-with-tasks.md"
    user_request: >
      Run /plan-sdlc --from-openspec add-resource-indicators. The prepare output shows
      fromOpenspecDirect: true and openspecContext.tasks[] with 5 entries. Execute Step 2
      task decomposition. Each plan task derived from an OpenSpec task must carry an
      openspec-task block with change, ref, line, and title fields.
  assert:
    - type: icontains
      value: "openspec-task:"
    - type: icontains
      value: "change: add-resource-indicators"
    - type: icontains
      value: "ref:"
    - type: llm-rubric
      value: >
        Every plan task derived from an OpenSpec task carries an openspec-task block with
        four fields: change (add-resource-indicators), ref (kebab-slug-6char-hash format),
        line (integer), and title (verbatim OpenSpec task title). Plan tasks that introduce
        new implementation work not in tasks.md either omit the openspec-task block or carry
        a matching ref. The openspec-task block appears beneath the acceptance criteria.

- description: "plan-sdlc: Step 3 G16 gate blocks plan when OpenSpec task has no coverage (R30, G16, #414)"
  vars:
