        and not in ## Out-of-scope OpenSpec tasks). G16 is an error-severity gate, so the
        plan is BLOCKED. The response describes both resolution paths: (a) add a plan task
        with the missing openspec-task block, or (b) add the title to ## Out-of-scope OpenSpec
        tasks with a one-line rationale.

- description: "plan-sdlc: Out-of-scope section satisfies G16 for uncovered OpenSpec tasks (R30, #414)"
  vars:
