# G17 Dimension Coverage gate tests (Fixes #417) — T8a through T8h

- description: "plan-sdlc: G17 dispatched in parallel at Step 3 start using g17Dispatch fields (R31, R33, #417)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-orchestrator-dispatch.md"
    user_request: >
      Run /plan-sdlc. The prepare output includes g17Dispatch: { subagentType:
      "general-purpose", model: "sonnet", promptTemplatePath:
      "/some/path/g17-dimension-coverage-prompt.md" } and githubHosting: { detected: true,
      host: "github.com" }. Describe what happens at the START of Step 3.
  assert:
    - type: icontains
      value: "G17"
    - type: llm-rubric
      value: >
        The response describes dispatching the G17 Dimension Coverage subagent at the START
        of Step 3, in parallel with main-thread gate evaluations. The dispatch uses
        g17Dispatch.subagentType ("general-purpose"), g17Dispatch.model ("sonnet"), and
        g17Dispatch.promptTemplatePath as parameters — it does NOT hardcode these values.
        The response explains that the main thread continues gate evaluations while G17 runs
        concurrently, and that results are joined before writing the critiqueRan marker.

- description: "plan-sdlc: G17 skipped when promptTemplatePath is null (R31, #417)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-orchestrator-dispatch.md"
    user_request: >
      Run /plan-sdlc. The prepare output includes g17Dispatch: { subagentType:
      "general-purpose", model: "sonnet", promptTemplatePath: null, error: "template not
      found" }. Describe what happens at Step 3 for G17.
  assert:
    - type: llm-rubric
      value: >
        The response skips G17 dispatch entirely because promptTemplatePath is null. It
        treats g17Findings as empty (findings: [], rendering: "", suppressed_count: 0).
        The response does NOT attempt to dispatch the subagent with a null template path.
        It logs the skip (or describes logging to .sdlc/learnings/log.md). Plan finalization
        is NOT blocked — G17 is advisory and a skip is not a failure.

- description: "plan-sdlc: G17 dispatch failure treated as empty findings, plan not blocked (R31, #417)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-orchestrator-dispatch.md"
    user_request: >
      Run /plan-sdlc. Step 3 G17 subagent was dispatched but returned malformed JSON (not
      parseable). Describe how plan-sdlc handles this failure.
  assert:
    - type: llm-rubric
      value: >
        The response treats the dispatch failure as an empty-findings fallback: g17Findings
        becomes { findings: [], rendering: "", suppressed_count: 0 }. The plan is NOT blocked
        — G17 is advisory. The failure is logged to .sdlc/learnings/log.md. The response
        does not re-attempt dispatch in a retry loop. Step 4 proceeds normally with empty
        g17Findings.

- description: "plan-sdlc: G17 C2 finding spliced into plan at Step 4 as Suggested Review Dimensions (R34, #417)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-g17-create-new-glob-family.md"
    user_request: >
      Run /plan-sdlc. Step 3 G17 subagent returned: { findings: [{ kind: "CREATE",
      dimension: "payments-processing", criteria: ["C2"], severity_hint: "medium", why:
      "4 files under packages/payments/ not covered by any dimension", triggers:
      ["packages/payments/**"], actions: { dimension: "/harden-sdlc --surface
      review-dimensions --dimension payments-processing", copilot_mirror: null } }],
      suppressed_count: 0, rendering: "## Suggested Review Dimensions\n\n### CREATE:
      payments-processing\n**Why:** 4 files under packages/payments/ not covered.\n**Severity
      hint:** medium\n**Triggers:** packages/payments/**\n**Action (dimension):**
      /harden-sdlc --surface review-dimensions --dimension payments-processing" }.
      Describe what happens at Step 4.
  assert:
    - type: icontains
      value: "Suggested Review Dimensions"
    - type: llm-rubric
      value: >
        The response appends the g17Findings.rendering markdown verbatim to the plan file
        at Step 4. Placement: after ## Guardrail Compliance if present, otherwise after the
        last ### Task N: block. The response does NOT modify the rendering content — it
        splices it verbatim. Plan finalization is not blocked. The response proceeds to
        Step 5 autonomously after splicing.

- description: "plan-sdlc: G17 empty findings — no Suggested Review Dimensions section appended (R34, #417)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-g17-doc-only-suppressed.md"
    user_request: >
      Run /plan-sdlc. Step 3 G17 subagent returned empty findings: { findings: [],
      suppressed_count: 0, rendering: "" }. Describe what happens at Step 4 regarding
      the Suggested Review Dimensions section.
  assert:
    - type: llm-rubric
      value: >
        The response does NOT append a ## Suggested Review Dimensions section to the plan
        file. Empty findings mean no advisory section is written. The response does not
        treat absent proposals as a failure. Plan finalization proceeds normally. The
        response does not mention G17 in the plan output — the absence of proposals is
        silent.

- description: "plan-sdlc: G17 row appears in Step 3 gate table as advisory non-blocking (R31, G17, #417)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-written.md"
    user_request: >
      List the quality gates evaluated at Step 3 of plan-sdlc. Is G17 blocking or
      non-blocking?
  assert:
    - type: icontains
      value: "G17"
    - type: llm-rubric
      value: >
        The response lists G17 (Dimension Coverage) as one of the Step 3 quality gates.
        G17 is described as advisory and non-blocking — findings are surfaced in Step 4
        but absent proposals do not fail plan finalization. The response does not claim
        G17 can block the plan.

- description: "plan-sdlc: G17 join guard — critiqueRan marker written only after G17 returns (R31, #417)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-orchestrator-dispatch.md"
    user_request: >
      Run /plan-sdlc. G17 subagent is still running when main-thread gate evaluations
      complete. Describe when the critiqueRan checkpoint marker is written.
  assert:
    - type: llm-rubric
      value: >
        The response explains that the critiqueRan marker is NOT written until G17 has
        returned and g17Findings is populated. The main thread waits (joins) on G17 before
        writing the critiqueRan checkpoint. This join requirement is described as mandatory —
        critiqueRan marks that ALL Step 3 checks are complete including G17.

- description: "plan-sdlc: G17 does not re-derive githubHosting — consumes P14 value (flag-resolution-single-source, #417)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-orchestrator-dispatch.md"
    user_request: >
      Run /plan-sdlc. The prepare output has githubHosting: { detected: true, host:
      "github.com" }. How does SKILL.md pass this information to the G17 subagent?
      Does SKILL.md re-derive whether the repo is on GitHub?
  assert:
    - type: llm-rubric
      value: >
        The response explains that SKILL.md passes the githubHosting.detected value from
        the P14 prepare output field directly to the G17 subagent as the
        {GITHUB_HOSTING_DETECTED} template variable. SKILL.md does NOT re-run git remote
        commands or re-derive the hosting flag — it consumes the value from P14 exactly
        once (flag-resolution-single-source guardrail). The G17 prompt also instructs the
        subagent not to re-derive this value.

# --- Gate A intake audit (R39 — Fixes #445) ---

- description: "plan-sdlc: Gate A dispatched and CRITICAL verdict blocks decomposition (R39)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-from-openspec-with-requirements.md"
    user_request: >
      Run /plan-sdlc --from-openspec add-resource-indicators. Step 1 (CONSUME) is
      complete. openspecContext.requirements is present with 2 entries. The Gate A audit
      agent returned: { findings: [{ severity: "CRITICAL", dimension: "Completeness",
      statement: "tasks.md missing entry for req-2 (getIndicators data service method)",
      evidence: "tasks.md:missing" }], verdict: "CRITICAL", skipped: [] }.
      What happens next?
  assert:
    - type: llm-rubric
      value: >
        The response explains that a CRITICAL verdict from Gate A blocks decomposition —
        plan-sdlc does NOT proceed to Step 2 (PLAN). Instead it surfaces the CRITICAL
        findings to the user and presents two options: (1) fix the source change artifacts
        and re-run, or (2) override and proceed anyway with the findings recorded in an
        Intake Audit Caveats section. The response must NOT describe plan-sdlc proceeding
        to task decomposition with a CRITICAL verdict active.

- description: "plan-sdlc: Gate A skipped for non-OpenSpec plan with a note (R39 graceful degradation)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-lightweight-skip.md"
    user_request: >
      Run /plan-sdlc (no --from-openspec flag). openspecContext is not present in the
      prepare output. Step 1 (CONSUME) has completed. What happens with Gate A?
  assert:
    - type: llm-rubric
      value: >
        The response explains that Gate A is skipped entirely because openspecContext is
        absent (the plan is not OpenSpec-sourced). The skill emits one note indicating
        Gate A was skipped, then proceeds directly to Step 2 (PLAN) for task decomposition.
        No audit agent is dispatched. No caveat section is added.

# --- Gate B scorecard/traceability/verdict (R40, R44 — Fixes #445) ---

- description: "plan-sdlc: Gate B assembles Verification Scorecard with dimension table + traceability matrix + verdict (R40)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-from-openspec-with-requirements.md"
    user_request: >
      Run /plan-sdlc --from-openspec add-resource-indicators. Step 5 (CRITIQUE) has
      just completed its lens fan-out merge. openspecContext.requirements contains 2
      entries (req-1: ResourceIndicator UI, req-2: getIndicators method). Both lens
      reviewers returned Approved with no CRITICAL findings. Describe what happens next
      in Step 5 regarding the Verification Scorecard.
  assert:
    - type: llm-rubric
      value: >
        The response describes that Gate B assembles a Verification Scorecard section
        and writes it to the plan file after the lens merge. The scorecard must contain
        all three elements: (1) a dimension table with Completeness/Correctness/Coherence
        rows showing finding counts by severity, (2) a traceability matrix with one row
        per requirement from the inventory (req-1 and req-2) showing covering tasks and
        status (covered/partial/uncovered), and (3) a go/no-go verdict using the verbatim
        opsx:verify labels. The response must NOT describe the scorecard as optional or
        as only appearing when issues are found.

- description: "plan-sdlc: Gate B traceability matrix degrades to checklist when requirements inventory is null (R43)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-from-openspec.md"
    user_request: >
      Run /plan-sdlc --from-openspec add-resource-indicators. openspecContext.requirements
      is null (CLI absent) and openspecContext.requirementsError is set to "CLI not found".
      Step 5 lens merge is complete. What source does the traceability matrix use?
  assert:
    - type: llm-rubric
      value: >
        The response explains that when openspecContext.requirements is null, the
        traceability matrix falls back to the Step 1 requirements checklist instead of
        the delta-spec inventory. The scorecard header notes the downgrade (e.g., matrix
        built from checklist — requirement inventory unavailable). The scorecard is still
        assembled and written to the plan file — the degradation is graceful, not a skip.

- description: "plan-sdlc: Scorecard is regenerated on each Step 5 iteration, not appended (R44)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-from-openspec-with-requirements.md"
    user_request: >
      Run /plan-sdlc. It is the second iteration of Step 5 — the first iteration wrote
      a Verification Scorecard section. The second iteration's lens merge is now complete.
      What happens to the existing Verification Scorecard section?
  assert:
    - type: llm-rubric
      value: >
        The response explains that the existing Verification Scorecard section is replaced
        (regenerated) in full on each Step 5 iteration — it is NOT appended to. Only one
        Verification Scorecard section exists in the plan file at any time. The new section
        overwrites the previous one with updated counts, matrix, and verdict based on the
        current iteration's findings.

- description: "plan-sdlc: Gate A uses intakeAuditDispatch params from prepare output (agent-dispatch-script-driven)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-from-openspec-with-requirements.md"
    user_request: >
      Run /plan-sdlc --from-openspec add-resource-indicators. Step 1 is complete.
      openspecContext.requirements is present. How does SKILL.md determine which model
      and subagentType to use when dispatching the Gate A audit agent?
  assert:
    - type: llm-rubric
      value: >
        The response explains that the model and subagentType are sourced verbatim from
        the intakeAuditDispatch field in the prepare output (P20). SKILL.md does NOT
        hardcode the model name or subagentType for Gate A — it reads the values from the
        script output following the agent-dispatch-script-driven guardrail. Similarly,
        the promptTemplatePath for intake-verify-prompt.md comes from
        intakeAuditDispatch.promptTemplatePath in the prepare output.

# --- Verdict→action wiring (R41 — Fixes #445) ---

- description: "plan-sdlc: CRITICAL Gate B verdict routes to Step 6 IMPROVE via Issues Found path (R41, no-opposite-logical-vectors)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-from-openspec-with-requirements.md"
    user_request: >
      Run /plan-sdlc --from-openspec add-resource-indicators. Step 5 lens merge is
      complete. The Verification Scorecard verdict is CRITICAL (one requirement uncovered).
      What happens next? Does the plan enter Step 6?
  assert:
    - type: llm-rubric
      value: >
        The response explains that a CRITICAL Gate B verdict causes the CRITICAL findings
        to be injected into the blocking-issue list, triggering Step 6 IMPROVE — the same
        path used when lens reviewers return Issues Found. The verdict is treated as an
        additional source of blocking issues, not a separate code path. The iteration
        counter (max 3) continues normally. The response must make clear the CRITICAL
        verdict does NOT create a new loop — it uses the existing Issues Found mechanism.

- description: "plan-sdlc: WARNING Gate B verdict proceeds without entering Step 6 (R41)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-from-openspec-with-requirements.md"
    user_request: >
      Run /plan-sdlc --from-openspec add-resource-indicators. Step 5 lens merge is
      Approved. The Verification Scorecard verdict is WARNING (one scenario uncovered).
      No other blocking issues were found. What happens?
  assert:
    - type: llm-rubric
      value: >
        The response explains that a WARNING-only Gate B verdict does NOT trigger Step 6
        IMPROVE. The caveats remain in the plan file (already written in the scorecard
        section). The plan proceeds to Step 6.5 (link verification) and then Step 7
        (Handoff) normally. No re-dispatch of lens reviewers occurs for a WARNING-only
        verdict.

- description: "plan-sdlc: Scorecard verdict shown at Step 7 Handoff (R41)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-from-openspec-with-requirements.md"
    user_request: >
      Run /plan-sdlc --from-openspec add-resource-indicators. Step 6.5 link verification
      passed. Step 7 Handoff is about to begin. The plan has a Verification Scorecard with
      verdict "All checks passed. Ready for archive." Describe the Step 7 output.
  assert:
    - type: llm-rubric
      value: >
        The response describes that Step 7 Handoff includes a verdict reference line above
        the ship/execute/done menu. The verdict reference shows the verbatim scorecard
        verdict ("All checks passed. Ready for archive.") and points to the Verification
        Scorecard section in the plan. The scorecard pointer appears before the workflow
        continuation menu options, not after them.

# --- G18 settlement / contract concreteness gate (R45, G18 — Fixes #459) ---

- description: "plan-sdlc: G18 PASSES a settled code task whose Contract pins a concrete shape (R45, G18, #459)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-contract-code.md"
    user_request: >
      Run /plan-sdlc. Evaluate the Step 3 G18 settlement gate for Task 1 ("Refresh-token
      helper") in the plan. Task 1 carries a Contract block pinning concrete code shape
      (signatures, named errors, import paths). Is Task 1 flagged by G18?
  assert:
    - type: icontains
      value: "G18"
    - type: llm-rubric
      value: >
        The response evaluates the G18 settlement gate and finds Task 1 SATISFIED / NOT
        flagged: its Contract pins a concrete, type-appropriate code shape (the
        refreshAccessToken signature, the typed errors, the import path). G18 does not block
        on Task 1. The response does NOT treat a concrete Contract shape as a violation.

- description: "plan-sdlc: G18 FLAGS an unsettled 'update X to do Y' code task missing its Contract (error-severity, blocks) (R45, G18, #459)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-contract-code.md"
    user_request: >
      Run /plan-sdlc. Evaluate the Step 3 G18 settlement gate for Task 2 ("Update the auth
      middleware to support refresh") in the plan. Task 2 has no Contract block and its
      description merely restates "update X to do Y". Is Task 2 flagged by G18?
  assert:
    - type: icontains
      value: "G18"
    - type: llm-rubric
      value: >
        The response evaluates the G18 settlement gate and FLAGS Task 2 as unsettled: it is
        an artifact-touching task (modifies src/middleware/auth.ts) with no Contract block,
        and its description merely restates "update X to do Y" without a concrete decided
        shape. The response states G18 is error-severity, so the plan is BLOCKED until Task 2
        carries a Contract pinning the decided code shape.

- description: "plan-sdlc: G18 PASSES a settled docs/openspec task whose Contract pins sections + requirement deltas (R45, G18, #459)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-contract-docs.md"
    user_request: >
      Run /plan-sdlc. Evaluate the Step 3 G18 settlement gate for Task 1 ("Spec + reference
      doc for token lifecycle") in the plan. Task 1 carries a Contract pinning the spec
      requirement delta (R7) and the doc section (## Token Lifecycle). Is Task 1 flagged by
      G18?
  assert:
    - type: icontains
      value: "G18"
    - type: llm-rubric
      value: >
        The response evaluates the G18 settlement gate and finds Task 1 SATISFIED / NOT
        flagged. The task touches docs/specs/** and docs/** so G18 judges it against the
        openspec/spec and docs columns; its Contract pins a concrete shape (the R7
        requirement delta with state names, and the ## Token Lifecycle section with audience
        and cross-link). G18 does not block on Task 1.

- description: "plan-sdlc: G18 FLAGS an unsettled 'update X to do Y' docs task missing its Contract (error-severity, blocks) (R45, G18, #459)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-contract-docs.md"
    user_request: >
      Run /plan-sdlc. Evaluate the Step 3 G18 settlement gate for Task 2 ("Update the auth
      doc to mention refresh") in the plan. Task 2 has no Contract block and its description
      merely restates "update X to do Y". Is Task 2 flagged by G18?
  assert:
    - type: icontains
      value: "G18"
    - type: llm-rubric
      value: >
        The response evaluates the G18 settlement gate and FLAGS Task 2 as unsettled: it is
        an artifact-touching task (modifies docs/skills/auth.md, a docs-column artifact) with
        no Contract block and a description that merely restates "update X to do Y" without a
        concrete decided shape (no section list, audience, or cross-links). The response
        states G18 is error-severity, so the plan is BLOCKED until Task 2 carries a Contract.

- description: "plan-sdlc: G18 judges a mixed-artifact task against its dominant column (R45, G18, #459)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-contract-code.md"
    user_request: >
      Run /plan-sdlc. Evaluate the Step 3 G18 settlement gate for Task 3 ("Refresh helper
      plus error-copy prompt") in the plan. Task 3 touches both a .ts source file
      (src/auth/errors.ts) and a .md prompt (prompts/auth-error-copy.md). Which column does
      G18 judge it against, and is Task 3 flagged?
  assert:
    - type: icontains
      value: "G18"
    - type: llm-rubric
      value: >
        The response explains that G18 judges the mixed-artifact Task 3 against its DOMINANT
        artifact's column — the .ts source file (errors.ts) is the primary deliverable, so it
        is judged against the CODE column (not the docs column for the .md prompt). The
        response finds Task 3 SATISFIED / NOT flagged because its Contract pins concrete code
        shape (the two exported message constants with values). The derivation of plan type
        from Files: paths and the dominant-column tie-break are applied, not assumed.
