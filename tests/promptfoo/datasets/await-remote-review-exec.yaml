# Exec tests for await-remote-review.js evaluateReviews — pure helper, no gh shell-out.

- description: "await-remote-review: actionable verdict on CHANGES_REQUESTED from Copilot Bot"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-await-remote-review-evaluate.js"
    script_args: '--reviews [{"id":1,"state":"CHANGES_REQUESTED","authorLogin":"copilot","authorType":"Bot","submittedAt":"2025-01-01"}] --reviewers copilot'
  assert:
    - type: contains
      value: '"status":"actionable"'

- description: "await-remote-review: actionable verdict on COMMENTED from Copilot Bot"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-await-remote-review-evaluate.js"
    script_args: '--reviews [{"id":1,"state":"COMMENTED","authorLogin":"copilot","authorType":"Bot","submittedAt":"2025-01-01"}] --reviewers copilot'
  assert:
    - type: contains
      value: '"status":"actionable"'

- description: "await-remote-review: approved-clean verdict on APPROVED from Copilot Bot"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-await-remote-review-evaluate.js"
    script_args: '--reviews [{"id":1,"state":"APPROVED","authorLogin":"copilot","authorType":"Bot","submittedAt":"2025-01-01"}] --reviewers copilot'
  assert:
    - type: contains
      value: '"status":"approved-clean"'

- description: "await-remote-review: case-insensitive login match (Copilot vs COPILOT)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-await-remote-review-evaluate.js"
    script_args: '--reviews [{"id":1,"state":"CHANGES_REQUESTED","authorLogin":"Copilot","authorType":"Bot","submittedAt":"2025-01-01"}] --reviewers COPILOT'
  assert:
    - type: contains
      value: '"status":"actionable"'

- description: "await-remote-review: copilot login but non-Bot type rejected (R56)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-await-remote-review-evaluate.js"
    script_args: '--reviews [{"id":1,"state":"APPROVED","authorLogin":"copilot","authorType":"User","submittedAt":"2025-01-01"}] --reviewers copilot'
  assert:
    - type: contains
      value: '"status":null'

- description: "await-remote-review: PENDING reviews are excluded"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-await-remote-review-evaluate.js"
    script_args: '--reviews [{"id":1,"state":"PENDING","authorLogin":"copilot","authorType":"Bot","submittedAt":"2025-01-01"}] --reviewers copilot'
  assert:
    - type: contains
      value: '"status":null'

- description: "await-remote-review: latest-by-submittedAt selection (newest CHANGES_REQUESTED beats older APPROVED)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-await-remote-review-evaluate.js"
    script_args: '--reviews [{"id":1,"state":"APPROVED","authorLogin":"copilot","authorType":"Bot","submittedAt":"2025-01-01"},{"id":2,"state":"CHANGES_REQUESTED","authorLogin":"copilot","authorType":"Bot","submittedAt":"2025-01-02"}] --reviewers copilot'
  assert:
    - type: contains
      value: '"status":"actionable"'
    - type: contains
      value: '"matchSubmittedAt":"2025-01-02"'

- description: "await-remote-review: no matching reviewer returns null"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-await-remote-review-evaluate.js"
    script_args: '--reviews [{"id":1,"state":"APPROVED","authorLogin":"alice","authorType":"User","submittedAt":"2025-01-01"}] --reviewers copilot'
  assert:
    - type: contains
      value: '"status":null'

# Regression tests for #393: copilot[bot] suffix normalisation (R56)
# GitHub REST `pulls/{pr}/reviews` returns `copilot[bot]` for App-authored reviews.
# The [bot] suffix must be stripped before reviewerSet lookup; bot guard still applies.

- description: "await-remote-review: copilot[bot] COMMENTED Bot type returns actionable (#393)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-await-remote-review-evaluate.js"
    script_args: '--reviews [{"id":1,"state":"COMMENTED","authorLogin":"copilot[bot]","authorType":"Bot","submittedAt":"2025-01-01"}] --reviewers copilot'
  assert:
    - type: contains
      value: '"status":"actionable"'

- description: "await-remote-review: copilot[bot] APPROVED Bot type returns approved-clean (#393)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-await-remote-review-evaluate.js"
    script_args: '--reviews [{"id":1,"state":"APPROVED","authorLogin":"copilot[bot]","authorType":"Bot","submittedAt":"2025-01-01"}] --reviewers copilot'
  assert:
    - type: contains
      value: '"status":"approved-clean"'

- description: "await-remote-review: copilot[bot] APPROVED User type rejected by bot guard (#393)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-await-remote-review-evaluate.js"
    script_args: '--reviews [{"id":1,"state":"APPROVED","authorLogin":"copilot[bot]","authorType":"User","submittedAt":"2025-01-01"}] --reviewers copilot'
  assert:
    - type: contains
      value: '"status":null'

# Regression tests for #439: copilot-pull-request-reviewer login normalisation (R56)
# GitHub's REST `pulls/{pr}/reviews` returns the Copilot reviewer login as
# `copilot-pull-request-reviewer` (not `copilot`/`copilot[bot]`). It must be
# canonicalised to `copilot` before reviewer-set lookup; the bot guard still applies.

- description: "await-remote-review: copilot-pull-request-reviewer COMMENTED Bot type returns actionable (#439)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-await-remote-review-evaluate.js"
    script_args: '--reviews [{"id":1,"state":"COMMENTED","authorLogin":"copilot-pull-request-reviewer","authorType":"Bot","submittedAt":"2025-01-01"}] --reviewers copilot'
  assert:
    - type: contains
      value: '"status":"actionable"'

- description: "await-remote-review: copilot-pull-request-reviewer[bot] APPROVED Bot type returns approved-clean (#439)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-await-remote-review-evaluate.js"
    script_args: '--reviews [{"id":1,"state":"APPROVED","authorLogin":"copilot-pull-request-reviewer[bot]","authorType":"Bot","submittedAt":"2025-01-01"}] --reviewers copilot'
  assert:
    - type: contains
      value: '"status":"approved-clean"'

- description: "await-remote-review: copilot-pull-request-reviewer CHANGES_REQUESTED non-Bot rejected by bot guard (#439)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/run-await-remote-review-evaluate.js"
    script_args: '--reviews [{"id":1,"state":"CHANGES_REQUESTED","authorLogin":"copilot-pull-request-reviewer","authorType":"User","submittedAt":"2025-01-01"}] --reviewers copilot'
  assert:
    - type: contains
      value: '"status":null'
