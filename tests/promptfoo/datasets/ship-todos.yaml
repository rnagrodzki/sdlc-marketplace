# Script execution tests for ship-todos.js.
# Tests the renderTodos function and the fail-step override behavior.
# Covers R-TODOWRITE-TRUTHFUL (#432): pending substeps remain pending with
# "(not attempted)" suffix; in_progress substeps become completed "(failed)".

# T6 / R-TODOWRITE-TRUTHFUL — fail-step fires during commit step.
# State: commit is in_progress, generate message substep is active.
# substeps: stash unstaged (pending), generate message (in_progress), commit (pending), restore stash (pending)
# fail-step fires → generate-message: completed "(failed)"; others: pending "(not attempted)"
- description: "ship-todos (R-TODOWRITE-TRUTHFUL): fail-step leaves pending substeps as pending with (not attempted)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/lib/ship-todos.js"
    script_args: "--state-file {{project_root}}/state-commit-in-progress.json --event step --current-step commit --substep \"generate message\" --fail-step commit"
    project_root: "file://fixtures-fs/ship-todos"
  assert:
    - type: javascript
      value: |
        // parse stdout JSON
        const result = JSON.parse(output);
        const todos = result.todos;
        // Find commit-step substeps
        const stashUn    = todos.find(t => t.content && t.content.includes('stash unstaged'));
        const generateMsg = todos.find(t => t.content && t.content.includes('generate message'));
        const commitSub  = todos.find(t => t.content && t.content.includes('Commit: commit'));
        const restoreStash = todos.find(t => t.content && t.content.includes('restore stash'));
        // generate message was in_progress → completed "(failed)"
        if (!generateMsg) return 'FAIL: no generate message todo found';
        if (generateMsg.status !== 'completed') return `FAIL: generate message status=${generateMsg.status} expected completed`;
        if (!generateMsg.activeForm.includes('(failed)')) return `FAIL: generate message activeForm missing (failed): ${generateMsg.activeForm}`;
        // stash unstaged was pending → pending "(not attempted)"
        if (!stashUn) return 'FAIL: no stash unstaged todo found';
        if (stashUn.status !== 'pending') return `FAIL: stash unstaged status=${stashUn.status} expected pending`;
        if (!stashUn.activeForm.includes('(not attempted)')) return `FAIL: stash unstaged activeForm missing (not attempted): ${stashUn.activeForm}`;
        // commit substep was pending → pending "(not attempted)"
        if (!commitSub) return 'FAIL: no commit substep todo found';
        if (commitSub.status !== 'pending') return `FAIL: commit status=${commitSub.status} expected pending`;
        if (!commitSub.activeForm.includes('(not attempted)')) return `FAIL: commit activeForm missing (not attempted): ${commitSub.activeForm}`;
        // restore stash was pending → pending "(not attempted)"
        if (!restoreStash) return 'FAIL: no restore stash todo found';
        if (restoreStash.status !== 'pending') return `FAIL: restore stash status=${restoreStash.status} expected pending`;
        if (!restoreStash.activeForm.includes('(not attempted)')) return `FAIL: restore stash activeForm missing (not attempted): ${restoreStash.activeForm}`;
        return true;

# T6 — completed substeps from prior steps are untouched by fail-step
- description: "ship-todos (R-TODOWRITE-TRUTHFUL): fail-step does not rewrite completed substeps from prior steps"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/lib/ship-todos.js"
    script_args: "--state-file {{project_root}}/state-commit-in-progress.json --event step --current-step commit --substep \"generate message\" --fail-step commit"
    project_root: "file://fixtures-fs/ship-todos"
  assert:
    - type: javascript
      value: |
        const result = JSON.parse(output);
        const todos = result.todos;
        // execute step was already completed — its substeps should remain completed, no (failed) or (not attempted)
        const executeTodos = todos.filter(t => t.content && t.content.startsWith('Execute:'));
        if (executeTodos.length === 0) return 'FAIL: no execute substeps found';
        for (const t of executeTodos) {
          if (t.status !== 'completed') return `FAIL: execute substep "${t.content}" status=${t.status} expected completed`;
          if (t.activeForm.includes('(failed)') || t.activeForm.includes('(not attempted)')) {
            return `FAIL: execute substep was rewritten by fail-step: ${t.activeForm}`;
          }
        }
        return true;

# T6 — idempotency: render twice with same input → identical output (structural test)
- description: "ship-todos (R-TODOWRITE-TRUTHFUL): renderTodos output is deterministic for same input"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/lib/ship-todos.js"
    script_args: "--state-file {{project_root}}/state-commit-in-progress.json --event step --current-step commit --substep \"generate message\" --fail-step commit"
    project_root: "file://fixtures-fs/ship-todos"
  assert:
    - type: javascript
      value: |
        try {
          const result = JSON.parse(output);
          if (!Array.isArray(result.todos)) return 'FAIL: todos is not an array';
          if (typeof result.marker !== 'string') return 'FAIL: marker is not a string';
          // Verify total todo count matches known substep count (execute:1 + commit:4 + review:2 + version:3 + pr:4 + cleanup:1 = 15)
          if (result.todos.length === 0) return 'FAIL: todos array is empty';
          return true;
        } catch (e) {
          return `FAIL: invalid JSON output: ${e.message}`;
        }

# T6 — review step fail-step: first substep is in_progress (default), second stays pending.
# When fail-step fires on the current step with no named substep, the first substep is
# in_progress → completed "(failed)"; remaining substeps were pending → pending "(not attempted)".
- description: "ship-todos (R-TODOWRITE-TRUTHFUL): fail-step on current-step marks first as failed, rest as not-attempted"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/lib/ship-todos.js"
    script_args: "--state-file {{project_root}}/state-commit-in-progress.json --event step --current-step review --fail-step review"
    project_root: "file://fixtures-fs/ship-todos"
  assert:
    - type: javascript
      value: |
        const result = JSON.parse(output);
        const todos = result.todos;
        // review substeps: ['dispatch review dimensions', 'collect verdicts']
        // No named substep → first is in_progress, second is pending
        const dispatch = todos.find(t => t.content && t.content.includes('dispatch review dimensions'));
        const collect  = todos.find(t => t.content && t.content.includes('collect verdicts'));
        if (!dispatch) return 'FAIL: no dispatch review dimensions todo';
        if (!collect)  return 'FAIL: no collect verdicts todo';
        // dispatch was in_progress (first substep, no named substep) → completed "(failed)"
        if (dispatch.status !== 'completed') return `FAIL: dispatch status=${dispatch.status} expected completed`;
        if (!dispatch.activeForm.includes('(failed)')) return `FAIL: dispatch activeForm missing (failed): ${dispatch.activeForm}`;
        // collect was pending → pending "(not attempted)"
        if (collect.status !== 'pending') return `FAIL: collect status=${collect.status} expected pending`;
        if (!collect.activeForm.includes('(not attempted)')) return `FAIL: collect missing (not attempted): ${collect.activeForm}`;
        return true;
