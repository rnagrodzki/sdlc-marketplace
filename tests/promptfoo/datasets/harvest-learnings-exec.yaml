      {
        "GH_HARVEST_FAKE_LIST": "/dev/null",
        "GIT_HARVEST_FAKE_MERGE_BASE": "{{project_root}}/harvest-fakes/git-merge-base.json",
        "GH_HARVEST_FAKE_PR": "{{project_root}}/harvest-fakes/gh-pr.json"
      }
  assert:
    - type: javascript
      value: |
        const j = JSON.parse(output);
        const c = j.clusters.find(c => c.skill === 'setup-sdlc' && /real bug/.test(c.summary));
        return c && c.status === 'draft' && !c.dedupReason;

# AC-CL6 — Operational-note takes precedence over fuzzy-title possibly-tracked.
- description: "harvest-learnings: operational-note classification takes precedence over fuzzy-title match"
  vars:
    script_path: "repo://.claude/scripts/harvest-learnings.js"
    script_args: "--output-file"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-learnings-classifier-cases"
    script_env: >-
      {
        "GH_HARVEST_FAKE_LIST": "{{project_root}}/harvest-fakes/gh-list-fuzzy.json",
        "GIT_HARVEST_FAKE_MERGE_BASE": "{{project_root}}/harvest-fakes/git-merge-base.json",
        "GH_HARVEST_FAKE_PR": "{{project_root}}/harvest-fakes/gh-pr.json"
      }
  assert:
    - type: javascript
      value: |
        const j = JSON.parse(output);
        // All three operational-skill clusters must still be operational-note
        // even when a fuzzy-matching open issue exists for them.
        const opNotes = j.clusters.filter(c => c.status === 'operational-note');
        return opNotes.length === 3
          && opNotes.every(c => c.dedupReason === 'skill-prefix')
          && !opNotes.some(c => c.status === 'possibly-tracked');

