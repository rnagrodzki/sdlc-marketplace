# Script execution tests for plugins/sdlc-utilities/scripts/skill/version.js.
# Covers: --output-file flag declaration (#212) and resolved flags.changelog (#213).
# These tests run version.js directly against fixture directories (no LLM).

- description: "version-prepare: patch bump produces no 'Unknown flag' warnings (#212)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/version.js"
    script_args: "patch"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/version-sdlc-config-changelog"
  assert:
    # stdout is JSON payload; requestedBump must be patch
    - type: icontains
      value: '"requestedBump": "patch"'
    # No unknown-flag warnings in the JSON output
    - type: not-icontains
      value: "Unknown flag"

- description: "version-prepare: config.changelog=true with no --changelog flag emits flags.changelog=true (#213)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/version.js"
    script_args: "patch"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/version-sdlc-config-changelog"
  assert:
    # The script emits flags.changelog as the resolved value (true here, sourced from config.changelog)
    - type: icontains
      value: '"changelog": true'
    # A non-null changelog block must be present (R18 — skill consumes flags.changelog directly)
    - type: icontains
      value: '"changelog":'
    # No "Unknown flag" warnings should appear regardless
    - type: not-icontains
      value: "Unknown flag"

- description: "version-prepare: config.changelog=false with --changelog flag still emits flags.changelog=true (#213)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/version.js"
    script_args: "patch --changelog"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/version-sdlc-plugin-json-multifield"
  assert:
    # Even though fixture has config.changelog=false, --changelog CLI flag flips it on
    - type: icontains
      value: '"changelog": true'

- description: "version-prepare: neither config.changelog nor --changelog emits flags.changelog=false (#213)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/version.js"
    script_args: "patch"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/version-sdlc-plugin-json-multifield"
  assert:
    # Fixture has config.changelog=false and no --changelog flag — resolved value must be false
    - type: icontains
      value: '"changelog": false'

- description: "version-prepare: patch --auto with config.changelog=true emits flags.changelog=true (#219, regression net for #213)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/version.js"
    script_args: "patch --auto"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/version-sdlc-config-changelog"
  assert:
    # Reproduces issue #219 path: --auto sub-agent dispatch from ship-sdlc must still resolve flags.changelog from config
    - type: icontains
      value: '"changelog": true'
    - type: icontains
      value: '"auto": true'
    - type: not-icontains
      value: "Unknown flag"

# R-bump-flag, R-bump-promote (#358): --bump named flag is parsed and is
# authoritative over conventional-commit suggestedBump. Tests below cover:
# (1) flag form parses + sets bumpFromFlag, (2) positional+flag conflict errors,
# (3) running from a subdirectory does not write .gitignore there (R-projectroot, #360),
# (4) bumpPromotionDetected field is present.

- description: "version-prepare: --bump flag is parsed and is authoritative (R-bump-flag, #358)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/version.js"
    script_args: "--bump minor"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/version-sdlc-config-changelog"
  assert:
    - type: icontains
      value: '"requestedBump": "minor"'
    - type: icontains
      value: '"bumpFromFlag": true'
    - type: not-icontains
      value: "Unknown flag"

- description: "version-prepare: positional bump + --bump flag conflict errors (R-bump-flag, #358)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/version.js"
    script_args: "patch --bump minor"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/version-sdlc-config-changelog"
    script_capture_stderr: true
  assert:
    # The script emits a bumpFlagConflict error and exits non-zero.
    - type: icontains
      value: "bumpFlagConflict"

- description: "version-prepare: running from a subdirectory does not write .gitignore in cwd (R-projectroot, #360)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/version.js"
    script_args: "--bump patch"
    script_cwd: "{{project_root}}/subdir"
    project_root: "file://fixtures-fs/version-sdlc-subdir-cwd"
  assert:
    # The subdir must NOT receive a .gitignore created by ensureSdlcInfrastructure().
    # Confirm the script ran (requestedBump resolved) — the absence of cwd-side-effects
    # is enforced by routing config writes to resolveSdlcRoot() (main worktree).
    - type: icontains
      value: '"requestedBump": "patch"'
    - type: not-icontains
      value: "Unknown flag"

- description: "version-prepare: bumpPromotionDetected field is present in output (R-bump-promote, #358)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/version.js"
    script_args: "--bump patch"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/version-sdlc-config-changelog"
  assert:
    # The diagnostic field is emitted as a boolean regardless of whether
    # a promotion was actually detected. Field MUST be present on every run.
    - type: icontains
      value: '"bumpPromotionDetected":'

# R-expected-branch (issues #347, #348, #349): --expected-branch flag is parsed and validated.
# Four cases: no flag (inactive), match (ok), mismatch (exit 3 + stderr), detached HEAD (exit 3).

- description: "version-prepare: no --expected-branch flag emits branchGuard.active=false (R-expected-branch, #347)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/version.js"
    script_args: "patch"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/version-sdlc-config-changelog"
  assert:
    - type: icontains
      value: '"active": false'
    - type: not-icontains
      value: "Unknown flag"

- description: "version-prepare: --expected-branch matching current branch emits branchGuard.ok=true (R-expected-branch, #348)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/version.js"
    script_args: "patch --expected-branch main"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/version-sdlc-config-changelog"
  assert:
    - type: icontains
      value: '"ok": true'
    - type: icontains
      value: '"active": true'

- description: "version-prepare: --expected-branch mismatching current branch exits non-zero with stderr (R-expected-branch, #348)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/version.js"
    script_args: "patch --expected-branch feat/nonexistent-branch"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/version-sdlc-config-changelog"
    script_capture_stderr: true
  assert:
    - type: icontains
      value: '"ok": false'
    - type: icontains
      value: "feat/nonexistent-branch"

- description: "version-prepare: branchGuard field present in successful output (R-expected-branch, #349)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/version.js"
    script_args: "patch"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/version-sdlc-config-changelog"
  assert:
    - type: icontains
      value: '"branchGuard":'

- description: 'version-sdlc-already-bumped: patch re-run skips (idempotency guard)'
  vars:
    script_path: 'repo://plugins/sdlc-utilities/scripts/skill/version.js'
    script_args: 'patch'
    script_cwd: '{{project_root}}'
    project_root: 'file://fixtures-fs/version-sdlc-already-bumped'
  assert:
    - type: icontains
      value: '"alreadyBumped": true'
    - type: icontains
      value: 'already carries release tag'
    - type: icontains
      value: 'skipping to stay idempotent'
    - type: not-icontains
      value: 'bumpOptions'

- description: 'version-sdlc-already-bumped-rc: rc re-run skips (idempotency guard)'
  vars:
    script_path: 'repo://plugins/sdlc-utilities/scripts/skill/version.js'
    script_args: 'rc'
    script_cwd: '{{project_root}}'
    project_root: 'file://fixtures-fs/version-sdlc-already-bumped-rc'
  assert:
    - type: icontains
      value: '"alreadyBumped": true'
    - type: not-icontains
      value: 'rc.2'
    - type: not-icontains
      value: 'bumpOptions'

- description: 'version-sdlc-config-changelog: patch proceeds when HEAD is off tag (control)'
  vars:
    script_path: 'repo://plugins/sdlc-utilities/scripts/skill/version.js'
    script_args: 'patch'
    script_cwd: '{{project_root}}'
    project_root: 'file://fixtures-fs/version-sdlc-config-changelog'
  assert:
    - type: icontains
      value: '"alreadyBumped": false'
    - type: icontains
      value: '"requestedBump": "patch"'
