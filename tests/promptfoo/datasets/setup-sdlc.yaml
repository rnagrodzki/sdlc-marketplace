# Behavioral tests for setup-sdlc selective-section menu (issue #191).
# Covers: full-flow menu, single-section selection, legacy migration row locking,
# empty selection no-op, --only flag bypassing menu, and verbose-header rendering.
#
# Fixture appropriateness:
#   setup-fully-configured  -- all rows state:'set'; user picks one section to tweak
#   setup-clean-project     -- all rows state:'not-set'; pre-checked; full flow
#   setup-legacy-migration  -- legacy rows locked; auto-selected; cannot toggle off
#
# All cases run via the LLM provider against `plugins/sdlc-utilities/skills/setup-sdlc/SKILL.md`.

- description: "setup-sdlc: fully-configured project + user picks one section, only that section runs"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/setup-sdlc/SKILL.md"
    project_context: "file://fixtures/setup-fully-configured.md"
    user_request: >
      Run /setup-sdlc. The menu appears; I want to reconfigure only the `jira` section.
      Show me what the menu looks like, accept my selection of `jira`, then walk me through
      configuring just that section.
  assert:
    # Menu must surface every section row at least by id
    - type: icontains-all
      value:
        - "version"
        - "ship"
        - "jira"
        - "review"
    # Must render state badges
    - type: regex
      value: "(\\[set\\]|set\\b)"
    # Must show only jira's verbose header in the dispatch (not all sections)
    - type: icontains
      value: "jira"
    # Behavioral
    - type: llm-rubric
      value: >
        The response renders the multi-select menu populated from prepare.sections[]. All 11
        rows show up at least by id. The user's selection of `jira` is honored, and ONLY the
        jira section enters the dispatch loop in Step 3 — the response does NOT walk through
        version, ship, review, commit, or pr. Before asking any jira-specific question, the
        response prints a verbose header for jira including Purpose, Files modified, and
        Consumed by lines sourced from the manifest.

- description: "setup-sdlc: clean project + user accepts pre-checked menu, full flow runs"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/setup-sdlc/SKILL.md"
    project_context: "file://fixtures/setup-clean-project.md"
    user_request: >
      Run /setup-sdlc. Nothing is configured; the menu should pre-check every not-set row.
      Confirm the default selection and show me the first verbose header you'd render
      (for the `version` section).
  assert:
    - type: icontains
      value: "version"
    # Pre-check expectation: every row defaulted on
    - type: regex
      value: "(\\[x\\]|pre-check|default selection|all selected)"
    # Verbose header for version
    - type: icontains-all
      value:
        - "Purpose"
        - "Files modified"
        - "Consumed by"
    - type: llm-rubric
      value: >
        The response acknowledges that on a clean project all not-set rows are pre-checked
        in the multi-select menu by default. It confirms the default selection and proceeds
        to render Step 3 for the first selected section (`version`). The verbose header for
        version contains four labelled lines: Purpose, Files modified, Consumed by, and
        Config file (or equivalent). The header text comes from the manifest, not freeform copy.

- description: "setup-sdlc: legacy fixture + migration row locked and cannot be toggled off"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/setup-sdlc/SKILL.md"
    project_context: "file://fixtures/setup-legacy-migration.md"
    user_request: >
      Run /setup-sdlc. The version row is `legacy` (locked: true) and so are ship and review.
      I want to UNCHECK the `version` row to skip migration. Tell me what happens.
  assert:
    - type: icontains-any
      value:
        - "locked"
        - "cannot toggle"
        - "auto-selected"
        - "migration"
    # Must NOT silently allow uncheck
    - type: llm-rubric
      value: >
        The response refuses to allow the user to uncheck the `version` row because it is
        locked (locked: true in prepare.sections). It explains that locked rows are
        auto-selected and proceed into Step 3 regardless of user input — migration must
        complete first. The response does NOT proceed with version skipped; instead it
        either re-displays the menu with a note, or confirms migration will run.

- description: "setup-sdlc: empty selection at menu exits cleanly with no changes"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/setup-sdlc/SKILL.md"
    project_context: "file://fixtures/setup-fully-configured.md"
    user_request: >
      Run /setup-sdlc. The menu appears. I uncheck every (non-locked) row and confirm
      with no rows selected. Tell me what happens.
  assert:
    - type: icontains-any
      value:
        - "no changes"
        - "no sections selected"
        - "nothing to configure"
    # Must NOT walk through any section
    - type: llm-rubric
      value: >
        The response detects the empty selection and exits cleanly with a "no changes" /
        "no sections selected" summary. It does NOT enter the Step 3 dispatch loop, does
        NOT run any AskUserQuestion for individual fields, and does NOT write any config
        files. The summary at Step 5 reflects "nothing was configured."

- description: "setup-sdlc --only jira,review: menu skipped, both sections run"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/setup-sdlc/SKILL.md"
    project_context: "file://fixtures/setup-fully-configured.md"
    user_request: >
      Run /setup-sdlc --only jira,review. Skip the menu entirely; configure only those
      two sections in dispatch order.
  assert:
    - type: icontains-all
      value:
        - "jira"
        - "review"
    # Must not enumerate sections that were not selected
    - type: llm-rubric
      value: >
        The response treats --only jira,review as bypassing the Step 1 menu and proceeds
        straight to Step 3 with only those two ids selected. It prints a verbose header
        for jira and another for review (in that order), runs the per-field prompts (or
        delegates) for each, and does NOT touch version, ship, commit, pr, or any content
        sub-flow. The final summary lists only jira and review as configured.

- description: "setup-sdlc: verbose header sourced from manifest precedes any prompt"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/setup-sdlc/SKILL.md"
    project_context: "file://fixtures/setup-clean-project.md"
    user_request: >
      Run /setup-sdlc --only jira. Before asking me anything, print the verbose header
      that the manifest drives — purpose, files modified, consuming skills, and per-option
      description block.
  assert:
    # The four verbose-header labels must appear before any AskUserQuestion
    - type: icontains-all
      value:
        - "Purpose"
        - "Files modified"
        - "Consumed by"
        - "/jira-sdlc"
    # Field description sentence (substring from manifest)
    - type: icontains-any
      value:
        - "default Jira project"
        - "ticket"
        - "PROJ"
    - type: llm-rubric
      value: >
        Before asking any AskUserQuestion, the response prints a verbose header for the
        jira section. The header contains at minimum: a Purpose line explaining what the
        jira section does at runtime, a Files modified line listing .claude/sdlc.json,
        a Consumed by line listing /jira-sdlc, /commit-sdlc, /pr-sdlc, and an Options
        block describing the defaultProject field with at least one full sentence covering
        what runtime behavior changes when set. The header copy comes from the manifest
        (scripts/lib/setup-sections.js), not freeform LLM-generated text.

# ---------------------------------------------------------------------------
# Issue #197 — pr-labels sub-flow (setup-pr-labels.md)
# ---------------------------------------------------------------------------

- description: "setup-sdlc --only pr-labels: mode=off writes { mode: 'off' } and preserves sibling pr keys"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/setup-sdlc/SKILL.md"
    project_context: >
      Project at tests/promptfoo/fixtures-fs/setup-pr-labels-clean/ with an existing
      .claude/sdlc.json that already has `pr.titlePattern` and `pr.allowedTypes`. The user
      runs `/setup-sdlc --only pr-labels` and at the mode prompt picks "off". `gh label list`
      returned a non-empty list (e.g. ["bug","feature","docs"]).
    user_request: >
      Walk through setup-pr-labels.md Steps 1-6 for this project and pick "off" at the
      mode prompt. Show the exact JSON written into .claude/sdlc.json `pr` section,
      including how titlePattern and allowedTypes are preserved.
  assert:
    - type: icontains
      value: '"mode": "off"'
    - type: icontains
      value: "titlePattern"
    - type: icontains
      value: "allowedTypes"
    - type: not-icontains
      value: '"rules":'
    - type: llm-rubric
      value: >
        The response demonstrates the off-mode write path: it reads the existing pr section,
        spreads it, and only sets/replaces the labels key with `{ mode: "off" }`. The
        existing pr.titlePattern and pr.allowedTypes survive unchanged (sub-flow gotcha #1).
        No `rules` array is written. The user is shown a one-line summary like
        "Wrote pr.labels: mode=off to .claude/sdlc.json".

- description: "setup-sdlc --only pr-labels: mode=llm writes { mode: 'llm' } with no rules array"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/setup-sdlc/SKILL.md"
    project_context: >
      Project at tests/promptfoo/fixtures-fs/setup-pr-labels-clean/ with no existing
      pr.labels block. `gh label list` returned ["bug","feature","docs","tests"]. The user
      runs `/setup-sdlc --only pr-labels` and at the mode prompt explicitly picks "llm".
    user_request: >
      Walk through setup-pr-labels.md and pick "llm" at the mode prompt. Show the JSON
      block written to .claude/sdlc.json `pr.labels` and explain why this is opt-in.
  assert:
    - type: icontains
      value: '"mode": "llm"'
    - type: not-icontains
      value: '"rules":'
    - type: llm-rubric
      value: >
        The response writes exactly `{ mode: "llm" }` under `pr.labels` with no `rules`
        field. The rationale call-out makes clear that picking "llm" is the user's explicit
        opt-in to the legacy fuzzy-match heuristic — addressing issue #197 by ensuring the
        LLM never picks labels silently for projects that didn't choose this mode.

- description: "setup-sdlc --only pr-labels: mode=rules with one branchPrefix rule writes valid block"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/setup-sdlc/SKILL.md"
    project_context: >
      Project at tests/promptfoo/fixtures-fs/setup-pr-labels-clean/ with no existing
      pr.labels block. `gh label list` returned ["bug","feature","docs"]. The user runs
      `/setup-sdlc --only pr-labels`, picks "rules", picks the "bug" label, picks the
      "branchPrefix" signal, and enters "fix/, bugfix/" as values, then picks "done".
    user_request: >
      Walk through setup-pr-labels.md Step 4 with the inputs above. Show the final JSON
      block written to .claude/sdlc.json `pr.labels` and identify which schema keys it
      uses (mode, rules[*].label, rules[*].when.branchPrefix).
  assert:
    - type: icontains
      value: '"mode": "rules"'
    - type: icontains
      value: '"label": "bug"'
    - type: icontains
      value: "branchPrefix"
    - type: icontains
      value: "fix/"
    - type: icontains
      value: "bugfix/"
    - type: llm-rubric
      value: >
        The response builds a single rule
        `{ label: "bug", when: { branchPrefix: ["fix/", "bugfix/"] } }`,
        appends it to an empty rules array, and writes `{ mode: "rules", rules: [...] }`
        under `pr.labels` via `writeSection(root, "pr", ...)`. The branchPrefix value is
        parsed from comma-separated input, trimmed, deduped, and stored as an array. The
        chosen label "bug" comes from the gh label list (not free text). No partial write
        occurs — the writeSection call happens once after "done".

# ---------------------------------------------------------------------------
# Issue #205 — pr-labels section-menu summary
# ---------------------------------------------------------------------------

- description: "setup-sdlc Step 1 menu: pr.labels mode=off renders [set] and 'off — no automatic labels'"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/setup-sdlc/SKILL.md"
    project_context: >
      Project at tests/promptfoo/fixtures-fs/setup-pr-labels-menu-off/ with an existing
      .claude/sdlc.json containing `pr.labels: { mode: "off" }`. The user runs
      `/setup-sdlc` (no flags) and reaches the Step 1 selective-section menu.
    user_request: >
      Render the Step 1 selective-section menu for this project. Show how the pr-labels
      row is presented, including its state marker and the per-section summary string
      produced by summarizePrLabels.
  assert:
    - type: icontains
      value: "pr-labels"
    - type: icontains
      value: "[set]"
    - type: icontains
      value: "off — no automatic labels"
    - type: not-icontains
      value: "not configured"
    - type: llm-rubric
      value: >
        The pr-labels row in the Step 1 menu shows the configured state: marker `[set]`
        (not `[not set]`) and the summary `off — no automatic labels`. The summarizer
        receives the `pr.labels` leaf object directly (currentCfgFor walks the
        configPath dot-path), reads `cfg.mode === "off"`, and returns the off-mode
        message. The legacy bug behavior — reading `cfg.labels.mode` from the parent
        `pr` slice and returning `not configured` — must NOT appear (issue #205).

- description: "setup-sdlc Step 1 menu: pr.labels mode=rules with 1 rule renders [set] and 'rules: 1 rule'"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/setup-sdlc/SKILL.md"
    project_context: >
      Project at tests/promptfoo/fixtures-fs/setup-pr-labels-menu-rules/ with an existing
      .claude/sdlc.json containing
      `pr.labels: { mode: "rules", rules: [{ label: "bug", when: { branchPrefix: ["fix/"] } }] }`.
      The user runs `/setup-sdlc` (no flags) and reaches the Step 1 selective-section menu.
    user_request: >
      Render the Step 1 selective-section menu for this project. Show how the pr-labels
      row is presented, including its state marker and the per-section summary string
      produced by summarizePrLabels.
  assert:
    - type: icontains
      value: "pr-labels"
    - type: icontains
      value: "[set]"
    - type: icontains
      value: "rules: 1 rule"
    - type: not-icontains
      value: "not configured"
    - type: llm-rubric
      value: >
        The pr-labels row shows marker `[set]` and summary `rules: 1 rule` (singular,
        because the rules array has length 1). The summarizer reads `cfg.rules.length`
        from the leaf, not `cfg.labels.rules.length` from the parent. The pluralization
        is correct (`rule` not `rules`).

- description: "setup-sdlc Step 1 menu: no pr.labels key renders [not set] without 'not configured' string"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/setup-sdlc/SKILL.md"
    project_context: >
      Project at tests/promptfoo/fixtures-fs/setup-pr-labels-menu-unset/ with an existing
      .claude/sdlc.json that has a `pr` block (titlePattern, allowedTypes) but NO
      `pr.labels` key at all. The user runs `/setup-sdlc` (no flags) and reaches the
      Step 1 selective-section menu.
    user_request: >
      Render the Step 1 selective-section menu for this project. Show how the pr-labels
      row is presented, including its state marker and any per-section summary string.
  assert:
    - type: icontains
      value: "pr-labels"
    - type: icontains
      value: "[not set]"
    - type: not-icontains
      value: "not configured"
    - type: llm-rubric
      value: >
        The pr-labels row shows marker `[not set]` because `pr.labels` is undefined.
        The per-section summary is empty (the helper returns `''` for missing config,
        matching sibling summarizers). The literal string `not configured` does NOT
        appear — the legacy regression must not be reintroduced (issue #205).

# ---------------------------------------------------------------------------
# Issue #231: setup-sdlc detects legacy .claude/sdlc.json and triggers migration
# ---------------------------------------------------------------------------

- description: "setup-sdlc: legacy .claude/sdlc.json triggers migration suggestion"
  vars:
    skill_content: "file://fixtures/project-needs-migration.md"
  assert:
    - type: llm-rubric
      value: >
        When a legacy `.claude/sdlc.json` is detected, the skill mentions that
        a migration is needed and that running `/setup-sdlc --migrate` will
        relocate the file to `.sdlc/config.json` and stamp `schemaVersion: 3`.
        The skill MUST NOT silently overwrite either file.
