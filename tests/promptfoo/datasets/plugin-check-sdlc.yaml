# Fixture appropriateness:
#   healthy-plugin-structure -- CORRECT: all 16 checks pass
#   broken-plugin-structure  -- CORRECT: 3 errors + 1 warning, specific PD IDs fail

- description: "plugin-check-sdlc: all 16 checks pass on healthy structure"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plugin-check-sdlc/SKILL.md"
    project_context: "file://fixtures/healthy-plugin-structure.md"
    user_request: >
      Run /plugin-check-sdlc. The validate-discovery.js report is provided in the project context
      showing all checks passing. Display the results.
  assert:
    # Must report passing status
    - type: regex
      value: "(pass|PASS|16.*16|all.+pass|0 error)"
    # Must NOT suggest fixes when all pass
    # Note: bare "fix"/"Fix" excluded — they match structural headers even in correct responses.
    # Only flag imperative fix suggestions directed at the user.
    - type: not-regex
      value: "(remediat|Add the|Create the|You should fix|Please fix)"
    # Must mention the check count or overall status
    - type: regex
      value: "(16|all checks|passing)"
    # Behavioral: clean success report, no false positives
    - type: llm-rubric
      value: >
        The response reports that all 16 plugin discovery checks passed with 0 errors and 0 warnings.
        It displays a clear success message. It does NOT suggest any fixes, workarounds, or further
        actions beyond confirming the plugin is correctly wired. It does not fabricate any failing
        checks not present in the fixture.

- description: "plugin-check-sdlc: failed checks shown with fix guidance"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/plugin-check-sdlc/SKILL.md"
    project_context: "file://fixtures/broken-plugin-structure.md"
    user_request: >
      Run /plugin-check-sdlc. The validate-discovery.js report from the project context shows
      4 failing checks. Display the failures and provide fix guidance.
  assert:
    # Must report specific failing check IDs
    - type: regex
      value: "(PD2|PD9|PD11|PD15)"
    # Must report overall failure
    - type: regex
      value: "(fail|FAIL|error|ERROR)"
    # Behavioral: identifies all 4 failures with specific guidance
    - type: llm-rubric
      value: >
        The response identifies the 4 failing checks from the validate-discovery.js output:
        PD2 (missing $schema — warning), PD9 (command references nonexistent skill — error),
        PD11 (SKILL.md missing description — error), and PD15 (invalid hooks.json — error).
        For each failure, the response provides specific, actionable fix guidance (e.g., what
        to add to marketplace.json, how to fix the command reference, what frontmatter to add,
        how to fix hooks.json). It groups errors before warnings. It does NOT report any
        failures not present in the fixture.
