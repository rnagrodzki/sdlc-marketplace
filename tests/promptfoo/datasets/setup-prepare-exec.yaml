# Script execution tests for setup.js P7 contract (shipFields).
# These tests run setup.js directly against fixture directories (no LLM).
# Covers: P7 shipFields emission, field shape, order, v2 schema migration (issues #152, #180),
# and when-gate evaluation (issue #292).

- description: "setup-prepare: emits shipFields with 13 entries (7 base + 6 R57 tunables, issue #292)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: icontains
      value: '"shipFields"'
    - type: javascript
      value: "JSON.parse(output).shipFields.length === 13"

- description: "setup-prepare: shipFields order is stable (steps → reviewThreshold → 6 R57 tunables, issue #292)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: javascript
      value: |
        const names = JSON.parse(output).shipFields.map(f => f.name);
        const expected = ['steps','bump','draft','auto','workspace','rebase','reviewThreshold','verifyPipelineTimeout','verifyPipelineInterval','verifyPipelineMaxIterations','awaitRemoteReviewTimeout','awaitRemoteReviewInterval','awaitRemoteReviewers'];
        return JSON.stringify(names) === JSON.stringify(expected)

- description: "setup-prepare: shipFields entries have the full 6-key descriptor shape"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: javascript
      value: |
        const keys = ['name','label','type','options','default','description'];
        return JSON.parse(output).shipFields.every(f => keys.every(k => k in f))

- description: "setup-prepare: shipFields.steps has exactly 7 canonical options"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: javascript
      value: |
        const steps = JSON.parse(output).shipFields.find(f => f.name === 'steps');
        const expected = ['execute','commit','review','version','pr','archive-openspec','learnings-commit'];
        return steps.type === 'multi-select' && JSON.stringify(steps.options) === JSON.stringify(expected)

- description: "setup-prepare: shipFields no longer emits preset or skip fields"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: javascript
      value: |
        const fields = JSON.parse(output).shipFields;
        return !fields.some(f => f.name === 'preset') && !fields.some(f => f.name === 'skip')

- description: "setup-prepare: still emits P1-P6 fields alongside shipFields"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: icontains
      value: '"projectConfig"'
    - type: icontains
      value: '"localConfig"'
    - type: icontains
      value: '"legacy"'
    - type: icontains
      value: '"content"'
    - type: icontains
      value: '"detected"'
    - type: icontains
      value: '"needsMigration"'

- description: "setup-prepare: needsMigration true when local config has legacy preset (v1)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-legacy-v1"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        return out.needsMigration === true && out.localIsV1 === true

- description: "setup-prepare: counts .md review-dimension files (regression #203)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-with-dimensions"
  assert:
    - type: javascript
      value: "JSON.parse(output).content.reviewDimensions.count === 3"

# Issue #235 — setup-sdlc walks every field by default; --unset-only opts in to legacy fast-path.
- description: "setup-prepare (issue #235): no flag → flags.unsetOnly=false, defaultSelectionMode=all"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/setup-fully-configured"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        return out.flags && out.flags.unsetOnly === false && out.defaultSelectionMode === 'all'

- description: "setup-prepare (issue #235): --unset-only → flags.unsetOnly=true, defaultSelectionMode=unset-only"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    script_args: "--unset-only"
    project_root: "file://fixtures-fs/setup-fully-configured"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        return out.flags.unsetOnly === true && out.defaultSelectionMode === 'unset-only'

- description: "setup-prepare (issue #235): --force overrides --unset-only → defaultSelectionMode=all"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    script_args: "--unset-only --force"
    project_root: "file://fixtures-fs/setup-fully-configured"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        return out.flags.unsetOnly === true && out.flags.force === true && out.defaultSelectionMode === 'all'

# Issue #235 — first-run on empty project: every section is 'not-set'; both modes yield identical pre-checks.
- description: "setup-prepare (issue #235): first-run on empty project — flags.unsetOnly defaults false"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        return out.flags.unsetOnly === false && out.defaultSelectionMode === 'all'

# Issue #234 — pr.expectedAccount surfaces in the standard menu walk.
- description: "setup-prepare (issue #234): pr section exposes expectedAccount field with origin-owner default"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/setup-fully-configured"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        const pr = out.sections.find(s => s.id === 'pr');
        if (!pr) return false;
        const ea = pr.fields.find(f => f.name === 'expectedAccount');
        return Boolean(ea) && ea.type === 'string' && ea.default === 'test-user'

# ---------------------------------------------------------------------------
# Issue #292 — when-gate evaluation: setup.js --steps <csv> marks gated entries
# ---------------------------------------------------------------------------

- description: "setup-prepare (issue #292): when verify-pipeline NOT in steps[], 3 verifyPipeline* entries have skip:true"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_args: "--steps execute,commit,review,pr,await-remote-review"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        const vp = out.shipFields.filter(f => f.name.startsWith('verifyPipeline'));
        return vp.length === 3 && vp.every(f => f.skip === true)

- description: "setup-prepare (issue #292): when await-remote-review NOT in steps[], 3 awaitRemoteReview* entries have skip:true"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_args: "--steps execute,commit,review,verify-pipeline,pr"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        const ar = out.shipFields.filter(f => f.name.startsWith('awaitRemoteReview'));
        return ar.length === 3 && ar.every(f => f.skip === true)

- description: "setup-prepare (issue #292): when both verify-pipeline and await-remote-review in steps[], no entries have skip:true"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_args: "--steps execute,commit,verify-pipeline,await-remote-review,pr"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        return out.shipFields.every(f => f.skip === false)

- description: "setup-prepare (issue #292): entries without 'when' are never skip:true regardless of steps"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_args: "--steps execute"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        const nonGated = out.shipFields.filter(f => !f.when);
        return nonGated.length === 7 && nonGated.every(f => f.skip === false)

# ---------------------------------------------------------------------------
# Issue #338 — preReleaseCompat; Issue #337 — menuInputContract
# ---------------------------------------------------------------------------

- description: "setup-prepare (#338): preReleaseCompat contains all six fileType keys with correct levels"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        const pc = out.preReleaseCompat;
        if (!pc) return false;
        const expected = {
          'package.json': 'compatible',
          'cargo.toml': 'compatible',
          'plugin.json': 'compatible',
          'pyproject.toml': 'partial',
          'pubspec.yaml': 'incompatible',
          'version-file': 'unknown',
        };
        return Object.entries(expected).every(([k, v]) => pc[k] && pc[k].level === v) &&
               Object.keys(pc).length === 6

- description: "setup-prepare (#337): menuInputContract.defaultToken === 'all' when --unset-only is absent"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        return out.menuInputContract && out.menuInputContract.defaultToken === 'all'

- description: "setup-prepare (#337): menuInputContract.defaultToken === 'not-set' when --unset-only is passed"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_args: "--unset-only"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        return out.menuInputContract && out.menuInputContract.defaultToken === 'not-set'

# ---------------------------------------------------------------------------
# Issue #351 — workspace section in sections array
# ---------------------------------------------------------------------------

- description: "setup-prepare (#351): workspace section present in sections[] with correct shape"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        const ws = out.sections && out.sections.find(s => s.id === 'workspace');
        return Boolean(ws) && ws.configFile === '.sdlc/local.json' && ws.configPath === 'workspace'

- description: "setup-prepare (#351): workspace section has context with previewPaths, consumerCommitsClaude, existingWorktrees, mismatchesByLayout"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        const ws = out.sections && out.sections.find(s => s.id === 'workspace');
        return ws && ws.context && typeof ws.context.consumerCommitsClaude === 'boolean' &&
               ws.context.previewPaths && typeof ws.context.previewPaths.inside === 'string' &&
               typeof ws.context.previewPaths.sibling === 'string' &&
               Array.isArray(ws.context.existingWorktrees) &&
               ws.context.mismatchesByLayout &&
               Array.isArray(ws.context.mismatchesByLayout.inside) &&
               Array.isArray(ws.context.mismatchesByLayout.sibling) &&
               Array.isArray(ws.context.mismatchesByLayout.central)

- description: "setup-prepare (#351): workspace section has 5 fields (layout/base/template/ensureGitignore/nameTemplate)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/setup.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-setup-empty"
  assert:
    - type: javascript
      value: |
        const out = JSON.parse(output);
        const ws = out.sections && out.sections.find(s => s.id === 'workspace');
        if (!ws || !ws.fields) return false;
        const names = ws.fields.map(f => f.name);
        const expected = ['layout', 'base', 'template', 'ensureGitignore', 'nameTemplate'];
        return JSON.stringify(names) === JSON.stringify(expected)
