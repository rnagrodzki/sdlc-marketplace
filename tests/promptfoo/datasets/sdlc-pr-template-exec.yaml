# Script execution tests for validate-pr-template.js.
# These tests run validate-pr-template.js directly against real fixture directories (no LLM).
# They validate that PR template validation (V1-V5) produces correct output.
#
# Fixture appropriateness:
#   project-with-pr-template     -- CORRECT: valid template with 4 sections, all 30+ chars body → V1-V5 pass
#   project-no-pr-template       -- CORRECT: no .claude/pr-template.md → V1 fail
#   project-empty-pr-template    -- CORRECT: empty file → V2 fail
#   project-duplicate-sections   -- CORRECT: two ## Summary headings → V4 fail

- description: "sdlc-pr-template: valid template passes all V1-V5 checks"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-pr-template.js"
    script_args: "--project-root {{project_root}} --json"
    project_root: "file://fixtures-fs/project-with-pr-template"
  assert:
    # Overall must be passed: true
    - type: icontains
      value: '"passed": true'
    # All individual checks must be PASS
    - type: not-icontains
      value: '"status": "FAIL"'
    # V1-V5 must all appear
    - type: regex
      value: '"id": "V[1-5]"'

- description: "sdlc-pr-template: missing template fails V1"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-pr-template.js"
    script_args: "--project-root {{project_root}} --json"
    project_root: "file://fixtures-fs/project-no-pr-template"
  assert:
    # Overall must be passed: false
    - type: icontains
      value: '"passed": false'
    # V1 must fail
    - type: icontains
      value: '"id": "V1"'
    - type: icontains
      value: '"status": "FAIL"'
    # Must mention file not found
    - type: icontains
      value: "not found"

- description: "sdlc-pr-template: empty template fails V2"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-pr-template.js"
    script_args: "--project-root {{project_root}} --json"
    project_root: "file://fixtures-fs/project-empty-pr-template"
  assert:
    # Overall must fail
    - type: icontains
      value: '"passed": false'
    # V1 must pass (file exists) — check by verifying V2 is the first failure
    - type: icontains
      value: '"id": "V1"'
    # V2 must fail
    - type: icontains
      value: '"id": "V2"'
    - type: icontains
      value: '"status": "FAIL"'

- description: "sdlc-pr-template: duplicate sections fail V4"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-pr-template.js"
    script_args: "--project-root {{project_root}} --json"
    project_root: "file://fixtures-fs/project-duplicate-sections"
  assert:
    # Overall must fail
    - type: icontains
      value: '"passed": false'
    # V4 must fail
    - type: icontains
      value: '"id": "V4"'
    - type: icontains
      value: '"status": "FAIL"'
    # Must mention the duplicate
    - type: icontains
      value: "appears 2 times"
