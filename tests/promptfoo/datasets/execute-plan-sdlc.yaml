# Fixture appropriateness:
#   plan-execution-complete        -- CORRECT: simulates completed plan execution, triggers workflow continuation
#   feature-branch-with-commits   -- CORRECT: provides branch context for plan execution with --quality
#   plan-execution-with-guardrails -- CORRECT: provides execution guardrails context for guardrail evaluation testing

- description: "execute-plan-sdlc: shows workflow continuation menu after plan execution"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-execution-complete.md"
    user_request: >
      Run /execute-plan-sdlc. The plan execution has completed — all waves finished, all tasks
      succeeded, and final verification passed. The Step 9 summary report has been presented.
      Now show what comes next.
  assert:
    # Must offer commit as a next action
    - type: icontains
      value: "/commit-sdlc"
    # Must offer PR as a next action
    - type: icontains
      value: "/pr-sdlc"
    # Must offer version as a next action
    - type: icontains
      value: "/version-sdlc"
    # Must offer done as an option
    - type: icontains
      value: "done"
    # Behavioral: interactive menu with skill options
    - type: llm-rubric
      value: >
        The response presents an interactive menu asking the user what to do next after plan
        execution, with specific skill options to choose from. The menu includes at minimum:
        commit (/commit-sdlc), review (/review-sdlc), version (/version-sdlc), pr (/pr-sdlc),
        and done. The user is asked to select an option rather than being given a passive suggestion.

- description: "execute-plan-sdlc: skips quality-tier selection when --quality balanced is provided"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/feature-branch-with-commits.md"
    user_request: >
      Run /execute-plan-sdlc --quality balanced. A plan with 5 tasks has been loaded and
      validated. Task classification and wave building are complete. Show the wave structure
      and proceed with the Balanced quality tier applied automatically.
  assert:
    # Behavioral: applies Balanced tier without interactive selection
    - type: llm-rubric
      value: >
        The response applies the Balanced quality tier (--quality balanced) without
        presenting the interactive selection menu to the user. It shows the wave structure
        with model assignments that reflect the Balanced tier (haiku for Trivial, sonnet
        for Standard, opus for Complex) and proceeds directly to execution. The response
        does not ask the user to select a quality tier — the selection is already made via
        the --quality argument. The response uses --quality (not --preset).

- description: "execute-plan-sdlc: loads execution guardrails from config and evaluates during execution"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-execution-with-guardrails.md"
    user_request: >
      Run /execute-plan-sdlc --quality balanced. A plan with 4 tasks has been loaded and validated.
      The project has execution guardrails configured in .claude/sdlc.json under execute.guardrails.
      Show how guardrails are loaded and describe how they will be evaluated during execution.
  assert:
    - type: icontains
      value: "execution guardrails"
    - type: icontains
      value: "guardrail"
    - type: llm-rubric
      value: >
        The response acknowledges that execution guardrails are configured and loaded from the
        execute section of .claude/sdlc.json (not the plan section). It describes or references
        guardrail evaluation at pre-wave (5a-pre) and/or post-wave (5c-ter) checkpoints.
        The response distinguishes execution guardrails from plan guardrails.

- description: "execute-plan-sdlc: proceeds normally when no execution guardrails configured"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-execution-complete.md"
    user_request: >
      Run /execute-plan-sdlc --quality balanced. A plan has been loaded. No execution guardrails are
      configured in the project. Show how the execution proceeds.
  assert:
    - type: not-icontains
      value: "guardrail violation"
    - type: llm-rubric
      value: >
        The response proceeds with normal plan execution without blocking on guardrails.
        It may mention "No execution guardrails configured" but does not show guardrail
        evaluation steps or guardrail violations. Execution flows through the standard
        wave dispatch, verification, and reporting steps.

- description: "execute-plan-sdlc: model parameter required on every agent dispatch per quality tier"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/feature-branch-with-commits.md"
    user_request: >
      Run /execute-plan-sdlc --quality balanced. A plan with 5 tasks (2 Trivial, 2 Standard,
      1 Complex) is ready. Show the wave structure with model assignments and how
      agents will be dispatched.
  assert:
    - type: icontains
      value: "model"
    - type: regex
      value: "(haiku|sonnet|opus)"
    - type: llm-rubric
      value: >
        The response shows wave structure with explicit model assignments per task:
        Trivial=haiku, Standard=sonnet, Complex=opus (Balanced quality tier). The
        dispatch includes model: as a required parameter for each agent.

# OpenSpec post-pipeline archive suggestion tests (issue #162)

- description: "execute-plan-sdlc: emits archive suggestion when OpenSpec plan and validation passes"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-execution-complete.md"
    user_request: >
      Run /execute-plan-sdlc. The plan execution has completed — all waves finished, all tasks
      succeeded, and final verification passed. The plan's **Source:** header points to
      openspec/changes/add-auth/. The openspecSpecs were loaded in Step 1.
      validateChangeStrict returned { ok: true, cliAvailable: true }.
      Now show the What's Next section.
  assert:
    - type: icontains
      value: "archive"
    - type: icontains
      value: "/ship-sdlc"
    - type: llm-rubric
      value: >
        The response emits a post-pipeline suggestion that includes archiving the OpenSpec
        change (mentioning openspec archive or /ship-sdlc). The suggestion is presented as
        informational — NOT auto-executed. The response acknowledges validation passed.

- description: "execute-plan-sdlc: suppresses archive suggestion when validation fails"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-execution-complete.md"
    user_request: >
      Run /execute-plan-sdlc. The plan execution has completed — all waves finished.
      The plan's **Source:** header points to openspec/changes/add-auth/.
      validateChangeStrict returned { ok: false, cliAvailable: true, stderr: "Missing required delta spec" }.
      Now show the What's Next section.
  assert:
    - type: not-icontains
      value: "openspec archive"
    - type: icontains
      value: "validation"
    - type: llm-rubric
      value: >
        The response surfaces the validation failure output (mentioning the error or that
        validation failed) and does NOT suggest running openspec archive. It may suggest
        fixing the validation issues first.

- description: "execute-plan-sdlc: falls back to static advisory when CLI not available"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-execution-complete.md"
    user_request: >
      Run /execute-plan-sdlc. The plan execution has completed — all waves finished.
      The plan's **Source:** header points to openspec/changes/add-auth/.
      validateChangeStrict returned { ok: false, cliAvailable: false, stderr: "openspec CLI not found on PATH" }.
      Now show the What's Next section.
  assert:
    - type: icontains
      value: "verify"
    - type: llm-rubric
      value: >
        The response falls back to a static advisory mentioning /opsx:verify and /opsx:archive
        (or similar non-CLI suggestions) without fabricating a validation result. It does NOT
        claim validation passed. It may note that the openspec CLI is not available.

- description: "execute-plan-sdlc: Learning Capture writes to log.md before Step 9 REPORT (issue #208)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/execute-plan-ready.md"
    user_request: >
      A 2-task plan has just finished executing. A guardrail was overridden by the
      user during Wave 1 (so a learning entry should be appended). Walk through
      Step 8-ter (Learning Capture) and Step 9 (REPORT) in order, narrating exactly
      what gets written to `.sdlc/learnings/log.md` and confirming the working
      tree contains that change BEFORE the final summary is emitted.
  assert:
    - type: icontains
      value: "learnings/log.md"
    - type: icontains
      value: "Step 9"
    - type: llm-rubric
      value: >
        The narration shows the Learning Capture append happening in Step 8-ter,
        BEFORE Step 9 (REPORT) emits the final summary. The response references
        R27 or paraphrases the ordering rule: the log.md write must be part of
        the working tree when execute-plan-sdlc returns control, so ship-sdlc's
        staging window picks it up and the entry lands in the feature commit.
        The response does NOT describe Learning Capture as running after Step 9
        or as a standalone post-summary section.

# Issue #353 — Wave-level Agent dispatch: wave-runner model in Step 5b
# ---------------------------------------------------------------------------

- description: "execute-plan-sdlc (issue #353): Step 5b dispatches one wave-runner Agent per wave, not one per task"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/execute-plan-ready.md"
    user_request: >
      A plan has 2 waves: Wave 1 contains tasks T1 (Standard) and T2 (Standard);
      Wave 2 contains tasks T3 (Standard) and T4 (Standard). There are no Trivial
      tasks. Walk through Step 5b for both waves — how many Agent dispatches happen
      from main context, and what do the wave-runner Agents receive?
  assert:
    - type: llm-rubric
      value: >
        The response describes exactly 2 Agent dispatches from main context (one
        wave-runner Agent per wave, not 4 per-task dispatches). Each wave-runner
        Agent receives the wave manifest (task descriptions, file lists, assigned
        models, prior-wave context), the per-task template inlined as perTaskTemplate,
        and is responsible for fanning out per-task sub-agents internally. The
        response must NOT describe 4 individual Agent dispatches from main context.

- description: "execute-plan-sdlc (issue #353): in-wave trivial batch absorbed into wave-runner dispatch"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/execute-plan-ready.md"
    user_request: >
      Wave 1 contains 3 tasks: T1 (Standard, sonnet), T2 (Trivial, haiku), T3
      (Trivial, haiku). Walk through Step 5b for this wave — how many Agent
      dispatches happen from main context, and what does the wave-runner's prompt
      body include for the trivial batch?
  assert:
    - type: llm-rubric
      value: >
        The response describes exactly 1 Agent dispatch from main context (one
        wave-runner Agent for the entire wave). The wave-runner Agent's prompt
        body includes the batchedTrivialTemplate (inlined from
        classifying-and-waving-tasks.md) because the wave has 2+ Trivial tasks.
        The wave-runner handles the trivial batch internally. The response must
        NOT describe a separate batch-haiku Agent dispatch from main context for
        the trivial tasks within this wave.

- description: "execute-plan-sdlc (issue #353): Step 5c parses WAVE_SUMMARY and runs filesystem verification"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/execute-plan-ready.md"
    user_request: >
      The wave-runner Agent has returned. Its final line is:
      `WAVE_SUMMARY: {"wave":1,"status":"completed","tasks":[{"id":"t1","name":"Add dispatchMode","complexity":"Standard","risk":"Low","status":"DONE","filesChanged":["plugins/ship.js"],"verifyToken":"dispatchMode in plugins/ship.js","attempts":[{"model":"sonnet","status":"DONE"}],"finalModel":"sonnet"}],"verification":{"ran":false},"escalationsUsed":0}`
      Walk through Step 5c — what does main context do with this output?
  assert:
    - type: icontains
      value: "WAVE_SUMMARY"
    - type: regex
      value: "(git diff|filesystem)"
    - type: llm-rubric
      value: >
        Main context parses the WAVE_SUMMARY token, extracts filesChanged
        (['plugins/ship.js']) and verifyToken ('dispatchMode in plugins/ship.js'),
        then runs git diff --stat to confirm the file changed (filesystem
        verification). It also greps for the verify token symbol. If git diff
        shows no change, it classifies this as a phantom success. It then runs
        the verification suite (tests/build/lint per plan). State writes
        (task-done, wave-done via state/execute.js) happen after verification
        passes. The response must NOT describe the wave-runner performing git
        diff or state writes.

- description: "execute-plan-sdlc (issue #353): high-risk gate fires in main context before wave-runner dispatch"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/execute-plan-ready.md"
    user_request: >
      Wave 3 contains one task classified as HIGH RISK (T5: architectural change).
      Walk through Step 5a — when does the AskUserQuestion fire relative to the
      wave-runner Agent dispatch?
  assert:
    - type: regex
      value: "(AskUserQuestion|high.risk gate)"
    - type: llm-rubric
      value: >
        Step 5a fires BEFORE the wave-runner Agent is dispatched. The
        AskUserQuestion lists the high-risk task names and waits for user
        approval (yes/skip/cancel). Only after the user approves does main
        context dispatch the wave-runner Agent for Wave 3. The wave-runner
        Agent itself does NOT fire the high-risk gate — that is a main-context
        responsibility.

- description: "execute-plan-sdlc (#378): --branch flag short-circuits Step 1 workspace derivation"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-execution-complete.md"
    user_request: >
      The skill is invoked with `/execute-plan-sdlc --branch feat/fix-login`.
      Describe what happens in Step 1's workspace derivation.
      Specifically: does the skill run `git checkout -b`? Does it create a worktree?
      Does it show an interactive workspace prompt?
      What variable is set and what is its value?
  assert:
    - type: llm-rubric
      value: >
        The response must state that when `--branch feat/fix-login` is passed,
        execute-plan-sdlc captures `EXECUTE_NEW_BRANCH="feat/fix-login"` and
        skips the workspace derivation in Step 1 — no `git checkout -b`,
        no worktree creation (execute-plan-sdlc never creates a worktree),
        no interactive workspace prompt. The skill trusts the caller's branch/cwd
        as authoritative. The response should reference R30 or the --branch
        short-circuit behaviour (implements R30, fixes #378, #379).

- description: "execute-plan-sdlc (#378): Step 9 emits Branch line under --branch, no Worktree line"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-execution-complete.md"
    user_request: >
      The skill was invoked with `--branch feat/fix-login` (pipeline mode from ship-sdlc).
      After all waves complete, what does Step 9's REPORT output include regarding
      branch and worktree? Does it emit a `Worktree:` line? Does it emit a `Branch:` line?
      What value does the Branch line contain?
  assert:
    - type: llm-rubric
      value: >
        The response must state that Step 9 emits a `Branch: feat/fix-login` line
        because EXECUTE_NEW_BRANCH is set. It must also state that a `Worktree:`
        line is NEVER emitted — execute-plan-sdlc never creates a worktree.
        The response should reference R31 (fixes #378, #379).

- description: "execute-plan-sdlc (#378): standalone on default branch derives branch and emits only a Branch line"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-execution-complete.md"
    user_request: >
      The skill is invoked standalone with `/execute-plan-sdlc` (no --branch flag)
      from the main worktree while on the default branch `main`. Describe what
      Step 1 derives, whether a worktree is created, and what Step 9's REPORT
      output includes regarding branch and worktree.
  assert:
    - type: llm-rubric
      value: >
        The response must state that the workspace derives to `branch` (main
        worktree + default branch), so Step 1 runs `git checkout -b` on a derived
        feature-branch name — NO worktree is created (execute-plan-sdlc never
        creates a worktree). Step 9 emits a `Branch:` line with the derived name
        and NO `Worktree:` line. The response should reference R16/R30/R31
        (workspace auto-detection, fixes #378, #379).

- description: "execute-plan-sdlc (#370): wave-runner Agent dispatch must omit isolation parameter"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/plan-execution-complete.md"
    user_request: >
      When execute-plan-sdlc dispatches the wave-runner Agent in Step 5b,
      describe the exact Agent tool call parameters — specifically, which
      parameters are included and whether isolation: "worktree" appears.
  assert:
    - type: llm-rubric
      value: >
        The response must state that the Agent dispatch in Step 5b includes
        `model:` and `mode: bypassPermissions` but does NOT include an
        `isolation` parameter (not `isolation: "worktree"` nor any other
        isolation value). execute-plan-sdlc never creates a git worktree
        (workspace is auto-detected); the Agent SDK isolation parameter would
        break .sdlc/ anchoring. The response must reference the DO NOT note in
        Step 5b or R-no-agent-sdk-isolation.

# ---------------------------------------------------------------------------
# Fixes #392 — Track B behavioral cases
# ---------------------------------------------------------------------------

- description: "execute-plan-sdlc: per-task Agent prompt contains '## Project Guardrails' section when guardrails non-empty (#392 / R33)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/execute-guardrail-injection.md"
    user_request: >
      Show the per-task Agent prompt the wave-runner would dispatch for Task T1 in Wave 1.
      Include the full "## Project Guardrails" section verbatim. activeGuardrails has 2 entries
      (one error, one warning).
  assert:
    - type: icontains
      value: "## Project Guardrails"
    - type: icontains
      value: "no-direct-db-access"
    - type: icontains
      value: "no-axios"
    - type: icontains
      value: "You MUST respect these constraints"
    - type: llm-rubric
      value: >
        The response renders a per-task Agent prompt that contains a "## Project Guardrails"
        section near the top with prescriptive framing ("You MUST respect these constraints").
        Both guardrails (no-direct-db-access at error severity, no-axios at warning severity)
        are listed with their id, severity, and description. The section is placed BEFORE
        "Files You May Touch" or task-variable content to preserve prompt-cache prefix
        stability across sibling per-task dispatches.

- description: "execute-plan-sdlc: Step 5c sub-step 1a flags HARD failure when expectedFiles ∩ diff is empty (#392 / R34)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/execute-expected-files-hard-fail.md"
    user_request: >
      Walk through Step 5c sub-step 1a (expectedFiles cross-check) for Wave 2. The wave-runner
      returned WAVE_SUMMARY with filesChanged=[docs/notes.md] but the wave manifest's
      expectedFiles is [src/auth/token.ts, src/auth/token.test.ts]. What is the verdict and
      next action?
  assert:
    - type: icontains
      value: "HARD"
    - type: icontains
      value: "phantom"
    - type: llm-rubric
      value: >
        The response identifies this as a HARD FAILURE (wave-level phantom success): the
        intersection of expectedFiles and the actual diff is empty, and expectedFiles is
        non-empty. The next action is to trigger the existing failure flow (escalation budget
        / retry / Step 6 RECOVER / user surface). The response does NOT proceed to subsequent
        sub-steps in 5c after the failure verdict.

- description: "execute-plan-sdlc: Step 5c sub-step 1a surfaces SOFT warning when diff touches files outside expected (#392 / R34)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/execute-expected-files-soft-warning.md"
    user_request: >
      Walk through Step 5c sub-step 1a (expectedFiles cross-check) for Wave 1. The diff
      touches src/auth/token.ts (in expectedFiles) AND src/auth/index.ts (NOT in
      expectedFiles). What is the verdict and what is surfaced to the user?
  assert:
    - type: icontains
      value: "SOFT"
    - type: icontains
      value: "outside expectedFiles"
    - type: llm-rubric
      value: >
        The response identifies this as a SOFT WARNING — the diff touches one or more files
        outside expectedFiles. The response surfaces a single line of the form
        "Wave N touched files outside expectedFiles: <list>" naming src/auth/index.ts. Execution
        CONTINUES to step 2 (canary check) — the soft warning does NOT block.

- description: "execute-plan-sdlc: Step 5d calls markTaskDone after wave WAVE_SUMMARY for tasks with openspec-task blocks (R37, #414)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/execute-openspec-flip.md"
    user_request: >
      Wave 1 returned WAVE_SUMMARY with tasks t1 (DONE) and t2 (DONE). Both tasks carry
      openspec-task blocks: t1 has ref=create-resourceindicator-component-ab12cd and t2 has
      ref=add-getindicators-to-resourceservice-ef34ab. Each ref maps to a single plan task.
      Walk through Step 5d (state writes) and describe what markTaskDone calls are made.
  assert:
    - type: icontains
      value: "markTaskDone"
    - type: llm-rubric
      value: >
        The response describes two markTaskDone calls in Step 5d — one per completed task.
        For t1: markTaskDone(add-resource-indicators, create-resourceindicator-component-ab12cd, ...).
        For t2: markTaskDone(add-resource-indicators, add-getindicators-to-resourceservice-ef34ab, ...).
        The calls happen AFTER the WAVE_SUMMARY is parsed and AFTER task-done state writes — not
        inside the wave-runner Agent. The response correctly identifies this as main-context work.

- description: "execute-plan-sdlc: N:1 grouping — flip fires only when last sibling completes (R37, #414)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/execute-openspec-flip.md"
    user_request: >
      Two plan tasks (t3 and t4) share openspec-task.ref = create-indicatorcache-with-ttl-support-cd56ef.
      Wave 1 completes with t3 DONE. Wave 2 completes with t4 DONE. When does markTaskDone
      fire for this ref? What happens if t4 is FAILED instead?
  assert:
    - type: llm-rubric
      value: >
        The response correctly explains N:1 semantics: markTaskDone fires only after the
        LAST sibling (t4) reaches a success status. After Wave 1 (only t3 done), the checkbox
        remains - [ ]. After Wave 2 (t4 also done), markTaskDone fires for ref
        create-indicatorcache-with-ttl-support-cd56ef. If t4 is FAILED, the checkbox stays
        - [ ] because not all siblings completed successfully.

- description: "execute-plan-sdlc: markTaskDone failure is non-blocking — warning logged and surfaced in Step 9 (R39, #414)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/execute-openspec-flip.md"
    user_request: >
      Wave 1 completes with t1 DONE. t1 has openspec-task.ref = create-resourceindicator-component-ab12cd.
      markTaskDone returns { changed: false, reason: 'not-found', line: null }. What happens?
      Does the pipeline abort? What is logged?
  assert:
    - type: not-icontains
      value: "abort"
    - type: icontains
      value: ".sdlc/learnings/log.md"
    - type: icontains
      value: "OpenSpec sync warnings"
    - type: llm-rubric
      value: >
        The response confirms the pipeline does NOT abort. The failure is appended to
        .sdlc/learnings/log.md (format: ## YYYY-MM-DD — execute-plan-sdlc markTaskDone failed:
        change=add-resource-indicators ref=create-resourceindicator-component-ab12cd reason=not-found).
        The warning is queued and surfaced in Step 9 REPORT under "OpenSpec sync warnings:".

# ---------------------------------------------------------------------------
# BEST-EFFORT / NON-DETERMINISTIC — Dispatch resilience regression (#463, R-nested-dispatch-resilient)
# This case demonstrates intent: when execute-plan-sdlc runs as a ship-sdlc subagent it must
# still dispatch wave-runner Agents (nested Agent dispatch). Behavioral non-determinism means
# this is a demonstration of intent, NOT a gate. The deterministic guard is in
# execute-plan-sdlc-dispatch-resilience-exec.yaml (Task 3), which is the real regression anchor.
# ---------------------------------------------------------------------------
- description: "execute-plan-sdlc (#463, R-nested-dispatch-resilient): dispatches wave-runner when running as ship-sdlc subagent [BEST-EFFORT]"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/feature-branch-with-commits.md"
    user_request: >
      You are execute-plan-sdlc running as a subagent dispatched by ship-sdlc for a multi-wave plan.
      You are NOT the top-level context — ship-sdlc invoked you via the Agent tool.
      A 2-wave plan is loaded: Wave 1 has T1 (Standard) and Wave 2 has T2 (Standard).
      Walk through Step 5b for Wave 1: dispatch the wave-runner Agent for this wave.
      Show the Agent tool call parameters you would use.
  assert:
    # Behavioral: must dispatch wave-runner Agent (nested dispatch must occur)
    - type: llm-rubric
      value: >
        The response proceeds to dispatch the wave-runner Agent for Wave 1 using the Agent
        tool. The dispatch includes `model:` and `mode: bypassPermissions` parameters and
        does NOT include `isolation:`. The response does NOT emit any self-blocking text
        such as "no agent-dispatch tool available" or refuse to call the Agent tool on the
        grounds of running as a subagent. Nested Agent dispatch is supported — being
        dispatched as a subagent does not remove the Agent tool. The wave-runner dispatch
        must occur; "no agent-dispatch tool available" must NOT appear.

- description: "execute-plan-sdlc: archive suggestion suppressed when undocumented - [ ] tasks remain (R38, #414)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/execute-plan-sdlc/SKILL.md"
    project_context: "file://fixtures/execute-openspec-flip.md"
    user_request: >
      All waves completed. Re-parsing tasks.md shows one - [ ] line: "Create IndicatorCache
      with TTL support" (line 3). This title is NOT in the plan's ## Out-of-scope OpenSpec
      tasks section. What does the archive suggestion output look like?
  assert:
    - type: not-icontains
      value: "openspec archive add-resource-indicators --yes"
    - type: icontains
      value: "suppressed"
    - type: icontains
      value: "Create IndicatorCache with TTL support"
    - type: llm-rubric
      value: >
        The archive suggestion is suppressed (R38). The response emits "OpenSpec tasks
        incomplete — archive suggestion suppressed." followed by a diagnostic listing the
        unflipped task: "line 3: Create IndicatorCache with TTL support — expected from plan
        task(s) <id>". The runArchive function is NOT called. The response instructs the user
        to fix the plan-task failures or add the title to ## Out-of-scope OpenSpec tasks.
