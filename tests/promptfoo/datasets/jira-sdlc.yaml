# Fixture appropriateness:
#   jira-ticket-created            -- CORRECT: simulates a created Jira ticket, triggers workflow continuation
#   jira-create-task               -- CORRECT: simulates Jira cache with project metadata for create operation
#   jira-comment-adf               -- CORRECT: simulates Jira cache for comment operation with ADF conversion
#   jira-multi-project-closed-list -- CORRECT: simulates jira.projects in config to trigger closed-list prompt
#   jira-unsampled-transition      -- CORRECT: simulates cache with workflows[Type].unsampled=true to force live fallback
#
# NOTE: Exec (script-only) cases for jira-prepare.js live in jira-sdlc-exec.yaml
# (ref'd by promptfooconfig-exec.yaml). This file contains behavioral (LLM) cases only.

- description: "jira-sdlc: shows workflow continuation menu after Jira ticket created"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/jira-sdlc/SKILL.md"
    project_context: "file://fixtures/jira-ticket-created.md"
    user_request: >
      Run /jira-sdlc. A Jira ticket PROJ-142 has been created successfully — it's a Story
      in the PROJ project with implementation acceptance criteria. Now show what comes next.
  assert:
    # Must offer plan as a next action
    - type: icontains
      value: "/plan-sdlc"
    # Must offer done as an option
    - type: icontains
      value: "done"
    # Behavioral: interactive menu asking whether to plan
    - type: llm-rubric
      value: >
        The response asks the user whether to plan implementation for the Jira ticket,
        presenting an interactive menu. The menu includes at minimum: plan (/plan-sdlc) and
        done. Since a ticket with implementation work was just created, the plan option is
        offered. The user is asked to select an option rather than being given a passive
        suggestion.

- description: "jira-sdlc: follows create operation procedure from operations reference"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/jira-sdlc/SKILL.md"
    project_context: "file://fixtures/jira-create-task.md"
    user_request: >
      Run /jira-sdlc. Create a Task in PROJ with summary "Add rate limiting to
      API endpoints", priority High, and labels backend and security. The Jira
      cache is loaded in the project context.
  assert:
    # Must reference creating an issue
    - type: regex
      value: "(create|creating|Create)"
    # Must identify the correct issue type from cache
    - type: regex
      value: "(Task|issue.?type)"
    # Must reference the project
    - type: regex
      value: "(PROJ|project)"
    # Must include priority from cache allowedValues
    - type: regex
      value: "(priority|High)"
    # Must not fabricate field values not in the cache
    - type: not-regex
      value: "(guess|fabricat|invent|assume)"
    # Behavioral: follows create operation procedure with cache-driven values
    - type: llm-rubric
      value: >
        The response follows the Create Operation procedure: it maps "task" to the
        "Task" issue type from the cache's issueTypes list (exact match, not
        lowercase). It uses priority "High" from the cache's fieldSchemas.Task.priority
        allowedValues (not guessed). It includes the labels as a flat string array
        ["backend", "security"]. It describes the MCP call it would make including
        contentFormat: "markdown" and the cloudId from cache. It does NOT fabricate
        fields not present in the cache (no components, no custom fields unless the
        user asked). The summary matches what the user requested exactly.

- description: "jira-sdlc: converts comment to ADF before posting via addCommentToJiraIssue"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/jira-sdlc/SKILL.md"
    project_context: "file://fixtures/jira-comment-adf.md"
    user_request: >
      Run /jira-sdlc. Add a comment to PROJ-150 with a heading, bullet list, and
      code block summarizing test results. The Jira cache is loaded in the project context.
  assert:
    # Must reference the conversion script
    - type: icontains
      value: "markdown-to-adf"
    # Must use contentFormat "adf" for the comment
    - type: icontains
      value: 'contentFormat'
    - type: icontains
      value: "adf"
    # Must preserve responseContentFormat "markdown" for reading
    - type: icontains
      value: 'responseContentFormat'
    # Must use correct parameter names
    - type: icontains
      value: "commentBody"
    - type: icontains
      value: "issueIdOrKey"
    # Behavioral: follows ADF comment flow from operations-reference.md
    - type: llm-rubric
      value: >
        The response follows the Comment Operation procedure for ADF conversion:
        (1) It composes the comment in markdown using safe syntax (heading, bullet list,
        code block). (2) It describes running the markdown-to-adf.js conversion script
        to convert markdown to ADF JSON. (3) It calls addCommentToJiraIssue with
        contentFormat: "adf" and the ADF JSON as commentBody (not "comment"), using
        issueIdOrKey (not "issueKey"). (4) It uses responseContentFormat: "markdown"
        for reading. It does NOT post raw markdown with contentFormat: "markdown" for
        the comment. The cloudId comes from the cache.

- description: "jira-sdlc: multi-project config — closed-list prompt for project selection (R13)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/jira-sdlc/SKILL.md"
    project_context: "file://fixtures/jira-multi-project-closed-list.md"
    user_request: >
      Run /jira-sdlc. No --project argument. Current branch is "main" (no
      [A-Z]{2,10}-\d+ pattern). .claude/sdlc.json has jira.projects: ["FOO","BAR"]
      and jira.defaultProject is null. The user wants to create an issue but hasn't
      said which project. Show how the skill resolves the project key.
  assert:
    # Must mention AskUserQuestion / closed list of the two configured projects
    - type: icontains
      value: "FOO"
    - type: icontains
      value: "BAR"
    # Must NOT invent a third project (free-form prompt or fabricated key)
    - type: not-regex
      value: "(PROJ|BAZ|QUUX|TEAM)"
    # Behavioral rubric for R13 closed-list prompt
    - type: llm-rubric
      value: >
        The response recognizes that jira.projects has been configured with two entries
        (FOO and BAR) and prompts the user to pick one of them via AskUserQuestion with
        a closed list containing exactly "FOO" and "BAR" as options. It does NOT present
        a free-form text input, does NOT invent a third option, and does NOT silently
        pick defaultProject (which is null). The project key resolution follows the
        5-step ordered fallback: since steps 1 (--project arg), 2 (branch pattern),
        and 3 (defaultProject) all fail, step 4 (closed-list AskUserQuestion) activates
        because jira.projects has ≥2 entries.

- description: "jira-sdlc: unsampled workflow — transition falls back to live getTransitionsForJiraIssue (R14)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/jira-sdlc/SKILL.md"
    project_context: "file://fixtures/jira-unsampled-transition.md"
    user_request: >
      Run /jira-sdlc. Transition PROJ-147 to Done. The cache has
      workflows.Task = { "unsampled": true } because --skip-workflow-discovery was
      used to build the cache. Show how the skill performs the transition.
  assert:
    # Must call the live transitions endpoint
    - type: icontains
      value: "getTransitionsForJiraIssue"
    # Must eventually call transitionJiraIssue
    - type: icontains
      value: "transitionJiraIssue"
    # Must use the transition id from the live call — explicit id mention
    - type: regex
      value: "(\"id\"|transition id|transition.?ID)"
    # Must NOT pass transition by name (only { id } is accepted)
    - type: not-regex
      value: "transition:\\s*\"Done\""
    # Must NOT treat unsampled as a blocking cache-incompleteness failure
    - type: not-regex
      value: "(cache incomplete|cache is incomplete|rebuild cache|--force-refresh)"
    # Behavioral rubric for R14 unsampled fallback
    - type: llm-rubric
      value: >
        The response recognizes the workflows.Task = { unsampled: true } marker as an
        intentional sparse entry (not a cache failure), and routes the transition
        through a live mcp__atlassian__getTransitionsForJiraIssue call against PROJ-147
        to fetch the transition id. It then passes that id to
        mcp__atlassian__transitionJiraIssue in the { id: "..." } shape (never by name
        string). It does NOT trigger --force-refresh, does NOT report the cache as
        incomplete, and does NOT guess a transition id. The response treats unsampled
        identically to a transition ID not being cached — the existing auto-refresh
        fallback from REFERENCE handles both cases.

- description: "jira-sdlc R17: write-op approval gate prompts before createJiraIssue dispatch"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/jira-sdlc/SKILL.md"
    project_context: "file://fixtures/jira-create-task.md"
    user_request: >
      Run /jira-sdlc. Create a bug in PROJ: "login button broken on mobile Safari".
      The cache is loaded. Walk through how you would handle the request — show the
      payload you would dispatch and the user interaction you would have before
      calling the MCP tool.
  assert:
    # Must NOT dispatch createJiraIssue in the planned/described flow before approval
    - type: not-regex
      value: "Dispatching mcp__atlassian__createJiraIssue|Dispatched mcp__atlassian__createJiraIssue|Successfully called mcp__atlassian__createJiraIssue"
    # Must surface the approval prompt with the three required options
    - type: icontains
      value: "approve"
    - type: icontains
      value: "cancel"
    # Behavioral: approval gate is presented and dispatch is conditional on approve
    - type: llm-rubric
      value: >
        The response presents the full final payload to the user via AskUserQuestion
        with three options: approve, change <what>, and cancel. The skill explicitly
        states it will NOT call mcp__atlassian__createJiraIssue until the user answers
        "approve". On "change" it loops back; on "cancel" it aborts the operation.
        The skill describes the approval gate (R17) as a precondition for dispatch,
        not as an optional courtesy.

- description: "jira-sdlc R18: createJiraIssue requires a resolved description template"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/jira-sdlc/SKILL.md"
    project_context: "file://fixtures/jira-create-task.md"
    user_request: >
      Run /jira-sdlc. Create a Subtask in PROJ: "refactor cache layer". Note that
      this skill ships templates only for Bug, Story, Task, Spike, and Epic — there
      is no Subtask.md template, and no override is configured at
      .claude/jira-templates/Subtask.md. Walk through how the skill resolves the
      description template.
  assert:
    # Must ask which template to use rather than fabricating a description
    - type: regex
      value: "(which template|pick a template|choose.*template|select.*template|AskUserQuestion)"
    # Must not promise a free-form description
    - type: not-regex
      value: "free.?form|free.?text|unstructured description"
    # Behavioral: closed-list template prompt
    - type: llm-rubric
      value: >
        The response recognizes that no Subtask template ships and no override
        exists, then prompts the user via AskUserQuestion with a closed list of
        available templates (Bug, Story, Task, Spike, Epic) — never inventing a
        description and never proceeding with a free-form description. The skill
        treats the absence of a template as a user-resolution event (R18), not a
        silent fallback.

- description: "jira-sdlc R19: low-confidence placeholders escalate to AskUserQuestion"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/jira-sdlc/SKILL.md"
    project_context: "file://fixtures/jira-create-task.md"
    user_request: >
      Run /jira-sdlc. Create a Story for the new dashboard. The user has given
      no other detail — the request is intentionally vague. Walk through how the
      skill builds the description and what it asks the user before dispatching.
  assert:
    # Must surface AskUserQuestion for missing context
    - type: icontains
      value: "AskUserQuestion"
    # Must not leave unfilled bracketed placeholder prose in the proposed payload
    - type: not-regex
      value: "\\[[^\\]\\n]{15,}\\]"
    # Behavioral: per-section escalation
    - type: llm-rubric
      value: >
        The response detects that the request is too vague to fill the Story
        template's sections (acceptance criteria, scope, etc.), classifies each
        templated marker as low-confidence, and explicitly escalates each one via
        AskUserQuestion to the user before assembling the final payload. The
        proposed final payload contains no unfilled `{name}` or `[bracketed prose]`
        markers. Inapplicable sections are removed only with explicit user consent
        (no silent drops).

- description: "jira-sdlc R20: critique block (Initial/Critique/Final) surfaces before approval"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/jira-sdlc/SKILL.md"
    project_context: "file://fixtures/jira-create-task.md"
    user_request: >
      Run /jira-sdlc. Edit BUG-42 in PROJ to add a Steps to Reproduce section in
      the description. The cache is loaded. Walk through the full flow including
      the self-critique step before you ask for approval.
  assert:
    # Must emit Initial:/Critique:/Final: labels
    - type: icontains
      value: "Initial:"
    - type: icontains
      value: "Critique:"
    - type: icontains
      value: "Final:"
    # Behavioral: critique deltas surfaced, not silent
    - type: llm-rubric
      value: >
        The response emits an explicit Initial: / Critique: / Final: block before
        the approval gate, surfacing every critique delta to the user. The Initial
        section shows the first-pass payload, Critique lists the issues found
        (template completeness, field correctness, workflow validity, terminology
        consistency per R20), and Final shows the corrected payload. The skill
        does NOT apply critique deltas silently — every change between Initial and
        Final is enumerated in Critique.

- description: "jira-sdlc: cloudId auth error triggers single refresh+retry, never loops"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/jira-sdlc/SKILL.md"
    project_context: "file://fixtures/jira-cloudid-auth-error.md"
    user_request: >
      Run /jira-sdlc. Create a Bug "auth retry test" in PROJ. The cache is
      loaded but the cloudId is stale and the next write call will return a
      403 with "isn't explicitly granted". Walk through the recovery sequence
      defined in Step 3.
  assert:
    - type: icontains
      value: "getAccessibleAtlassianResources"
    - type: icontains
      value: "--force-refresh"
    - type: llm-rubric
      value: >
        The response detects the cloudId authorization error, calls
        getAccessibleAtlassianResources exactly once, compares the returned
        cloudId against the cached value, runs /jira-sdlc --force-refresh to
        update the cache, and retries the original operation exactly once. If
        the retry still fails, the response surfaces the error and stops — it
        does NOT loop or call getAccessibleAtlassianResources more than once.
        The response references spec R23.

- description: "jira-sdlc: namespace fallback retries under mcp__claude_ai_Atlassian__ on cloudId auth fail"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/jira-sdlc/SKILL.md"
    project_context: "file://fixtures/jira-namespace-fallback.md"
    user_request: >
      Run /jira-sdlc. Create a Bug "namespace fallback test" in PROJ. Both
      mcp__atlassian__ and mcp__claude_ai_Atlassian__ are registered. The
      primary namespace returns a cloudId authorization error. Walk through
      the namespace-fallback recovery from Step 3 / R23.
  assert:
    - type: icontains
      value: "mcp__claude_ai_Atlassian__"
    - type: icontains
      value: "R23"
    - type: llm-rubric
      value: >
        The response retries the operation under the sibling namespace
        mcp__claude_ai_Atlassian__ once after the primary mcp__atlassian__
        fails with a cloudId authorization error. The response indicates the
        working namespace is persisted for the rest of the session — it does
        NOT re-probe per-call. The response references spec R23.
