# Fixture appropriateness:
#   jira-ticket-created            -- CORRECT: simulates a created Jira ticket, triggers workflow continuation
#   jira-create-task               -- CORRECT: simulates Jira cache with project metadata for create operation
#   jira-comment-adf               -- CORRECT: simulates Jira cache for comment operation with ADF conversion

- description: "jira-sdlc: shows workflow continuation menu after Jira ticket created"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/jira-sdlc/SKILL.md"
    project_context: "file://fixtures/jira-ticket-created.md"
    user_request: >
      Run /jira-sdlc. A Jira ticket PROJ-142 has been created successfully — it's a Story
      in the PROJ project with implementation acceptance criteria. Now show what comes next.
  assert:
    # Must offer plan as a next action
    - type: icontains
      value: "/plan-sdlc"
    # Must offer done as an option
    - type: icontains
      value: "done"
    # Behavioral: interactive menu asking whether to plan
    - type: llm-rubric
      value: >
        The response asks the user whether to plan implementation for the Jira ticket,
        presenting an interactive menu. The menu includes at minimum: plan (/plan-sdlc) and
        done. Since a ticket with implementation work was just created, the plan option is
        offered. The user is asked to select an option rather than being given a passive
        suggestion.

- description: "jira-sdlc: follows create operation procedure from operations reference"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/jira-sdlc/SKILL.md"
    project_context: "file://fixtures/jira-create-task.md"
    user_request: >
      Run /jira-sdlc. Create a Task in PROJ with summary "Add rate limiting to
      API endpoints", priority High, and labels backend and security. The Jira
      cache is loaded in the project context.
  assert:
    # Must reference creating an issue
    - type: regex
      value: "(create|creating|Create)"
    # Must identify the correct issue type from cache
    - type: regex
      value: "(Task|issue.?type)"
    # Must reference the project
    - type: regex
      value: "(PROJ|project)"
    # Must include priority from cache allowedValues
    - type: regex
      value: "(priority|High)"
    # Must not fabricate field values not in the cache
    - type: not-regex
      value: "(guess|fabricat|invent|assume)"
    # Behavioral: follows create operation procedure with cache-driven values
    - type: llm-rubric
      value: >
        The response follows the Create Operation procedure: it maps "task" to the
        "Task" issue type from the cache's issueTypes list (exact match, not
        lowercase). It uses priority "High" from the cache's fieldSchemas.Task.priority
        allowedValues (not guessed). It includes the labels as a flat string array
        ["backend", "security"]. It describes the MCP call it would make including
        contentFormat: "markdown" and the cloudId from cache. It does NOT fabricate
        fields not present in the cache (no components, no custom fields unless the
        user asked). The summary matches what the user requested exactly.

- description: "jira-sdlc: converts comment to ADF before posting via addCommentToJiraIssue"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/jira-sdlc/SKILL.md"
    project_context: "file://fixtures/jira-comment-adf.md"
    user_request: >
      Run /jira-sdlc. Add a comment to PROJ-150 with a heading, bullet list, and
      code block summarizing test results. The Jira cache is loaded in the project context.
  assert:
    # Must reference the conversion script
    - type: icontains
      value: "markdown-to-adf"
    # Must use contentFormat "adf" for the comment
    - type: icontains
      value: 'contentFormat'
    - type: icontains
      value: "adf"
    # Must preserve responseContentFormat "markdown" for reading
    - type: icontains
      value: 'responseContentFormat'
    # Must use correct parameter names
    - type: icontains
      value: "commentBody"
    - type: icontains
      value: "issueIdOrKey"
    # Behavioral: follows ADF comment flow from operations-reference.md
    - type: llm-rubric
      value: >
        The response follows the Comment Operation procedure for ADF conversion:
        (1) It composes the comment in markdown using safe syntax (heading, bullet list,
        code block). (2) It describes running the markdown-to-adf.js conversion script
        to convert markdown to ADF JSON. (3) It calls addCommentToJiraIssue with
        contentFormat: "adf" and the ADF JSON as commentBody (not "comment"), using
        issueIdOrKey (not "issueKey"). (4) It uses responseContentFormat: "markdown"
        for reading. It does NOT post raw markdown with contentFormat: "markdown" for
        the comment. The cloudId comes from the cache.
