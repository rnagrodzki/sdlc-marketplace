# harden-sdlc behavioral dataset
# Spec: docs/specs/harden-sdlc.md (R1–R13, G1–G4, E1–E4, C1–C10)
#
# Fixture appropriateness:
#   harden-plan-guardrail-failure-context.md  -- user-code, plan-guardrail FAIL
#   harden-dimension-blocker-context.md       -- user-code, review-dimension blocker
#   harden-plugin-defect-context.md           -- plugin-defect, prepare-script crash

- description: "harden-sdlc: standalone invocation, plan-guardrail FAIL → proposes plan-guardrails strengthening"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/harden-sdlc/SKILL.md"
    project_context: "file://fixtures/harden-plan-guardrail-failure-context.md"
    user_request: >
      The user invoked /harden-sdlc directly with --failure-text and --skill plan-sdlc
      after a no-auto-eval guardrail failure blocked their plan. The failure context
      is provided above. Walk through Steps 0–5 of the harden-sdlc skill body and
      describe what would happen.
  assert:
    # Must dispatch the orchestrator with model haiku
    - type: regex
      value: "(harden-orchestrator|orchestrator agent|model.*haiku)"
    # Must classify and surface a rationale
    - type: regex
      value: "(classification|user-code|user.code)"
    # Must propose at least one plan-guardrails change
    - type: regex
      value: "(plan-guardrails|plan\\.guardrails|strengthen.*no-auto-eval|tighten.*description)"
    # Must use AskUserQuestion before any write (no silent edits)
    - type: regex
      value: "(AskUserQuestion|approval gate|apply.*skip.*cancel|approve.*before.*writ)"
    # Must NOT silently write any file
    - type: not-regex
      value: "(silently writ|auto.appl|without.*approval|skipped.*approval)"
    # Behavioral: full strengthen-only flow
    - type: llm-rubric
      value: >
        The response describes Step 1 running harden-prepare.js to load the five
        surfaces, Step 2 surfacing classification context, Step 3 dispatching
        harden-orchestrator (haiku), Step 5 presenting a proposal that strengthens
        the no-auto-eval guardrail (or adds a related guardrail) using the sdlc.json
        severity vocabulary (error|warning, NOT critical|high|...). It explicitly
        gates each proposal behind AskUserQuestion (apply | skip | cancel) and
        validates schema before write via ci/validate-guardrails.js. It does NOT
        propose relaxing or removing any existing rule.
    # Per-iteration persistence: structural check for write-before-advancing wording
    - type: regex
      value: "(write.*before.*advanc|before.*next.*proposal|re.read.*disk|disk.*before.*advanc|persist.*before.*next|not.*batch|no.*batch.*accum)"
    # Per-iteration persistence: each approved proposal must be written immediately
    - type: llm-rubric
      value: >
        The response describes Step 5 re-reading targetFile from disk at the start
        of each proposal iteration (not using an in-memory copy from a prior write)
        and writing the approved change to disk before advancing to the next
        proposal. It does NOT describe accumulating multiple approved changes and
        writing them together in a batch at the end.

- description: "harden-sdlc: dimension-blocker rationale → proposes review-dimensions strengthening with dimension severity vocabulary"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/harden-sdlc/SKILL.md"
    project_context: "file://fixtures/harden-dimension-blocker-context.md"
    user_request: >
      The user dispatched /harden-sdlc from review-sdlc's Step 5 actionable-findings
      menu after a CRITICAL dimension blocker. The failure context is above. Describe
      the proposals that would surface for approval.
  assert:
    # Must propose at least one review-dimensions change
    - type: regex
      value: "(review-dimensions|review\\.dimensions|script-resolution|dimension.*strengthen)"
    # Must use the dimension severity vocabulary
    - type: regex
      value: "(critical|high|medium|low|info)"
    # Must NOT use sdlc.json vocabulary for dimension proposals
    - type: not-regex
      value: "(severity.*\"error\".*review-dimension|severity.*\"warning\".*review-dimension)"
    # Behavioral
    - type: llm-rubric
      value: >
        The response correctly identifies that the failure points at the
        script-resolution dimension and proposes strengthening it (raising severity,
        narrowing triggers, or adding a checklist line). The proposal uses the
        review-dimensions severity vocabulary (critical | high | medium | low | info)
        — NOT the sdlc.json vocabulary (error | warning). The proposal is gated
        behind AskUserQuestion before any file write, and validated via
        lib/dimensions.js validateDimensionFile before write.

- description: "harden-sdlc: plugin-defect classification → routes to error-report-sdlc, no surface proposals"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/harden-sdlc/SKILL.md"
    project_context: "file://fixtures/harden-plugin-defect-context.md"
    user_request: >
      The user invoked /harden-sdlc after harden-prepare.js itself crashed with exit
      code 2 (a plugin defect). The failure context is above. Describe what should
      happen.
  assert:
    # Must classify as plugin-defect
    - type: regex
      value: "(plugin-defect|plugin.defect)"
    # Must route to error-report-sdlc
    - type: regex
      value: "(error-report-sdlc|error.report.sdlc|REFERENCE\\.md.*error-report)"
    # Must NOT produce surface proposals
    - type: not-regex
      value: "(plan-guardrails proposal|review-dimensions proposal|copilot-instructions proposal|apply.*proposal)"
    # Behavioral
    - type: llm-rubric
      value: >
        The response classifies the failure as plugin-defect (script crash with exit
        code 2 inside plugins/sdlc-utilities/). It explicitly skips Steps 4 and 5
        (PRESENT and APPLY) because no user-side surface edit is appropriate for a
        plugin defect. It dispatches error-report-sdlc with the orchestrator-supplied
        payload (skill, step, operation, errorText, errorType=script crash). It
        gates the dispatch behind user approval — does not auto-file the issue.

- description: "harden-sdlc: ambiguous + plugin evidence → Step 5c offers error-report-sdlc dispatch (issue #288)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/harden-sdlc/SKILL.md"
    project_context: "file://fixtures/harden-ambiguous-plugin-evidence-context.md"
    user_request: >
      The user invoked /harden-sdlc after execute-plan-sdlc Wave 2 failed. The
      orchestrator returned classification="ambiguous" with a non-null
      errorReportPayload because the rationale cites both plugin evidence
      (harden-orchestrator.md emitting malformed JSON) and user content (vague
      plan task). The manifest's pluginRepoUrl is
      https://github.com/rnagrodzki/sdlc-marketplace. Describe what Step 5c
      surfaces to the user.
  assert:
    - type: regex
      value: "(5c|ambiguous.*upstream|upstream.*report|plugin defect|file.*GitHub issue)"
    - type: regex
      value: "(rnagrodzki/sdlc-marketplace|pluginRepoUrl|github\\.com/rnagrodzki)"
    - type: regex
      value: "(dispatch error-report-sdlc|error-report-sdlc.*dispatch)"
    - type: regex
      value: "(skip|opt.in|opt-in|AskUserQuestion)"
    - type: llm-rubric
      value: >
        After the per-proposal apply/skip flow completes, the response describes
        Step 5c as an opt-in upstream-report offer surfaced via AskUserQuestion
        with options "dispatch error-report-sdlc" and "skip". The prompt text
        sources the plugin repo URL from the manifest's pluginRepoUrl field
        (not hardcoded). On dispatch, the response describes following the same
        Glob-then-follow pattern as Step 6 to invoke error-report-sdlc with
        the orchestrator-supplied errorReportPayload. The strengthen-only
        invariant is preserved — no surface is auto-edited; the user must
        explicitly approve.

- description: "harden-sdlc: ambiguous WITHOUT plugin evidence → Step 5c suppressed (errorReportPayload=null)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/harden-sdlc/SKILL.md"
    project_context: "file://fixtures/harden-ambiguous-no-plugin-evidence-context.md"
    user_request: >
      The user invoked /harden-sdlc after plan-sdlc emitted ambiguous evidence
      with no plugin signal in the rationale. The orchestrator returned
      classification="ambiguous" with errorReportPayload=null. Describe what
      should happen after the per-proposal apply/skip flow completes.
  assert:
    - type: not-regex
      value: "(dispatch error-report-sdlc|file.*GitHub issue|upstream.report.offer|plugin defect)"
    - type: llm-rubric
      value: >
        Step 5c is suppressed — no upstream-report offer is surfaced because
        errorReportPayload is null (pure user-code ambiguity). The response
        proceeds with only the user-side proposals from the apply/skip flow
        and does not mention dispatching error-report-sdlc.

- description: "harden-sdlc: missing --failure-text → exits with error, no execution"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/harden-sdlc/SKILL.md"
    project_context: ""
    user_request: >
      The user invoked /harden-sdlc --skill plan-sdlc with no --failure-text flag.
      Describe what should happen.
  assert:
    - type: regex
      value: "(missing.*failure-text|required.*failure-text|--failure-text.*required|exit.*1)"
    - type: not-regex
      value: "(dispatch.*orchestrator|run.*prepare|propose.*hardening)"

- description: "harden-sdlc: missing --skill → exits with error, no execution"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/harden-sdlc/SKILL.md"
    project_context: ""
    user_request: >
      The user invoked /harden-sdlc --failure-text "something failed" with no
      --skill flag. Describe what should happen.
  assert:
    - type: regex
      value: "(missing.*skill|required.*skill|--skill.*required|exit.*1)"
    - type: not-regex
      value: "(dispatch.*orchestrator|run.*prepare|propose.*hardening)"

- description: "harden-sdlc: empty surfaces → graceful degradation, classification still attempted"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/harden-sdlc/SKILL.md"
    project_context: "file://fixtures/harden-plan-guardrail-failure-context.md"
    user_request: >
      Suppose the project has no .claude/sdlc.json, no review-dimensions/, and no
      .github/instructions/. The user runs /harden-sdlc with --failure-text and
      --skill plan-sdlc. Describe what should happen — does the skill still run?
  assert:
    # Must still run, not crash
    - type: regex
      value: "(graceful|empty array|missing.*non.fatal|still.*run|continue|degrad)"
    - type: not-regex
      value: "(crash|abort.*missing.*config|fatal.*sdlc\\.json)"

- description: "harden-sdlc: user selects cancel at AskUserQuestion → no files written"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/harden-sdlc/SKILL.md"
    project_context: "file://fixtures/harden-plan-guardrail-failure-context.md"
    user_request: >
      Walk through the harden-sdlc flow assuming the user selects "cancel" at the
      first AskUserQuestion approval gate after proposals are presented. What
      happens to the proposed surface files?
  assert:
    # Must not write any file on cancel
    - type: regex
      value: "(no.*file.*written|abort.*entire.*skill|trap.*clean.*up|no.*surface.*edit)"
    - type: not-regex
      value: "(write.*\\.claude/sdlc\\.json|edit.*review-dimensions|append.*to.*sdlc\\.json)"

- description: "harden-sdlc: user applies one of two proposals → exactly one file written"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/harden-sdlc/SKILL.md"
    project_context: "file://fixtures/harden-plan-guardrail-failure-context.md"
    user_request: >
      Two proposals are presented. The user selects "apply" on proposal 1 (a
      plan-guardrails strengthen) and "skip" on proposal 2 (a review-dimensions
      add). Describe what gets written.
  assert:
    # Exactly one file written
    - type: regex
      value: "(\\.claude/sdlc\\.json|sdlc\\.json.*write|apply.*proposal 1)"
    - type: not-regex
      value: "(both.*written|all.*proposals.*applied|skip.*also.*written)"

- description: "harden-sdlc: two proposals both applied → write-before-advancing and no accumulation (R-iteration-write rules 2 and 3)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/harden-sdlc/SKILL.md"
    project_context: "file://fixtures/harden-plan-guardrail-failure-context.md"
    user_request: >
      Two proposals are presented and the user selects "apply" for both.
      Describe the order of operations Step 5 follows: when is each approved
      change written to disk relative to presenting the next proposal? Does the
      skill accumulate both approved patches and write them together at the end,
      or does it write each one individually before moving on?
  assert:
    # Must write each proposal before advancing to the next (rule 2)
    - type: regex
      value: "(write.*before.*next|persist.*before.*advanc|written.*before.*present|disk.*before.*next|after.*write.*proposal.*1.*present.*proposal.*2)"
    # Must NOT accumulate and batch-write
    - type: not-regex
      value: "(accum.*both|batch.*write|collect.*then.*write|write.*together.*end|all.*at.*once)"
    # Behavioral: correct two-proposal iteration sequence
    - type: llm-rubric
      value: >
        The response describes a per-iteration sequence: present proposal 1,
        user applies, validate, write to disk immediately, THEN present proposal 2.
        It does NOT describe collecting both approvals and writing them together
        after the loop. It explicitly states (or clearly implies) that proposal 1
        is persisted to disk before proposal 2 is presented to the user,
        satisfying R-iteration-write rules 2 (write-before-advancing) and
        3 (no cross-proposal accumulation).

- description: "harden-sdlc: strengthen-only invariant — no relax/remove proposals"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/harden-sdlc/SKILL.md"
    project_context: "file://fixtures/harden-plan-guardrail-failure-context.md"
    user_request: >
      Suppose the user describes the failure as "the no-auto-eval guardrail is too
      strict and blocks legitimate evaluation steps; we should relax it to a
      warning". Despite this framing, what does the strengthen-only invariant in
      v1 require?
  assert:
    # Must refuse to relax/remove
    - type: regex
      value: "(strengthen.only|never relax|no.*relax|no.*remove|forbidden.*v1|cannot.*weaken)"
    - type: not-regex
      value: "(relax.*to.*warning|downgrade.*severity|remove.*guardrail|weaken.*description)"

- description: "harden-sdlc: schema-invalid sdlc.json edit → validator error surfaced, no write"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/harden-sdlc/SKILL.md"
    project_context: "file://fixtures/harden-plan-guardrail-failure-context.md"
    user_request: >
      Suppose the orchestrator proposes a guardrail addition that would fail the
      schemas/sdlc-config.schema.json validator (e.g. severity is `severe` instead
      of `error|warning`). The user clicks "apply". What happens?
  assert:
    # Must run validate-guardrails.js
    - type: regex
      value: "(validate-guardrails\\.js|ci/validate-guardrails|schema.*validat)"
    # Must surface the error
    - type: regex
      value: "(validator.*error|surface.*error|show.*error.*user|retry.*cancel)"
    # Must NOT silently commit
    - type: not-regex
      value: "(silently.*write|skip.*validation|ignore.*validator)"

# R14–R16 new cases (issue #416)

- description: "duplicate-plan-guardrail-emits-consolidate: existing no-bare-cwd plan guardrail overlaps → orchestrator emits consolidate not add"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/harden-sdlc/SKILL.md"
    project_context: "file://fixtures/harden-duplicate-plan-guardrail-context.md"
    user_request: >
      The project has an existing plan guardrail id=no-bare-cwd. The failure text
      references another bare process.cwd() usage. Walk through Steps 0–5 of
      harden-sdlc. What action should the orchestrator use in its proposal for
      the plan-guardrails surface — and why?
  assert:
    # Must use consolidate, not add for the duplicate id
    - type: regex
      value: "(consolidate|action.*consolidate)"
    # Must NOT use add for the same-id guardrail
    - type: not-regex
      value: "\"action\":\\s*\"add\""
    # Must cite the existing guardrail id
    - type: regex
      value: "(no-bare-cwd)"
    # Behavioral check: rationale ties to duplication detection
    - type: llm-rubric
      value: >
        The response explains that the orchestrator detects overlap with the existing
        no-bare-cwd plan guardrail (either by id match or description overlap per R15)
        and therefore emits action: "consolidate" rather than action: "add". It
        explains that consolidate tightens or merges the existing rule — it does NOT
        create a duplicate guardrail id. The strengthen-only invariant (R8/C9) is
        preserved — the description is only tightened, severity is not lowered.

- description: "duplicate-execute-guardrail-emits-consolidate: existing no-scope-creep execute guardrail overlaps → consolidate"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/harden-sdlc/SKILL.md"
    project_context: "file://fixtures/harden-duplicate-execute-guardrail-context.md"
    user_request: >
      The project has an existing execute guardrail id=no-scope-creep. The failure
      text describes an agent adding out-of-scope code during wave execution. What
      action should the orchestrator emit for the execute-guardrails surface?
  assert:
    # Must use consolidate
    - type: regex
      value: "(consolidate|action.*consolidate)"
    # Must target the existing id
    - type: regex
      value: "(no-scope-creep)"
    # Must NOT add a second scope-related guardrail
    - type: not-regex
      value: "(action.*add.*scope|new.*scope.*guardrail)"
    # Behavioral
    - type: llm-rubric
      value: >
        The response explains that the orchestrator detects the existing no-scope-creep
        execute guardrail overlaps with the failure signal and emits action: "consolidate"
        targeting no-scope-creep. It does not emit action: "add" for a new scope-related
        guardrail (which would duplicate the existing one). The proposal tightens the
        existing guardrail's description to explicitly mention the wave-execution context.

- description: "review-dimension-priority-ordering: review-dimensions proposals appear before plan-guardrails in proposals[] (R14)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/harden-sdlc/SKILL.md"
    project_context: "file://fixtures/harden-review-dim-priority-context.md"
    user_request: >
      The failure has signals for both a missing review-dimension (no YAML config
      coverage) and a vague plan guardrail (spec-first). The orchestrator proposes
      both. In what order must the proposals appear in proposals[], and why?
  assert:
    # Must state review-dimensions first
    - type: regex
      value: "(review-dimensions.*first|first.*review-dimensions|R14|proposals.*review-dimensions.*before)"
    # Must mention the ordering rule
    - type: regex
      value: "(order|ordering|priority|review.dim.*before.*plan)"
    # Behavioral: ordering explanation
    - type: llm-rubric
      value: >
        The response explains that per R14, review-dimensions proposals must appear
        first in the proposals[] array, before plan-guardrails. It identifies the
        YAML config dimension as the review-dimensions proposal and the spec-first
        guardrail as the plan-guardrails proposal, and states that the YAML dimension
        proposal must come first regardless of which surface seems more "directly"
        related to the failure.
