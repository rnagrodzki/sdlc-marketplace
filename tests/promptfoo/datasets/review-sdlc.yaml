# Fixture appropriateness:
#   project-with-dimensions            -- CORRECT: primary use case; 3 dimensions active with file matching
#   project-with-uncovered-suggestions -- CORRECT: uncovered file suggestions surfaced in review plan
#   project-no-dimensions              -- CORRECT: edge case; no dimensions installed → error + suggestion
#   feature-branch-*                   -- INVALID: PR context, not review context

- description: "review-sdlc: multi-dimension review with active dimensions"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/review-sdlc/SKILL.md"
    project_context: "file://fixtures/project-with-dimensions.md"
    user_request: >
      Run /review-sdlc on this project. The review-prepare.js manifest is provided in the
      project context. Display the review plan showing which dimensions are active.
  assert:
    # Must reference dimensions concept
    - type: icontains
      value: "dimension"
    # Must show active/skipped status for dimensions
    - type: regex
      value: "(ACTIVE|active|skipped|SKIPPED)"
    # Must reference the specific dimensions from the manifest
    - type: regex
      value: "(security-review|code-quality-review|api-review)"
    # Behavioral: consumes manifest, reports dimension status, describes orchestration
    - type: llm-rubric
      value: >
        The response consumes the review manifest and reports which dimensions are active
        (security-review, code-quality-review, api-review — all 3 should be ACTIVE based on
        the manifest). It shows file counts per dimension. It either describes how it would
        delegate to the review-orchestrator agent or describes the review plan in detail.
        The response mentions the specific dimension names and does not fabricate additional
        dimensions not present in the manifest.

- description: "review-sdlc: dry-run shows plan without dispatching agents"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/review-sdlc/SKILL.md"
    project_context: "file://fixtures/project-with-dimensions.md"
    user_request: >
      Run /review-sdlc --dry-run on this project. The review-prepare.js manifest is in the
      project context. Show the review plan only — do not dispatch any review agents.
  assert:
    # Must acknowledge dry-run mode
    - type: regex
      value: "(dry.run|dry run|DRY.RUN)"
    # Must show a plan table with dimension information (matches table header "Dimension",
    # lowercase "dimension" in narrative, or actual dimension names from the fixture)
    - type: regex
      value: "(Dimension|dimension|security-review|code-quality-review)"
    # Must NOT affirmatively dispatch agents (negated references like "without dispatching" are allowed)
    - type: not-regex
      value: "(I will now spawn|I am dispatching|Launching agent|Using the Agent tool)"
    # Behavioral: plan-only output, no actual review findings
    - type: llm-rubric
      value: >
        The response clearly states this is a dry run and shows only the review plan — a table
        or list of dimensions with their status (ACTIVE/SKIPPED), file counts, and severity.
        It explicitly does NOT dispatch the review-orchestrator agent or any subagents. It does
        NOT produce any actual code review findings or comments. It describes what would happen
        if the --dry-run flag were omitted.

- description: "review-sdlc: surfaces dimension suggestions for uncovered files"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/review-sdlc/SKILL.md"
    project_context: "file://fixtures/project-with-uncovered-suggestions.md"
    user_request: >
      Run /review-sdlc on this project. The review-prepare.js manifest is in the project context.
      Show the review plan including any suggestions for uncovered files.
  assert:
    # Must mention the suggested dimension names
    - type: regex
      value: "(ci-cd-pipeline-review|configuration-management-review)"
    # Must reference the uncovered file paths or types
    - type: regex
      value: '(workflows|ci\.yml|config|\.env)'
    # Must point to review-init-sdlc --add
    - type: regex
      value: "(review-init-sdlc|--add)"
    # Behavioral: surfaces suggestions, directs user to review-init-sdlc
    - type: llm-rubric
      value: >
        The response reads the manifest showing 5 uncovered files with 2 dimension suggestions:
        ci-cd-pipeline-review (for .github/workflows/ci.yml and deploy.yml) and
        configuration-management-review (for src/config/db.ts, src/config/auth.ts, .env.example).
        It displays these suggestions in the review plan — either in a "Suggested new dimensions"
        block or as plan critique warnings — and references the specific file paths or types.
        It recommends running /review-init-sdlc --add to create those dimensions. It does NOT
        create the dimension files itself during the review run.

- description: "review-sdlc: no dimensions installed reports error and suggests review-init-sdlc"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/review-sdlc/SKILL.md"
    project_context: "file://fixtures/project-no-dimensions.md"
    user_request: "Run /review-sdlc on this project."
  assert:
    # Must report the missing dimensions problem
    - type: regex
      value: "(no.+dimension|dimension.+not.+found|no review dimension|0 dimension)"
    # Must suggest running review-init-sdlc
    - type: regex
      value: "(review-init-sdlc|/review-init-sdlc)"
    # Behavioral: clear error message, correct suggestion
    - type: llm-rubric
      value: >
        The response reads the error from the review-prepare.js manifest (no dimensions found)
        and clearly reports that no review dimensions are installed. It recommends running
        /review-init-sdlc to create tailored dimensions for this Python/FastAPI project. It does
        NOT fabricate a review without dimensions. The message is clear and actionable.

- description: "review-sdlc: --dimensions filter shows only selected dimension as active"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/review-sdlc/SKILL.md"
    project_context: "file://fixtures/project-with-filtered-dimensions.md"
    user_request: >
      Run /review-sdlc --dimensions security-review on this project. The review-prepare.js
      manifest is in the project context. Show the review plan.
  assert:
    - type: icontains
      value: "security-review"
    - type: regex
      value: "(filter|--dimensions|selected|only)"
    - type: regex
      value: "(ACTIVE|active)"
    - type: llm-rubric
      value: >
        The response shows only security-review as an active dimension because --dimensions
        was used to filter. It acknowledges that the filter was applied (mentioning 3 total
        dimensions but only 1 active after filtering). It does not show the other dimensions
        (code-quality-review, api-review) as active.

- description: "review-sdlc: committed scope shows branch changes only"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/review-sdlc/SKILL.md"
    project_context: "file://fixtures/project-with-committed-scope.md"
    user_request: >
      Run /review-sdlc --committed on this project. The review-prepare.js manifest is in
      the project context. Show the review plan.
  assert:
    - type: regex
      value: "(committed|branch changes|branch.only)"
    - type: regex
      value: "(main|base.branch)"
    - type: not-regex
      value: "(staged changes|unstaged|staging area|git add)"
    - type: llm-rubric
      value: >
        The response shows the review plan for committed scope, meaning only branch changes
        (committed vs base branch). It references the base branch. It does NOT mention staged
        or unstaged changes since the scope is committed-only.

- description: "review-sdlc: truncated dimension shows warning about file cap"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/review-sdlc/SKILL.md"
    project_context: "file://fixtures/project-with-truncated-dimension.md"
    user_request: >
      Run /review-sdlc on this project. The review-prepare.js manifest is in the project
      context. Show the review plan including any warnings.
  assert:
    - type: regex
      value: "(TRUNCATED|truncated|truncat)"
    - type: regex
      value: "(150|max.files|100|cap|limit)"
    - type: llm-rubric
      value: >
        The response shows the review plan with code-quality-review in TRUNCATED status.
        It warns that this dimension matched 150 files but was capped to the max-files
        limit of 100. The review still proceeds with the truncated file list. Security-review
        is shown as ACTIVE normally.

- description: "review-sdlc: queued dimensions shown when cap applied"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/review-sdlc/SKILL.md"
    project_context: "file://fixtures/project-with-queued-dimensions.md"
    user_request: >
      Run /review-sdlc on this project. The review-prepare.js manifest is in the project
      context. Show the review plan including all dimension statuses.
  assert:
    - type: regex
      value: "(QUEUED|queued)"
    - type: regex
      value: "(8|eight).*(active|ACTIVE)"
    - type: regex
      value: "(accessibility|internationalization)"
    - type: llm-rubric
      value: >
        The response shows 8 active dimensions and 2 queued dimensions (accessibility
        and internationalization). It explains that the dimension cap was applied. It
        suggests re-running to process the queued dimensions or using --dimensions to
        select them specifically.

- description: "review-sdlc: over-broad dimension warning surfaced in plan"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/review-sdlc/SKILL.md"
    project_context: "file://fixtures/project-with-overbroad-warning.md"
    user_request: >
      Run /review-sdlc on this project. The review-prepare.js manifest is in the project
      context. Show the review plan with any warnings about dimension quality.
  assert:
    - type: regex
      value: "(over.broad|overbroad|too.broad|broad.coverage|covers.*80)"
    - type: icontains
      value: "code-quality-review"
    - type: llm-rubric
      value: >
        The response flags code-quality-review as over-broad (it covers 9 out of 10
        changed files, over 80%). It suggests tightening the dimension's trigger patterns
        to be more specific. The review plan still shows it as active, but with a warning.

- description: "review-sdlc: approved verdict completes cleanly without fix offer"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/review-sdlc/SKILL.md"
    project_context: "file://fixtures/review-verdict-approved.md"
    user_request: >
      The review-orchestrator has completed. The results are in the project context.
      Present the final review summary and next steps.
  assert:
    - type: regex
      value: "(APPROVED|approved)"
    - type: not-regex
      value: "(CHANGES REQUESTED|changes requested|please revise)"
    - type: llm-rubric
      value: >
        The response acknowledges the review verdict as APPROVED. It presents the
        summary showing 2 low findings across 2 dimensions. It does NOT offer to
        fix findings via received-review-sdlc as a primary action (since no critical
        or high findings exist). The tone is positive — the review passed cleanly.
        Mentioning received-review-sdlc in a general "available commands" context
        is acceptable, but it should not be presented as a recommended next action.
