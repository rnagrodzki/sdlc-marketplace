# jira-sdlc write-op guardrail helper exec tests (R17–R21, R25/G15).
#
# The deterministic PreToolUse hook `pre-tool-jira-write-guard.js` has been
# removed (#378, #379) — jira-write validation is now LLM-prose-only (amended
# R21). The former hook-allow / hook-deny / hook-continue integration cases are
# deleted along with the hook. The shared helper libraries (payload-hash.js,
# artifact-store.js, template-fingerprint) survive and are still exercised here.
#
# Coverage matrix:
#   helper-payload-hash       → R21 (canonical hash)
#   helper-placeholder        → R19 / C13
#   helper-template           → R18
#   helper-artifact-store     → R17 / R20 / R21
#   helper-template-fallback  → FALLBACK_MAP resolution
#
# All cases use the local script-runner; assertions check the RESULT line
# emitted by tests/promptfoo/scripts/jira-write-guard-test.js.

# ---------- Helper module tests ----------

- description: "guardrail helper: payload-hash key-order independence + determinism"
  vars:
    script_path: "repo://tests/promptfoo/scripts/jira-write-guard-test.js"
    script_args: "--op helper-payload-hash"
  assert:
    - type: icontains
      value: "RESULT: PASS"

- description: "guardrail helper: placeholder-detect ADF traversal + short-bracket exclusion"
  vars:
    script_path: "repo://tests/promptfoo/scripts/jira-write-guard-test.js"
    script_args: "--op helper-placeholder"
  assert:
    - type: icontains
      value: "RESULT: PASS"

- description: "guardrail helper: template-fingerprint override beats shipped, missing returns null"
  vars:
    script_path: "repo://tests/promptfoo/scripts/jira-write-guard-test.js"
    script_args: "--op helper-template"
  assert:
    - type: icontains
      value: "RESULT: PASS"

- description: "guardrail helper: artifact-store roundtrip + stale-detection"
  vars:
    script_path: "repo://tests/promptfoo/scripts/jira-write-guard-test.js"
    script_args: "--op helper-artifact-store"
  assert:
    - type: icontains
      value: "RESULT: PASS"

- description: "guardrail helper: template-fallback resolves all three FALLBACK_MAP keys (Sub-bug, Sub-task, Subtask)"
  vars:
    script_path: "repo://tests/promptfoo/scripts/jira-write-guard-test.js"
    script_args: "--op helper-template-fallback"
  assert:
    - type: icontains
      value: "RESULT: PASS"
    - type: icontains
      value: "all-three-fallbacks-resolved"
