# Script execution tests for session-start.js hook.
# These tests run session-start.js directly against fixture directories (no LLM).
# Covers: OpenSpec detection output strings (issue #164).

- description: "session-start: no openspec/config.yaml produces no OpenSpec line"
  vars:
    script_path: "repo://plugins/sdlc-utilities/hooks/session-start.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-commit-config"
  assert:
    - type: not-icontains
      value: "OpenSpec"

- description: "session-start: openspec baseline (no active changes) emits INITIALIZED with spec count"
  vars:
    script_path: "repo://plugins/sdlc-utilities/hooks/session-start.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-openspec-baseline"
  assert:
    - type: icontains
      value: "INITIALIZED"
    - type: icontains
      value: "openspec/config.yaml"
    - type: icontains
      value: "2 specs, 0 active changes"

- description: "session-start: openspec with active change emits INITIALIZED prefix and change details"
  vars:
    script_path: "repo://plugins/sdlc-utilities/hooks/session-start.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-openspec-active"
  assert:
    - type: icontains
      value: "INITIALIZED (openspec/config.yaml"
    - type: icontains
      value: "1 spec)"
    - type: icontains
      value: "add-auth"

- description: "session-start: openspec baseline returns specsCount 2 from lib"
  vars:
    script_path: "repo://plugins/sdlc-utilities/hooks/session-start.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-openspec-baseline"
  assert:
    - type: icontains
      value: "2 specs"

# ---------------------------------------------------------------------------
# Compact recovery — per-branch filename (issue #256)
# ---------------------------------------------------------------------------

- description: "session-start: per-branch recovery file matching current branch is consumed"
  vars:
    script_path: "repo://plugins/sdlc-utilities/hooks/session-start.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-compact-recovery-current-branch"
  assert:
    - type: icontains
      value: "Pipeline state recovered after compaction"
    - type: icontains
      value: "execute-plan-sdlc on main"
    - type: icontains
      value: "wave 2 of 5"

- description: "session-start: recovery file for OTHER branch is NOT consumed (cross-branch isolation, issue #256)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/hooks/session-start.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-compact-recovery-other-branch"
  assert:
    # Current branch is "main"; recovery file is for "otherbranch" — must NOT be re-injected
    - type: not-icontains
      value: "Pipeline state recovered after compaction"
    - type: not-icontains
      value: "otherbranch"

# ---------------------------------------------------------------------------
# Fixes #392 / R36 — post-compact execute-state line discriminator
# ---------------------------------------------------------------------------

- description: "session-start: matcher=compact + execute state emits 'Active execution (post-compact):'"
  vars:
    script_path: "repo://plugins/sdlc-utilities/hooks/session-start.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-execute-post-compact-no-ship"
    script_stdin:
      hook_event_name: "SessionStart"
      source: "compact"
  assert:
    - type: icontains
      value: "Active execution (post-compact): execute-plan-sdlc on feat/execute-only"
    - type: not-icontains
      value: "Active pipeline: ship-sdlc"

- description: "session-start: matcher=startup + execute state emits legacy 'Active execution:' (byte-stable for prompt-cache)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/hooks/session-start.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-execute-post-compact-no-ship"
    script_stdin:
      hook_event_name: "SessionStart"
      source: "startup"
  assert:
    - type: icontains
      value: "Active execution: execute-plan-sdlc on feat/execute-only"
    - type: not-icontains
      value: "(post-compact)"

- description: "session-start: matcher=clear + execute state emits legacy 'Active execution:' (no post-compact suffix)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/hooks/session-start.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-execute-post-compact-no-ship"
    script_stdin:
      hook_event_name: "SessionStart"
      source: "clear"
  assert:
    - type: icontains
      value: "Active execution: execute-plan-sdlc on feat/execute-only"
    - type: not-icontains
      value: "(post-compact)"

- description: "session-start: matcher=compact + BOTH ship and execute states emits both lines (consumer-side discrimination, #392)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/hooks/session-start.js"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-execute-post-compact-with-ship"
    script_stdin:
      hook_event_name: "SessionStart"
      source: "compact"
  assert:
    - type: icontains
      value: "Active pipeline: ship-sdlc on feat/execute-and-ship"
    - type: icontains
      value: "Active execution (post-compact): execute-plan-sdlc on feat/execute-and-ship"
