# Fixture appropriateness:
#   commit-staged-changes          -- CORRECT: simulates a completed commit, triggers workflow continuation

- description: "commit-sdlc: shows workflow continuation menu after commit"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/commit-sdlc/SKILL.md"
    project_context: "file://fixtures/commit-staged-changes.md"
    user_request: >
      Run /commit-sdlc. The commit has been created successfully — Step 6 verification
      confirmed the commit at a3f8d92 and the stash was restored. Now show what comes next.
  assert:
    # Must offer PR as a next action
    - type: icontains
      value: "/pr-sdlc"
    # Must offer version as a next action
    - type: icontains
      value: "/version-sdlc"
    # Must offer review as a next action
    - type: icontains
      value: "/review-sdlc"
    # Must offer done as an option
    - type: icontains
      value: "done"
    # Behavioral: interactive menu with skill options
    - type: llm-rubric
      value: >
        The response presents an interactive menu asking the user what to do next after
        committing, with specific skill options to choose from. The menu includes at minimum:
        review (/review-sdlc), version (/version-sdlc), pr (/pr-sdlc), and done. The user is asked to select an
        option rather than being given a passive suggestion.

- description: "commit-sdlc: --auto flag skips interactive approval prompt"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/commit-sdlc/SKILL.md"
    project_context: "file://fixtures/commit-staged-changes.md"
    user_request: >
      Run /commit-sdlc --auto. The commit-prepare.js output is provided in the project
      context above with flags.auto set to true. The staged diff shows 3 files changed with
      authentication-related changes. Generate the commit message and execute.
  assert:
    # Must NOT ask for approval (auto mode skips the prompt)
    - type: not-icontains
      value: "Commit as shown?"
    # Must still show the commit message
    - type: regex
      value: '(feat|fix|chore|refactor|docs)(\(.+\))?:'
    # Behavioral: commits without interactive approval
    - type: llm-rubric
      value: >
        The response generates a commit message and proceeds to execute the commit without
        asking for user confirmation. It does NOT present a "Commit as shown?" prompt or offer
        yes/edit/cancel options. The commit message and plan are still displayed for visibility.
        Critique gates run internally but the interactive approval step is skipped because
        --auto was passed. The stash behavior is unchanged.

- description: "commit-sdlc: enforces type constraint from config"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/commit-sdlc/SKILL.md"
    project_context: "file://fixtures/commit-config-present.md"
    user_request: >
      Run /commit-sdlc. The commit-prepare.js output includes commitConfig with
      allowedTypes: [feat, fix, chore, refactor, docs]. Generate a commit with
      type constraint enforced during planning. The staged changes are logging-related.
  assert:
    # Must generate a type from allowedTypes
    - type: regex
      value: '^(feat|fix|chore|refactor|docs)(\([a-z-]+\))?:'
    # Must NOT generate an invalid type (e.g., "perf" or "style" which aren't in allowedTypes)
    - type: not-regex
      value: '^(perf|style|test|ci)(\([a-z-]+\))?:'
    # Behavioral: type constraint respected in critique/planning
    - type: llm-rubric
      value: >
        The commit message uses only types from the allowedTypes constraint (feat, fix, chore,
        refactor, docs). The skill's critique gate validates the type against the config,
        ensuring no invalid types (perf, style, test, ci, etc.) are used. The planning output
        reflects the constraint being applied.

- description: "commit-sdlc: validates subject against pattern from config"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/commit-sdlc/SKILL.md"
    project_context: "file://fixtures/commit-config-present.md"
    user_request: >
      Run /commit-sdlc. The project config contains subjectPattern:
      "^(feat|fix|chore|refactor|docs)(\\([a-z-]+\\))?:". Generate a commit message
      whose subject matches this pattern. The critique gate must validate the match.
  assert:
    # Must produce subject matching the pattern (type:scope format)
    - type: regex
      value: '^(feat|fix|chore|refactor|docs)(\([a-z-]+\))?:'
    # Must include scope from allowedScopes: logger, utils, api
    - type: regex
      value: '\((logger|utils|api)\):'
    # Behavioral: pattern validation in critique gate
    - type: llm-rubric
      value: >
        The commit subject matches the configured pattern with a valid type and scope.
        The scope is drawn from allowedScopes (logger, utils, api). The critique gate
        validates the subject line against the subjectPattern regex, confirming pattern match.
        The response mentions pattern validation or matching in the critique output.

- description: "commit-sdlc: enforces required trailers from config"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/commit-sdlc/SKILL.md"
    project_context: "file://fixtures/commit-config-present.md"
    user_request: >
      Run /commit-sdlc. The commitConfig specifies requiredTrailers: [Reviewed-by].
      Generate a commit message that includes the required trailer. The quality gate
      must validate its presence.
  assert:
    # Must include the required trailer
    - type: icontains
      value: "Reviewed-by:"
    # Behavioral: trailer requirement enforced in quality gate
    - type: llm-rubric
      value: >
        The commit message includes all required trailers specified in the config
        (Reviewed-by in this case). The quality gate validates the presence of required
        trailers before allowing the commit. The critique output indicates trailer validation
        or requirement checking.

- description: "commit-sdlc: generates accurate message from truncated diff"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/commit-sdlc/SKILL.md"
    project_context: "file://fixtures/commit-large-diff-truncated.md"
    user_request: >
      Run /commit-sdlc. The commit-prepare.js output is provided in the project
      context above. Note that staged.diffTruncated is true — the diff was truncated
      to fit the context budget. 20 files are staged but only 5 file diffs are included.
      Use the available diff content and diffstat for the remaining 15 truncated files
      to generate an accurate commit message.
  assert:
    - type: regex
      value: '(feat|fix|chore|refactor)(\(.+\))?:'
    - type: llm-rubric
      value: >
        The commit message accurately reflects the staged changes: a refactor of
        validation modules to return structured results with error codes. Since the diff
        was truncated (only 5 of 20 file diffs included), the message appropriately
        summarizes the overall change pattern rather than listing individual file details
        for files whose diffs were not available. The message does NOT fabricate specific
        code-level details (like function names, variable names, or line changes) for
        files that were in the truncated set. The message follows conventional commit
        format with an imperative subject line.

- description: "commit-sdlc: link verification (R12, #198) — invokes script gate before git commit"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/commit-sdlc/SKILL.md"
    project_context: "file://fixtures/commit-staged-changes.md"
    user_request: >
      Run /commit-sdlc on a body that references https://github.com/rafalnagr/sdlc-marketplace/issues/190
      (wrong owner — the real repo is rnagrodzki/sdlc-marketplace). What does the skill do before
      executing git commit? Walk through Step 5 in detail. Show the exact bash command(s) you would
      run and what happens if the validator returns non-zero exit.
  assert:
    - type: icontains
      value: "scripts/lib/links.js"
    - type: icontains
      value: "validate"
    - type: icontains
      value: "git commit"
    - type: llm-rubric
      value: >
        The response describes invoking plugins/sdlc-utilities/scripts/lib/links.js as a hard gate
        before git commit, pipes the message body through it, and explicitly states that on non-zero
        exit the commit must NOT be executed. It does not describe LLM-side validation logic. It does
        not propose retrying, editing URLs without user input, or bypassing the gate. The gate is
        described as script-enforced, not advisory.

- description: "commit-sdlc: explicit rm -f cleanup runs on pre-commit hook failure (issue #209, R15/#399)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/commit-sdlc/SKILL.md"
    project_context: "file://fixtures/commit-staged-changes.md"
    user_request: >
      Run /commit-sdlc. The pre-commit hook fails (lint error). Walk through what happens
      to $COMMIT_CONTEXT_FILE in this failure path. Describe the exact mechanism that ensures
      the manifest file is cleaned up after a pre-commit hook failure. Does the skill use an
      EXIT trap or explicit rm -f calls?
  assert:
    - type: icontains
      value: "rm -f"
    - type: not-icontains
      value: "trap 'rm -f"
    - type: llm-rubric
      value: >
        The response describes explicit `rm -f "$COMMIT_CONTEXT_FILE"` cleanup on the pre-commit
        hook failure path — NOT an EXIT trap. It confirms the manifest at `.sdlc/execution/commit-*.json`
        is removed via an explicit `rm -f` call in the failure branch (not via a trap construct).
        It does NOT describe a `trap 'rm -f ...' EXIT INT TERM` as the cleanup mechanism.
        It correctly notes the manifest persists until explicitly cleaned up (enabling cross-shell
        survival), and that each exit path (success, cancel, hook failure, link-gate failure)
        performs its own explicit cleanup.

# ---------------------------------------------------------------------------
# Fixes #392 / R35 — wip(execute): squash behavioral cases
# ---------------------------------------------------------------------------

- description: "commit-sdlc: squashes wip(execute): commits via soft-reset when stagedClean=true (#392)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/commit-sdlc/SKILL.md"
    project_context: "file://fixtures/commit-wip-squash.md"
    user_request: >
      Walk through Step 1c of commit-sdlc. Show the bash commands you would run to soft-reset
      to fork-point, then describe what happens to the WIP commits and to the working tree.
      Confirm whether the orchestrator's generated subject can start with `wip:`.
  assert:
    - type: icontains
      value: "git reset --soft"
    - type: icontains
      value: "git add -A"
    - type: not-icontains
      value: "--no-verify"
    - type: llm-rubric
      value: >
        The response describes Step 1c soft-reset: resolves fork-point (via merge-base with
        upstream or default branch), runs `git reset --soft <fork-point>`, then `git add -A`
        to re-stage. The WIP commits are dropped from history; the working tree is unchanged.
        The response confirms the final commit subject MUST NOT start with `wip:` or
        `wip(execute):` — enforced both by an LLM-side reminder in Step 2 and a deterministic
        post-generation regex check in scripts/skill/commit.js (the load-bearing layer per
        scripts-over-llm-logic guardrail).

- description: "commit-sdlc: --no-squash-wip preserves wip(execute) commits in branch history (#392)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/commit-sdlc/SKILL.md"
    project_context: "file://fixtures/commit-wip-squash.md"
    user_request: >
      Same branch state as the fixture, but the user passed --no-squash-wip. Walk through
      Step 1c. What does commit-sdlc print, and does it run git reset --soft?
  assert:
    - type: icontains
      value: "--no-squash-wip"
    - type: not-icontains
      value: "git reset --soft"
    - type: llm-rubric
      value: >
        The response notes that --no-squash-wip is set, so Step 1c prints a notice along
        the lines of "Detected N wip(execute): commit(s) ... preserving (--no-squash-wip)"
        and SKIPS the soft-reset. The WIP commits remain in branch history. Step 2 PLAN
        proceeds with the existing staged diff unchanged.

# ---------------------------------------------------------------------------
# Fixes #398 — default-branch guard behavioral cases
# ---------------------------------------------------------------------------

- description: "commit-sdlc: interactive mode warns before AskUserQuestion when on default branch (R14/#398)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/commit-sdlc/SKILL.md"
    project_context: "file://fixtures/commit-staged-changes.md"
    user_request: >
      Run /commit-sdlc. The prepare output shows currentBranch=main, defaultBranch=main,
      onDefaultBranch=true, flags.auto=false. No --force-default-branch was passed.
      Walk through the default-branch guard section and Step 5 approval prompt.
  assert:
    - type: icontains
      value: "default branch"
    - type: llm-rubric
      value: >
        The response shows a warning about committing to the default branch appearing BEFORE
        the Step 5 AskUserQuestion approval prompt. The AskUserQuestion prompt still appears
        (the user is asked to confirm or cancel). The warning cites the default branch name.
        The skill does NOT refuse to proceed — it warns and defers to the user.

- description: "commit-sdlc: --auto on default branch without --force-default-branch refuses with error (C12/#398)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/commit-sdlc/SKILL.md"
    project_context: "file://fixtures/commit-staged-changes.md"
    user_request: >
      Run /commit-sdlc --auto. The prepare output shows currentBranch=main, defaultBranch=main,
      onDefaultBranch=true, flags.auto=true, flags.forceDefaultBranch=false, and errors[]
      contains "Refusing to --auto commit to default branch 'main'. Pass --force-default-branch
      to override, or remove --auto for interactive approval."
  assert:
    - type: icontains
      value: "Refusing"
    - type: not-icontains
      value: "git commit -m"
    - type: llm-rubric
      value: >
        The response stops before creating any commit. It prints the error message from prepare
        output verbatim (containing "Refusing to --auto commit to default branch"). It does NOT
        invoke git commit. It cleans up the manifest file with explicit rm -f. It suggests
        passing --force-default-branch to override or removing --auto for interactive approval.

- description: "commit-sdlc: --auto --force-default-branch on default branch proceeds with warning (R14, C12/#398)"
  vars:
    skill_path: "plugins/sdlc-utilities/skills/commit-sdlc/SKILL.md"
    project_context: "file://fixtures/commit-staged-changes.md"
    user_request: >
      Run /commit-sdlc --auto --force-default-branch. The prepare output shows
      currentBranch=main, defaultBranch=main, onDefaultBranch=true, flags.auto=true,
      flags.forceDefaultBranch=true, warnings[] contains "Committing to default branch 'main'",
      and errors[] is empty.
  assert:
    - type: icontains
      value: "default branch"
    - type: icontains
      value: "git commit"
    - type: llm-rubric
      value: >
        The response shows the default-branch warning (from warnings[]) printed to the user.
        Since flags.auto=true and errors[] is empty and flags.forceDefaultBranch=true, the
        skill proceeds to generate and execute the commit without an AskUserQuestion prompt.
        It runs git commit. It does NOT stop or refuse.
