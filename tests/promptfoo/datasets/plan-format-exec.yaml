# Script execution tests for validate-plan-format.js.
# These tests run validate-plan-format.js directly against fixture plan files (no LLM).
# They validate that plan format validation produces correct output for PF1-PF6 checks.
#
# Fixture appropriateness:
#   project-valid-plan           -- CORRECT: valid 3-task plan should pass all checks (no Notes)
#   project-invalid-plan         -- CORRECT: plan with multiple deliberate errors (PF1-PF6)
#   project-plan-no-deviations   -- CORRECT: otherwise-valid plan missing Deviations -> PF6 fail
#   project-plan-oversized-notes -- CORRECT: Notes block over 5 lines -> PF5 cap fail
#   project-plan-with-notes      -- CORRECT: Deviations + short Notes -> all pass

- description: "plan-format: valid plan passes all checks (JSON)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-plan-format.js"
    script_args: "--project-root {{project_root}} --file {{project_root}}/plans/test-plan.md --json"
    project_root: "file://fixtures-fs/project-valid-plan"
  assert:
    - type: icontains
      value: '"passed": true'
    - type: regex
      value: '"failed":\s*0'
    - type: icontains
      value: '"status": "pass"'

- description: "plan-format: valid plan passes all checks (markdown)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-plan-format.js"
    script_args: "--project-root {{project_root}} --file {{project_root}}/plans/test-plan.md --markdown"
    project_root: "file://fixtures-fs/project-valid-plan"
  assert:
    - type: icontains
      value: "Plan Format Validation Report"
    - type: icontains
      value: "PASS"

- description: "plan-format: missing Verification header triggers PF1 fail"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-plan-format.js"
    script_args: "--project-root {{project_root}} --file {{project_root}}/plans/bad-plan.md --json"
    project_root: "file://fixtures-fs/project-invalid-plan"
  assert:
    - type: icontains
      value: '"passed": false'
    - type: icontains
      value: "PF1"
    - type: icontains
      value: "Verification"

- description: "plan-format: non-contiguous numbering triggers PF2 fail"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-plan-format.js"
    script_args: "--project-root {{project_root}} --file {{project_root}}/plans/bad-plan.md --json"
    project_root: "file://fixtures-fs/project-invalid-plan"
  assert:
    - type: icontains
      value: "PF2"
    - type: icontains
      value: "non-contiguous"

- description: "plan-format: invalid Complexity value triggers PF3 fail"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-plan-format.js"
    script_args: "--project-root {{project_root}} --file {{project_root}}/plans/bad-plan.md --json"
    project_root: "file://fixtures-fs/project-invalid-plan"
  assert:
    - type: icontains
      value: "PF3"
    - type: icontains
      value: "Easy"

- description: "plan-format: invalid dependency triggers PF4 fail"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-plan-format.js"
    script_args: "--project-root {{project_root}} --file {{project_root}}/plans/bad-plan.md --json"
    project_root: "file://fixtures-fs/project-invalid-plan"
  assert:
    - type: icontains
      value: "PF4"
    - type: icontains
      value: "Task 7"

- description: "plan-format: missing checkbox triggers PF5 fail"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-plan-format.js"
    script_args: "--project-root {{project_root}} --file {{project_root}}/plans/bad-plan.md --json"
    project_root: "file://fixtures-fs/project-invalid-plan"
  assert:
    - type: icontains
      value: "PF5"
    - type: icontains
      value: "no checkbox"

- description: "plan-format: missing Deviations section triggers PF6 fail"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-plan-format.js"
    script_args: "--project-root {{project_root}} --file {{project_root}}/plans/plan.md --json"
    project_root: "file://fixtures-fs/project-plan-no-deviations"
  assert:
    - type: icontains
      value: '"passed": false'
    - type: icontains
      value: "PF6"
    - type: icontains
      value: "Deviations & assumptions"

- description: "plan-format: oversized Notes block (>5 lines) triggers PF5 cap fail"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-plan-format.js"
    script_args: "--project-root {{project_root}} --file {{project_root}}/plans/plan.md --json"
    project_root: "file://fixtures-fs/project-plan-oversized-notes"
  assert:
    - type: icontains
      value: '"passed": false'
    - type: icontains
      value: "PF5"
    - type: icontains
      value: "max 5"

- description: "plan-format: plan with Deviations and short Notes passes all checks"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-plan-format.js"
    script_args: "--project-root {{project_root}} --file {{project_root}}/plans/plan.md --json"
    project_root: "file://fixtures-fs/project-plan-with-notes"
  assert:
    - type: icontains
      value: '"passed": true'
    - type: regex
      value: '"failed":\s*0'
    - type: icontains
      value: "PF6"

- description: "plan-format: valid plan (no Notes) passes PF5 without Description"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-plan-format.js"
    script_args: "--project-root {{project_root}} --file {{project_root}}/plans/plan.md --json"
    project_root: "file://fixtures-fs/project-plan-no-deviations"
  assert:
    - type: icontains
      value: '"id": "PF5"'
    - type: regex
      value: '"id":\s*"PF5",\s*"status":\s*"pass"'

- description: "plan-format: compliant plan re-run is idempotent (stable PASS)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/ci/validate-plan-format.js"
    script_args: "--project-root {{project_root}} --file {{project_root}}/plans/plan.md --json"
    project_root: "file://fixtures-fs/project-plan-with-notes"
  assert:
    - type: icontains
      value: '"passed": true'
    - type: regex
      value: '"failed":\s*0'
