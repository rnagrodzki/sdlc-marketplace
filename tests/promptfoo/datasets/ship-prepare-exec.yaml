# Script execution tests for ship-prepare.js.
# These tests run ship-prepare.js directly against fixture directories (no LLM).
# Covers: sdlcGitignored fix (#99) and auto-mode workspace override (#104).

- description: "ship-prepare: .sdlc/.gitignore inner pattern sets sdlcGitignored true"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: icontains
      value: '"sdlcGitignored": true'

- description: "ship-prepare: --auto defaults workspace to branch"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --auto"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: icontains
      value: '"workspace": "branch"'

- description: "ship-prepare: --auto with explicit --workspace prompt keeps prompt"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --auto --workspace prompt"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: icontains
      value: '"workspace": "prompt"'

- description: "ship-prepare: --auto with config workspace=worktree keeps config value"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --auto"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-auto-workspace"
  assert:
    - type: icontains
      value: '"workspace": "worktree"'

# --preset / --skip hard-removal (issue #190)
# CLI --preset and --skip are no longer accepted by ship-sdlc — they expand to
# errors with a migration pointer to --steps. Legacy on-disk v1 configs are
# still auto-migrated by lib/config.js (see migration matrix below).

- description: "ship-prepare: --preset is hard-rejected with migration pointer (#190)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --preset balanced"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: icontains
      value: "--preset is no longer accepted"
    - type: icontains
      value: "--steps"

- description: "ship-prepare: --skip is hard-rejected with migration pointer (#190)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --skip version"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: icontains
      value: "--skip is no longer accepted"
    - type: icontains
      value: "--steps"

- description: "ship-prepare: config with legacy preset still auto-migrates to v2 steps[]"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-legacy-preset"
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        Array.isArray(o.flags.steps) && o.flags.steps.length > 0

# Auto-mode workspace override for config source (issue #133)

- description: "ship-prepare: --auto with config workspace=prompt overrides to branch"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --auto"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-config-workspace-prompt"
  assert:
    - type: icontains
      value: '"workspace": "branch"'
    - type: icontains
      value: "config (auto)"

# Bump+steps coherence (issue #146; updated #190)
# When --bump is set on CLI but the resolved steps[] excludes the version step,
# this is a contradiction: the user wanted to bump but the pipeline shape skips
# version. The error fires regardless of whether version was excluded via
# --steps (CLI) or via config.

- description: "ship-prepare: --bump with version excluded from --steps produces error"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --bump minor --steps execute,commit,review,pr,archive-openspec"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: icontains
      value: "version step is skipped"
    - type: icontains
      value: "resolve by removing"

# Pipeline completion validation (issue #159)

- description: "ship-state: cleanup rejects state with pending steps"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/ship.js"
    script_args: "cleanup"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-state-violation"
  assert:
    - type: icontains
      value: '"valid": false'
    - type: icontains
      value: '"pending"'
    - type: icontains
      value: "version"
    - type: icontains
      value: "contract violation"

- description: "ship-state: cleanup succeeds when all steps are terminal"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/state/ship.js"
    script_args: "cleanup"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-state-valid"
  assert:
    - type: icontains
      value: '"valid": true'
    - type: icontains
      value: '"cleaned": true'

# Per-step model field (issue #160)

- description: "ship-prepare: computeSteps includes model field per step"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
