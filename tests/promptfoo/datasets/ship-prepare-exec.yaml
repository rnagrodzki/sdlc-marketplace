# Script execution tests for ship-prepare.js.
# These tests run ship-prepare.js directly against fixture directories (no LLM).
# Covers: sdlcGitignored fix (#99), workspace auto-detection (#378, #379), the
# pipelineAdvancing predicate (#452), and removed-flag rejection.

- description: "ship-prepare: .sdlc/.gitignore inner pattern sets sdlcGitignored true"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: icontains
      value: '"sdlcGitignored": true'

# Workspace auto-detection (#378, #379): the removed flags --workspace/--branch/--tree
# are each rejected as removed flags. Workspace is derived, never selected.
- description: "ship-prepare: --workspace is rejected as a removed flag"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --workspace branch"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: icontains
      value: "no longer accepted"
    - type: icontains
      value: "auto-detected"

- description: "ship-prepare: --branch is rejected as a removed flag"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --branch"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: icontains
      value: "no longer accepted"

- description: "ship-prepare: --tree is rejected as a removed flag"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --tree"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: icontains
      value: "no longer accepted"

# --preset / --skip hard-removal (issue #190)
# CLI --preset and --skip are no longer accepted by ship-sdlc — they expand to
# errors with a migration pointer to --steps. Legacy on-disk v1 configs are
# still auto-migrated by lib/config.js (see migration matrix below).

- description: "ship-prepare: --preset is hard-rejected with migration pointer (#190)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --preset balanced"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: icontains
      value: "--preset is no longer accepted"
    - type: icontains
      value: "--steps"

- description: "ship-prepare: --skip is hard-rejected with migration pointer (#190)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --skip version"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: icontains
      value: "--skip is no longer accepted"
    - type: icontains
      value: "--steps"

- description: "ship-prepare: config with legacy preset still auto-migrates to v2 steps[]"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-legacy-preset"
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return Array.isArray(o.flags.steps) && o.flags.steps.length > 0

# Bump+steps coherence (issue #146; updated #190)
# When --bump is set on CLI but the resolved steps[] excludes the version step,
# this is a contradiction: the user wanted to bump but the pipeline shape skips
# version. The error fires regardless of whether version was excluded via
# --steps (CLI) or via config.

- description: "ship-prepare: --bump with version excluded from --steps produces error"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --bump minor --steps execute,commit,review,archive-openspec,pr"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: icontains
      value: "version step is skipped"
    - type: icontains
      value: "resolve by removing"

