    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-state-resume"
  assert:
    - type: icontains
      value: '"implicitResume": true'
    - type: icontains
      value: '"resume": true'

- description: "ship-prepare: --hook-active-pipeline without state file emits implicitResumeNoState error (R-implicit-resume, #359)"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
