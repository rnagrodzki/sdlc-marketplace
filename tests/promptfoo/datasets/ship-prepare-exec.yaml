      value: "reviw"

- description: "ship-prepare: BUILT_IN_DEFAULTS resolve to balanced steps (no version) when no config exists"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        const expected = ['execute','commit','review','pr','archive-openspec'];
        JSON.stringify(o.flags.steps) === JSON.stringify(expected)
    - type: icontains
      value: '"bump": "patch"'
    - type: icontains
      value: '"draft": false'
    - type: icontains
      value: '"auto": false'
    - type: icontains
      value: '"reviewThreshold": "high"'
    - type: icontains
      value: '"workspace": "prompt"'
    - type: icontains
      value: '"rebase": "auto"'

# OpenSpec authoritative output (issue #164)

- description: "ship-prepare: openspec present emits openspecAuthoritative with path and specsCount"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-openspec-baseline"
  assert:
    - type: icontains
      value: '"openspecDetected": true'
    - type: icontains
      value: '"openspecAuthoritative"'
    - type: icontains
      value: '"path": "openspec/config.yaml"'
    - type: icontains
      value: '"specsCount": 2'

- description: "ship-prepare: no openspec emits null openspecAuthoritative"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: icontains
      value: '"openspecDetected": false'
    - type: icontains
      value: '"openspecAuthoritative": null'

# archive-openspec step tests (issue #162)

- description: "ship-prepare: archive-openspec step appears between commit-fixes and version"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: javascript
      value: |
        const steps = JSON.parse(output).steps.map(s => s.name);
        const cfIdx = steps.indexOf('commit-fixes');
        const aoIdx = steps.indexOf('archive-openspec');
        const vIdx = steps.indexOf('version');
        cfIdx < aoIdx && aoIdx < vIdx

- description: "ship-prepare: --openspec-change triggers conditional archive-openspec step"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --openspec-change add-auth"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-openspec-ready"
  assert:
    - type: icontains
      value: '"openspecArchiveActionable": true'
    - type: javascript
      value: |
        const step = JSON.parse(output).steps.find(s => s.name === 'archive-openspec');
        step.status === 'conditional' && step.args.includes('add-auth')

- description: "ship-prepare: archive-openspec skipped when change already archived"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --openspec-change add-auth"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-openspec-archived-change"
  assert:
    - type: javascript
      value: |
        const step = JSON.parse(output).steps.find(s => s.name === 'archive-openspec');
        step.status === 'skipped' && step.reason === 'change already archived'

- description: "ship-prepare: --steps without archive-openspec marks step as skipped"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --steps execute,commit,review,version,pr --openspec-change add-auth"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-openspec-ready"
  assert:
    - type: javascript
      value: |
        const step = JSON.parse(output).steps.find(s => s.name === 'archive-openspec');
        step.status === 'skipped' && step.reason === 'not in steps[]'

- description: "ship-prepare: VALID_STEPS includes archive-openspec"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan --steps execute,archive-openspec"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-sdlc-gitignore-inner"
  assert:
    - type: not-icontains
      value: "Unrecognized step"

# ---------------------------------------------------------------------------
# Migration matrix tests (issue #180)
# Verify lib/config.js auto-migrates v1 ship configs to v2 on read, and
# that ship.js consumes the migrated steps[] correctly.
# ---------------------------------------------------------------------------

- description: "ship-prepare: legacy preset:balanced + skip:[] migrates to steps without version"
  vars:
    script_path: "repo://plugins/sdlc-utilities/scripts/skill/ship.js"
    script_args: "--has-plan"
    script_cwd: "{{project_root}}"
    project_root: "file://fixtures-fs/project-ship-v1-balanced-skip-empty"
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        const steps = o.flags.steps;
        const expected = ['execute','commit','review','pr','archive-openspec'];
        JSON.stringify(steps) === JSON.stringify(expected)

- description: "ship-prepare: legacy preset:minimal + skip:[pr] migrates to [execute, commit]"
