        return o.flags.verifyPipelineTimeout === 1200
          && o.flags.verifyPipelineInterval === 60
          && o.flags.verifyPipelineMaxIterations === 3
          && o.flags.awaitRemoteReviewTimeout === 600
          && o.flags.awaitRemoteReviewInterval === 60
          && Array.isArray(o.flags.awaitRemoteReviewers)
          && o.flags.awaitRemoteReviewers.length === 1
          && o.flags.awaitRemoteReviewers[0] === 'copilot'

