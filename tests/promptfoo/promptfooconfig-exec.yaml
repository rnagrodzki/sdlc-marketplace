description: "Script execution tests for sdlc-marketplace (runs real scripts against fixture directories, no LLM)"

evaluateOptions:
  concurrency: 8

# Each test case uses the script-runner.js provider directly.
# The prompt is unused for script tests but required by the promptfoo config schema.
providers:
  - id: file://providers/script-runner.js
  - id: file://providers/hook-runner.js

prompts:
  - "run"

defaultTest:
  options:
    transformVars: "file://scripts/extract-skill-content.js"

tests:
  - file://datasets/sdlc-plugin-discovery-exec.yaml
  - file://datasets/sdlc-dimensions-exec.yaml
  - file://datasets/sdlc-pr-template-exec.yaml
  - file://datasets/sdlc-script-resolution-exec.yaml
  - file://datasets/commit-prepare-exec.yaml
  - file://datasets/pr-prepare-exec.yaml
  - file://datasets/ship-prepare-exec.yaml
  - file://datasets/guardrails-prepare-exec.yaml
  - file://datasets/setup-init-exec.yaml
  - file://datasets/plan-format-exec.yaml
  - file://datasets/hook-git-guard-exec.yaml
  - file://datasets/hook-error-report-exec.yaml
  - file://datasets/markdown-to-adf-exec.yaml
